<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Rota de Atendimento - Linemed</title>

<style>
body{
    font-family:Arial;
    margin:0;
    background:#f5f5f5;
    padding-top:180px;
}

.topo{
    position:fixed;
    top:0;
    left:0;
    right:0;
    background:white;
    z-index:9999;
    padding:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

.header{
    border-bottom:2px solid #d35400;
    padding-bottom:10px;
}

.header h2{
    color:#d35400;
    margin:0;
}

.grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
    margin-top:10px;
}

input,select{
    width:100%;
    padding:8px;
    box-sizing:border-box;
}

.menu{
    display:flex;
    gap:10px;
    margin-top:10px;
    flex-wrap:wrap;
}

button{
    padding:10px 14px;
    border:none;
    color:white;
    font-weight:bold;
    cursor:pointer;
    border-radius:4px;
}

.add{background:#27ae60;}
.maps{background:#2980b9;}
.save{background:#7f8c8d;}
.print{background:#d35400;}
.excluir{background:#c0392b;}
.hist-btn{background:#8e44ad;}
.btn-small{background:#555;padding:6px 10px;font-size:12px;}
.btn-historico{background:#d35400;color:#fff;padding:8px 14px;border-radius:6px;margin-right:8px;}

.container{padding:15px;}
.bloco{background:white;border:1px solid #ddd;padding:12px;margin-bottom:12px;border-radius:6px;position:relative;padding-left:40px;}
.bloco.urgente{border-left:6px solid red;background:#fff6f6;}
.bloco::before{content:'';width:18px;height:18px;border-radius:50%;background:#18b552;position:absolute;left:12px;top:18px;}
.bloco.urgente::before{background:red;}
.linha{display:flex;gap:5px;margin-top:5px;}
.linha input{flex:1;}

#historico{margin-top:20px;}
.historico-bloco{background:white;border:1px solid #ccc;padding:12px;margin-bottom:10px;border-radius:6px;}
.historico-topo{display:flex;justify-content:space-between;align-items:center;gap:15px;cursor:pointer;}
.historico-info{flex:1;}
.historico-check{min-width:30px;text-align:right;}
.historico-detalhes{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #ddd;}
.expandido{display:block;}

@media print{
    .topo,#historico,button{display:none !important;}
    body{padding-top:0;background:white;font-size:11px;line-height:1.15;}
    .container{padding:5px;}
    .bloco{border:none;margin-bottom:8px;padding:6px 6px 6px 35px;page-break-inside:avoid;box-shadow:none;}
    .bloco::before{left:8px;top:10px;width:16px;height:16px;}

    .container::after{
        content:'__________________________________________________';
        display:block;
        margin-top:20px;
        padding-top:10px;
        border-top:1px solid #999;
    }
}
    body{padding-top:0;background:white;font-size:12px;line-height:1.2;}
    .bloco{border:none;margin-bottom:8px;padding:6px;page-break-inside:avoid;}
}
</style>
</head>
<body>

<div class="topo">
    <div class="header">
        <h2>LINEMED</h2>
        <small>
            Av. Felipe Carrillo Puerto, 35 – São Paulo/SP<br>
            CNPJ: 08.407.651/0001-02
        </small>
    </div>

    <div class="grid">
        <input id="rota" readonly>
        <input type="date" id="data">

        <select id="tecnico1">
            <option>WESLEY MANOEL</option>
            <option>JONATAS DE SOUZA</option>
            <option>DIOGENES DE JESUS</option>
            <option>DIOGO MATOS</option>
        </select>

        <select id="tecnico2">
            <option>DIOGO MATOS</option>
            <option>WESLEY MANOEL</option>
            <option>JONATAS DE SOUZA</option>
            <option>DIOGENES DE JESUS</option>
        </select>

        <select id="veiculo">
            <option>FIAT MOBI - BRY1287</option>
            <option>FIAT STRADA - CUF9B56</option>
            <option>FIAT FIORINO - FCK0C83</option>
            <option>FIAT STRADA - FSX9C12</option>
            <option>FIAT ARGO - FTF2D54</option>
            <option>FIAT STRADA - GHG7A62</option>
            <option>FIAT STRADA - SSS7G23</option>
            <option>FIAT STRADA - SUS9D27</option>
        </select>
    </div>

    <div class="menu">
        <button class="add" onclick="novoAtendimento()">➕ Atendimento</button>
        <button class="maps" onclick="rotaMaps()">🗺️ Rota</button>
        <button class="save" onclick="salvar()">💾 Salvar</button>
        <button class="print" onclick="window.print()">🖨️ PDF Atual</button>
        <button class="hist-btn" onclick="abrirHistorico()">📊 Histórico</button>
        <button class="excluir" onclick="limparTudo()">🗑️ Limpar</button>
    </div>
</div>

<div class="container">
    <div id="lista"></div>
    <div id="historico"></div>
</div>

<script>
const URL_API = "https://script.google.com/macros/s/AKfycbz8X3PVrM3kv04nixZY9a5OHEv61OAhY2qhAqnNg9wfMoQc5YcMuNBIgl81FhgwBA8LjQ/exec";
const base = "Av. Felipe Carrillo Puerto, 35 - São Paulo";

let clientes = JSON.parse(localStorage.getItem("clientes")) || {
    "AMA Capão": {endereco:"Av. Comendador Sant’Anna, 774", regiao:"SUL"},
    "UBS Vera Cruz": {endereco:"Av. dos Funcionários Públicos, 379", regiao:"LESTE"}
};

(function(){
    let d = new Date();
    let ym = d.getFullYear()+String(d.getMonth()+1).padStart(2,'0');
    let seq = localStorage.getItem(ym) || 0;
    seq++;
    localStorage.setItem(ym, seq);
    rota.value = ym + String(seq).padStart(3,'0');
    data.value = new Date().toISOString().split("T")[0];
})();

function ordenarPrioridade(){
    let lista=document.getElementById('lista');
    let blocos=[...lista.children];
    blocos.sort((a,b)=>b.classList.contains('urgente')-a.classList.contains('urgente'));
    blocos.forEach(b=>lista.appendChild(b));
}

function novoAtendimento(){
    let b=document.createElement('div');
    b.className='bloco';
    b.innerHTML=`
        <select onchange="autoCliente(this)">
            <option value="">Cliente</option>
            ${Object.keys(clientes).map(c=>`<option>${c}</option>`).join('')}
            <option value="novo">+ Novo Cliente</option>
        </select>
        <input class="end" placeholder="Endereço">
        <input class="reg" placeholder="Região">
        <label><input type="checkbox" onchange="toggleUrgente(this)"> Urgente</label>
        <div class="chamados"></div>
        <button class="btn-small" onclick="addChamado(this)">+ Chamado</button>
        <button class="btn-small" onclick="this.closest('.bloco').remove()">Excluir</button>
    `;
    lista.appendChild(b);
}

function autoCliente(sel){
    if(sel.value==='novo') return;
    let d=clientes[sel.value];
    let bloco=sel.closest('.bloco');
    if(d){
        bloco.querySelector('.end').value=d.endereco;
        bloco.querySelector('.reg').value=d.regiao;
    }
}

function toggleUrgente(cb){
    cb.closest('.bloco').classList.toggle('urgente',cb.checked);
    ordenarPrioridade();
}

function addChamado(btn){
    let div=document.createElement('div');
    div.className='linha';
    div.innerHTML=`<input placeholder="Descrição"><input placeholder="OS"><button onclick="this.parentElement.remove()">X</button>`;
    btn.parentElement.querySelector('.chamados').appendChild(div);
}

function rotaMaps(){
    let e=[base];
    document.querySelectorAll('.end').forEach(x=>{if(x.value)e.push(x.value)});
    e.push(base);
    window.open('https://www.google.com/maps/dir/'+e.map(encodeURIComponent).join('/'));
}

function salvar(){alert('Função salvar mantida.');}
function abrirHistorico(){alert('Histórico mantido.');}
function limparTudo(){if(confirm('Deseja limpar?')) lista.innerHTML='';}
</script>
</body>
</html>
