<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORIZON - Gestão Inteligente</title>
    <style>
        :root {
            --cor-primaria: #2563eb;
            --cor-secundaria: #334155;
            --bg-claro: #f8fafc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #0f172a; display: flex; min-height: 100vh; align-items: center; justify-content: center; }
        
        .login-container {
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,.25);
            text-align: center;
        }
        .logo { font-size: 42px; font-weight: bold; color: var(--cor-primaria); margin-bottom: 8px; }
        .sub { color: #64748b; margin-bottom: 28px; }
        .input-padrao { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 14px; }
        .btn-entrar { width: 100%; padding: 14px; background: var(--cor-primaria); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; transition: background 0.2s; }
        .btn-entrar:hover { background: #1d4ed8; }
        .footer { margin-top: 18px; font-size: 12px; color: #94a3b8; }
        
        /* Layout Principal Pós-Login */
        #painelSistema { display: none; background: #f4f7fb; position: fixed; inset: 0; padding: 20px; color: #1e293b; text-align: left; }
        .topbar { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div id="loginScreen" class="login-container">
    <div class="logo">⚡ ORIZON</div>
    <p class="sub">Smart Operations Platform</p>

    <input id="loginUser" type="text" placeholder="Usuário" class="input-padrao" autocomplete="off">
    <input id="loginPass" type="password" placeholder="Senha" class="input-padrao">

    <button onclick="fazerLogin()" class="btn-entrar">Entrar no sistema</button>

    <p class="footer">by DMA Solutions • Operational Management</p>
</div>

<div id="painelSistema">
    <div class="topbar">
        <div>
            <h1 style="color:#2563eb;">⚡ ORIZON</h1>
            <p id="infoUsuario" style="color:#64748b; font-size:14px; margin-top:4px;"></p>
        </div>
        <button onclick="efetuarLogout()" style="padding:10px 15px; background:#dc2626; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">🚪 Sair</button>
    </div>
    
    <div style="background:white; padding:30px; border-radius:12px; box-shadow:0 4px 6px rgba(0,0,0,0.05);">
        <h2>Conectado com Sucesso!</h2>
        <p style="margin-top:10px; color:#475569;">O script de autenticação respondeu corretamente. Você já pode prosseguir com os testes das rotas e banco de dados.</p>
    </div>
</div>

<script>
// Lista de usuários aceitos no sistema
const listaUsuarios = [
    { login: 'admin', senha: '@181989Di', nome: 'Administrador' },
    { login: 'visitante', senha: '123', nome: 'Visitante' }
];

function fazerLogin() {
    // Captura os valores digitados tirando espaços extras
    const usuarioDigitado = document.getElementById('loginUser').value.trim().toLowerCase();
    const senhaDigitada = document.getElementById('loginPass').value;

    // Busca o usuário na lista
    const usuarioValido = listaUsuarios.find(u => u.login === usuarioDigitado && u.senha === senhaDigitada);

    if (usuarioValido) {
        // Armazena a sessão temporária no navegador
        sessionStorage.setItem('orizon_usuario_logado', JSON.stringify(usuarioValido));
        
        // Altera a exibição das telas
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('painelSistema').style.display = 'block';
        document.getElementById('infoUsuario').innerText = `Usuário atual: ${usuarioValido.nome}`;
    } else {
        alert('Usuário ou senha incorretos! Verifique as credenciais.');
    }
}

function efectuarLogout() {
    sessionStorage.removeItem('orizon_usuario_logado');
    document.getElementById('painelSistema').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'block';
    document.getElementById('loginUser').value = '';
    document.getElementById('loginPass').value = '';
}

// Verifica se já estava logado antes ao recarregar a página
window.onload = function() {
    const sessaoAtiva = sessionStorage.getItem('orizon_usuario_logado');
    if (sessaoAtiva) {
        const usuario = JSON.parse(sessaoAtiva);
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('painelSistema').style.display = 'block';
        document.getElementById('infoUsuario').innerText = `Usuário atual: ${usuario.nome}`;
    }
};
</script>

</body>
</html>
