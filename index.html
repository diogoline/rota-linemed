<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MÉTRICA - PLATAFORMA OPERACIONAL</title>

<!-- =========================================================================
     BLOCO 1: ARQUITETURA DE ESTILOS E DESIGN DA INTERFACE (CSS)
     ========================================================================= -->
<style>
:root {
  --cor-primaria: #2563eb;
  --cor-primaria-hover: #3b82f6;
  --cor-secundaria: #334155;
  --cor-sucesso: #16a34a;
  --cor-perigo: #dc2626;
  --cor-alerta: #eab308;
  --borda: #cbd5e1;
  --bg-sidebar: #0f172a;
  --bg-sidebar-hover: rgba(255, 255, 255, 0.06);
}

* { 
  margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; 
  text-transform: uppercase; 
}
body { background: #f4f7fb; color: #1e293b; display: flex; min-height: 100vh; }

.input-padrao, .select-padrao, .textarea-padrao {
  width: 100%; padding: 10px; border: 1px solid var(--borda); border-radius: 8px; background: white; font-size: 13px;
  outline: none !important; transition: border-color 0.2s;
}
.input-padrao:focus, .select-padrao:focus {
  border-color: var(--cor-primaria) !important;
  box-shadow: none !important;
}
#loginUser, #loginPass, #formUserSenha, input[type="password"], input[type="email"], .no-uppercase { 
  text-transform: none !important; 
}

.btn-primary { background: var(--cor-primaria); color: white; }
.btn-danger { background: var(--cor-perigo); color: white; }
.btn-success { background: var(--cor-sucesso); color: white; }
.btn-secondary { background: var(--cor-secundaria); color: white; }

.card-padrao { background: #fff; border-radius: 16px; padding: 22px; box-shadow: 0 6px 18px rgba(0,0,0,.06); border: 1px solid #e2e8f0; margin-bottom: 25px; }

.sidebar { 
  width: 270px; background: var(--bg-sidebar); color: #fff; position: fixed; 
  top: 0; left: 0; bottom: 0; padding: 24px 16px; display: flex; flex-direction: column; 
  box-shadow: 4px 0 10px rgba(0, 0, 0, 0.15); z-index: 100;
}
.logo-container { padding: 0 8px; margin-bottom: 24px; }
.logo { font-size: 28px; font-weight: 900; color: #3b82f6; cursor: pointer; letter-spacing: 1.5px; }
.sidebar small { color: #64748b; display: block; margin-top: 4px; font-size: 11px; font-weight: 700; }

.menu-items { flex-grow: 1; display: flex; flex-direction: column; gap: 4px; }

.sidebar button { 
  width: 100%; border: none; background: transparent; color: #94a3b8; padding: 12px 14px; 
  border-radius: 8px; text-align: left; cursor: pointer; font-weight: 600; font-size: 12px; 
  display: flex; align-items: center; gap: 12px; transition: all .2s ease-in-out; white-space: nowrap;
}
.sidebar button svg { width: 18px; height: 18px; fill: currentColor; }
.sidebar button:hover { background: var(--bg-sidebar-hover); color: #fff; }
.sidebar button.active-menu {
  background: rgba(37, 99, 235, 0.15); color: #3b82f6; font-weight: 700;
  border-left: 4px solid #2563eb; border-radius: 4px 8px 8px 4px; padding-left: 10px;
}

.assinatura-desenvolvedor {
  padding: 10px 8px; font-size: 9px; color: #475569; font-weight: bold;
  letter-spacing: 0.5px; border-top: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 8px; text-align: center;
}

.sidebar button.btn-logout { background: transparent; border: 1px solid rgba(220, 38, 38, 0.3); color: #f87171; justify-content: center; font-weight: 700; }
.sidebar button.btn-logout:hover { background: var(--cor-perigo); color: #fff; border-color: var(--cor-perigo); }

.main { margin-left: 270px; width: calc(100% - 270px); display: flex; flex-direction: column; min-height: 100vh; }
.topbar { background: #fff; padding: 22px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.topbar h1 { color: #1565C0; font-size: 34px; }
.topbar p { color: #64748b; margin-top: 4px; }
.content { padding: 25px; flex-grow: 1; }
.dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 18px; margin-top: 20px; }
button { border: none; padding: 10px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all .25s ease; }
button:hover { transform: translateY(-1px); filter: brightness(1.05); }
.hidden { display: none !important; }

.tabela-container { width: 100%; overflow-x: auto; margin-top: 15px; }
.tabela-sistema { width: 100%; border-collapse: collapse; min-width: 1100px; }
.tabela-sistema th { background: #f1f5f9; padding: 12px; text-align: left; font-size: 13px; color: #475569; border-bottom: 2px solid #e2e8f0; }
.tabela-sistema td { padding: 12px; border-bottom: 1px solid #e2e8f0; font-size: 13px; background: white; white-space: nowrap; }

.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
.form-grid label { font-size: 12px; font-weight: 600; margin-bottom: 4px; color: #475569; }
.form-grupo { display: flex; flex-direction: column; margin-bottom: 8px; }

.tabs-gestao { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #cbd5e1; padding-bottom: 5px; }
.tab-item { padding: 8px 16px; cursor: pointer; font-weight: 600; font-size: 13px; color: #64748b; border-bottom: 2px solid transparent; }
.tab-item.active { color: var(--cor-primaria); border-color: var(--cor-primaria); }

.dash-card-num { border-left: 5px solid var(--cor-primaria); display: flex; flex-direction: column; justify-content: center; }
.dash-card-num h4 { font-size: 12px; text-transform: uppercase; color: #64748b; font-weight: bold; }
.dash-card-num .num { font-size: 32px; font-weight: 900; color: #0f172a; margin-top: 5px; }

.modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); display: flex; align-items: center; justify-content: center; z-index: 10000; }
.modal-box { background: white; border-radius: 16px; padding: 28px; width: 100%; max-width: 500px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #e2e8f0; }
.modal-header h3 { font-size: 18px; font-weight: bold; }
.modal-close { background: none; font-size: 20px; color: #64748b; padding: 0; }
.modal-close:hover { color: var(--cor-perigo); transform: none; }

.container-parada { border: 1px solid var(--borda); padding: 18px; border-radius: 12px; margin-bottom: 20px; background: #fff; position: relative; }
.container-parada.prioridade-alta { border-color: var(--cor-perigo); background: #fff5f5; }
.sub-tabela-os { width: 100%; margin-top: 15px; border-collapse: collapse; border: 1px solid var(--borda); }
.sub-tabela-os th { background: #f8fafc; font-size: 11px; padding: 10px; color: #475569; border-bottom: 2px solid #e2e8f0; text-align: left; }
.sub-tabela-os td { padding: 8px; background: white; border-bottom: 1px solid #e2e8f0; }
</style>
</head>
<body>

<!-- =========================================================================
     BLOCO 2: TELA DE AUTENTICAÇÃO (LOGIN)
     ========================================================================= -->
<div id="loginScreen" style="position:fixed; inset:0; background:linear-gradient(135deg,#0f172a,#1e3a8a); display:flex; align-items:center; justify-content:center; z-index:99999;">
  <div style="width:100%; max-width:420px; background:white; padding:40px; border-radius:20px; box-shadow:0 20px 50px rgba(0,0,0,.25); text-align:center;">
    <div style="font-size:42px; font-weight:bold; color:#2563eb; margin-bottom:8px;">MÉTRICA</div>
    <p style="color:#64748b; margin-bottom:28px;">INTELEGÊNCIA DE ATIVOS CLÍNICOS</p>
    <input id="loginUser" type="text" placeholder="USUÁRIO" style="width:100%; padding:14px; margin-bottom:12px; border:1px solid #cbd5e1; border-radius:10px;" autocomplete="off">
    <input id="loginPass" type="password" placeholder="SENHA" style="width:100%; padding:14px; margin-bottom:18px; border:1px solid #cbd5e1; border-radius:10px;">
    <button id="btnEntrar" class="btn-primary" style="width:100%; padding:14px; font-weight:bold; font-size:15px;">ENTRAR NO SISTEMA</button>
    <p style="margin-top:18px; font-size:11px; color:#94a3b8; font-weight:bold;">BY DIOGO MATOS • GESTÃO OPERACIONAL</p>
  </div>
</div>

<!-- =========================================================================
     BLOCO 3: SIDEBAR E DIRETÓRIO DE MENUS CORPORATIVOS
     ========================================================================= -->
<div id="wrapperSistema" class="hidden" style="width:100%; display:flex;">
  <div class="sidebar">
    <div class="logo-container">
      <div class="logo" id="logoInicio">MÉTRICA</div>
      <small>INTELIGÊNCIA DE ATIVOS CLÍNICOS</small>
    </div>
    <div class="menu-items">
      <button id="btnMenuRotas">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13cc0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        ROTAS DIÁRIAS
      </button>
      <button id="btnMenuClientes">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-1.99.9-1.99 2L3 19c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-1 11h-4v4h-4v-4H6v-4h4V6h4v4h4v4z"/></svg>
        CLIENTES / UNIDADES
      </button>
      <button id="btnMenuChamados">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        CHAMADOS DE MAINT
      </button>
      <button id="btnMenuLocacao">
        <svg viewBox="0 0 24 24"><path d="M18 1h-8C8.9 1 8 1.9 8 3v3h2V5h8v14h-8v-1h-2v3c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V3c0-1.1-.9-2-2-2zM6.71 15.29l1.42 1.42L13.42 12l-5.3-5.3-1.42 1.42L9.59 11H1v2h8.59l-2.88 2.29z"/></svg>
        LOCAÇÃO DE ATIVOS
      </button>
      <button id="btnMenuMultas">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
        CONTROLE DE MULTAS
      </button>
      <button id="btnMenuPatrimonio">
        <svg viewBox="0 0 24 24"><path d="M22 6.18L12 2 2 6.18V12c0 5.52 4.48 10 10 10s10-4.48 10-10V6.18zm-10 13.8c-4.41 0-8-3.59-8-8V7.58l8-3.35 8 3.35v4.41c0 4.41-3.59 8-8 8z"/></svg>
        PATRIMÔNIO (INVENTÁRIO)
      </button>
      <button id="btnMenuDashboards">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
        PAINÉIS DE CONTROLE
      </button>
      <button id="btnMenuGestao">
        <svg viewBox="0 0 24 24"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46.21 14.25 0 14 0h-4c-.25 0-.46.21-.49.46l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73M12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
        GESTÃO DO SISTEMA
      </button>
    </div>
    
    <div class="assinatura-desenvolvedor">
      POR DIOGO MATOS<br>• GESTÃO OPERACIONAL •
    </div>
    
    <button id="btnSidebarLogout" class="btn-logout">
      <svg viewBox="0 0 24 24" style="width:16px; height:16px;"><path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
      SAIR DO SISTEMA
    </button>
  </div>

  <div class="main">
    <div class="topbar">
      <h1>MÉTRICA</h1>
      <p id="subtituloTopbar">LOGADO COMO: ADMINISTRADOR</p>
    </div>
    <div class="content" id="conteudoPrincipal"></div>
  </div>
</div>

<div id="modalContainer" class="hidden"></div>
<datalist id="datalistClientesGlobal"></datalist>

<!-- =========================================================================
     BLOCO 4: SCRIPT PRINCIPAL - CORE LOGIC & WEB API COUPLING
     ========================================================================= -->
<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycby7a2uRwvyKGXtUPT5fXXAxNByIqbYnTfXgAydyEwMVIq_YxVTJOmNAmuQOKEXpKmJJ8w/exec';

const appState = {
  clientes: JSON.parse(localStorage.getItem('orizonClientes')) || [],
  patrimonio: [],
  movimentacoes: [],
  tecnicos: ['DIOGO', 'ADMINISTRADOR'],
  veiculos: ['FIAT STRADA 01 (BRA2E19)', 'FIAT STRADA 02 (ABC1D23)', 'CHEVROLET ONYX (XYZ9H88)', 'MOTO OPERACIONAL (KTM3M11)', 'BASE LINEMED'],
  rotas: [],
  multas: [],
  usuarios: [], 
  usuarioLogado: null,
  idClienteEmEdicao: null,
  idMultaEmEdicao: null,
  idRotaEmEdicao: null,
  buscaTextoCliente: '',
  buscaTextoPatrimonio: '',
  buscaTextoMultas: '',
  buscaTextoRotas: '',
  matrizAtivos: [],
  filtroStatusCliente: 'ATIVO',
  filtroClienteAuditoria: 'GERAL',
  configuracoes: { prefixoTag: 'LMD', digitosTag: 4, empresaRaiz: 'LINEMED ENGENHARIA CLINICA', setoresRaiz: 'ESTOQUE CENTRAL, LABORATORIO' }
};

let contadorParadas = 0;
let contadorOS = 0;

sincronizarDadosPlanilha();
verificarSessaoAtiva();

function marcarAbaAtivaMenu(idBotao) {
  document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('active-menu'));
  const btn = document.getElementById(idBotao); if (btn) btn.classList.add('active-menu');
}

document.getElementById('btnEntrar').addEventListener('click', fazerLogin);
document.getElementById('btnSidebarLogout').addEventListener('click', efetuarLogout);
document.getElementById('logoInicio').addEventListener('click', voltarInicio);

document.getElementById('btnMenuRotas').addEventListener('click', () => { appState.idRotaEmEdicao = null; abrirTela('rotas'); marcarAbaAtivaMenu('btnMenuRotas'); });
document.getElementById('btnMenuClientes').addEventListener('click', () => { abrirTela('clientes'); marcarAbaAtivaMenu('btnMenuClientes'); });
document.getElementById('btnMenuChamados').addEventListener('click', () => { abrirTela('chamados'); marcarAbaAtivaMenu('btnMenuChamados'); });
document.getElementById('btnMenuLocacao').addEventListener('click', () => { abrirTela('locacao'); marcarAbaAtivaMenu('btnMenuLocacao'); });
document.getElementById('btnMenuMultas').addEventListener('click', () => { abrirTela('multas'); marcarAbaAtivaMenu('btnMenuMultas'); });
document.getElementById('btnMenuPatrimonio').addEventListener('click', () => { abrirTela('patrimonio'); marcarAbaAtivaMenu('btnMenuPatrimonio'); });
document.getElementById('btnMenuDashboards').addEventListener('click', () => { abrirTela('dashboards'); marcarAbaAtivaMenu('btnMenuDashboards'); });
document.getElementById('btnMenuGestao').addEventListener('click', () => { abrirTela('gestao'); marcarAbaAtivaMenu('btnMenuGestao'); });

function fazerLogin() {
  const userIn = document.getElementById('loginUser').value.trim().toUpperCase();
  const passIn = document.getElementById('loginPass').value;
  if ((userIn === 'ADMIN' && passIn === '@181989Di') || (userIn === 'VISITANTE' && passIn === '123')) {
    liberarPainel({ nome: userIn === 'ADMIN' ? 'ADMINISTRADOR' : 'VISITANTE', perfil: userIn }); return;
  }
  if (appState.usuarios.length > 0) {
    const conta = appState.usuarios.find(u => String(u.login).toUpperCase() === userIn && String(u.senha) === passIn);
    if (conta) { liberarPainel(conta); return; }
  }
  alert('ACESSO NEGADO!');
}

function liberarPainel(usuario) {
  appState.usuarioLogado = usuario; sessionStorage.setItem('orizonUsuarioAtivo', JSON.stringify(usuario));
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('wrapperSistema').classList.remove('hidden');
  document.getElementById('subtituloTopbar').innerText = `LOGADO COMO: ${usuario.nome.toUpperCase()}`;
  voltarInicio();
}

function efetuarLogout() {
  if (!confirm('SAIR?')) return;
  appState.usuarioLogado = null; sessionStorage.removeItem('orizonUsuarioAtivo');
  document.getElementById('wrapperSistema').classList.add('hidden');
  document.getElementById('loginScreen').style.display = 'flex';
}

function verificarSessaoAtiva() {
  const sessaoSalva = sessionStorage.getItem('orizonUsuarioAtivo');
  if (sessaoSalva) {
    appState.usuarioLogado = JSON.parse(sessaoSalva);
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('wrapperSistema').classList.remove('hidden');
    document.getElementById('subtituloTopbar').innerText = `LOGADO COMO: ${appState.usuarioLogado.nome.toUpperCase()}`;
    voltarInicio();
  }
}

function sincronizarDadosPlanilha() {
  const urlFinal = `${WEB_APP_URL}?acao=listarCadastros&prefix=processarRetornoSincronizacao`;
  const scriptAntigo = document.getElementById('jsonp_sync_script'); if(scriptAntigo) scriptAntigo.remove();
  const scriptElement = document.createElement('script'); scriptElement.id = 'jsonp_sync_script'; scriptElement.src = urlFinal; document.body.appendChild(scriptElement);
}

window.processarRetornoSincronizacao = function(res) {
  if (res && res.sucesso) {
    appState.clientes = res.clientes || []; appState.patrimonio = res.patrimonio || [];
    appState.movimentacoes = res.movimentacoes || []; appState.usuarios = res.usuarios || [];
    appState.veiculos = ['FIAT STRADA 01 (BRA2E19)', 'FIAT STRADA 02 (ABC1D23)', 'CHEVROLET ONYX (XYZ9H88)', 'MOTO OPERACIONAL (KTM3M11)', 'BASE LINEMED'];
    appState.matrizAtivos = res.matrizAtivos || []; appState.rotas = res.rotas || []; appState.multas = res.multas || [];
    if(res.configuracoes) appState.configuracoes = res.configuracoes;
    localStorage.setItem('orizonClientes', JSON.stringify(appState.clientes));
    
    if (document.getElementById('tbodyRotasOperacionais')) atualizarTabelaRotasNativa();
    if (document.getElementById('listaClientesTbody')) atualizarTabelaClientesLocal();
    if (document.getElementById('listaPatrimonioTbody')) atualizarTabelaPatrimonioLocal();
    if (document.getElementById('listaMultasTbody')) atualizarTabelaMultasLocal();
    if (document.getElementById('listaUsuariosTbody')) atualizarTabelaUsuariosLocal();
    if (document.getElementById('tbodyMatrizAtivosParam')) desenharTabelaMatrizAtivos();
  }
};

/* =========================================================================
     BLOCO 5: GERENCIADOR INTEGRAL DE ROTAS OPERACIONAIS DIÁRIAS (100%)
     ========================================================================= */
function abrirTela(menu) {
  const principal = document.getElementById('conteudoPrincipal');
  if (menu === 'inicio') {
    principal.innerHTML = `<h2>CENTRO DE CONTROLE OPERACIONAL</h2><p style="color:#64748b; margin-top:5px;">UTILIZE A SIDEBAR LATERAL PARA ACESSAR AS ROTINAS LOGÍSTICAS DA LINEMED.</p>`;
  } else if (menu === 'rotas') {
    let optTecnicos = '<option value="">SELECIONE O TÉCNICO...</option>';
    appState.usuarios.forEach(u => optTecnicos += `<option value="${u.nome.toUpperCase()}">${u.nome.toUpperCase()}</option>`);
    let optVeiculos = '<option value="">SELECIONE O VEÍCULO...</option>';
    appState.veiculos.forEach(v => optVeiculos += `<option value="${v.toUpperCase()}">${v.toUpperCase()}</option>`);

    principal.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2>📍 PROGRAMAÇÃO DE ATENDIMENTO LINEMED</h2>
        <div style="display:flex; gap:10px;">
          <button class="btn-primary" onclick="document.getElementById('divRotasMonitor').classList.remove('hidden'); document.getElementById('divRotasCriar').classList.add('hidden');">📋 VER MONITOR / CONSULTAR</button>
          <button class="btn-success" onclick="appState.idRotaEmEdicao = null; document.getElementById('divRotasMonitor').classList.add('hidden'); document.getElementById('divRotasCriar').classList.remove('hidden');">➕ NOVA ROTA</button>
        </div>
      </div>
      <div id="divRotasMonitor" class="card-padrao">
        <input type="text" id="inputBuscaFiltroRotas" class="input-padrao" placeholder="BUSCAR POR TÉCNICO, VEÍCULO OU CLIENTE..." style="margin-bottom:15px;">
        <div class="tabela-container"><table class="tabela-sistema"><thead><tr><th>ID ROTA</th><th>DATA</th><th>EQUIPE TÉCNICA</th><th>VEÍCULO ALOCADO</th><th>AÇÕES GERAIS</th></tr></thead><tbody id="tbodyRotasOperacionais"></tbody></table></div>
      </div>
      <div id="divRotasCriar" class="hidden">
        <div class="card-padrao">
          <div class="form-grid">
            <div class="form-grupo"><label>TÉCNICO RESPONSÁVEL 1 *</label><select id="rotaTecnico" class="select-padrao">${optTecnicos}</select></div>
            <div class="form-grupo"><label>TÉCNICO 2 / AUXILIAR *</label><select id="rotaTecnico2" class="select-padrao">${optTecnicos}</select></div>

function buscarEnderecoClienteMetrika(idParada) {
  const select = document.getElementById(`cli_parada_${idParada}`); const labelEnd = document.getElementById(`end_exibicao_parada_${idParada}`);
  if(!select || !labelEnd) return;
  const match = appState.clientes.find(c => c.nome.toUpperCase() === select.value.toUpperCase());
  labelEnd.innerText = match ? `📍 ENDEREÇO: ${match.logradouro || ''}, Nº ${match.numero || ''} - ${match.bairro || ''}` : '';
}

function adicionarLinhaOSMetrika(idParada) {
  contadorOS++; const tbody = document.getElementById(`tbody_os_${idParada}`); if(!tbody) return;
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td><input type="text" class="input-padrao" placeholder="N° O.S."></td>
    <td><input type="text" class="input-padrao" placeholder="TAG" onchange="buscaAtivoPorFiltro(${contadorOS}, 'tag')" id="tag_os_${contadorOS}"></td>
    <td><input type="text" class="input-padrao" placeholder="SÉRIE" onchange="buscaAtivoPorFiltro(${contadorOS}, 'serie')" id="ser_os_${contadorOS}"></td>

  tbody.appendChild(tr);
}

function buscaAtivoPorFiltro(idLinha, tipo) {
  const input = document.getElementById(tipo === 'tag' ? `tag_os_${idLinha}` : `ser_os_${idLinha}`); if(!input) return;
  const busca = input.value.trim().toUpperCase();
  const ativo = appState.patrimonio.find(p => tipo === 'tag' ? (p.tag || '').toUpperCase() === busca : (p.serie || '').toUpperCase() === busca);
  if(ativo) {
    document.getElementById(`tag_os_${idLinha}`).value = ativo.tag.toUpperCase();
    document.getElementById(`ser_os_${idLinha}`).value = ativo.serie.toUpperCase();
    document.getElementById(`desc_os_${idLinha}`).value = `${ativo.equipamento} | ${ativo.modelo}`.toUpperCase();
  }
}

function atualizarTabelaRotasNativa() {
  const tbody = document.getElementById('tbodyRotasOperacionais'); if(!tbody) return; tbody.innerHTML = '';
  if(appState.rotas.length === 0) { tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;">NENHUMA JORNADA LOCALIZADA...</td></tr>`; return; }
  const agrupadas = {};
  appState.rotas.forEach(r => {
    const id = r.id_rota || r.ID_ROTA || 'ROT-PADRAO';
    if(!agrupadas[id]) agrupadas[id] = { id_rota: id, data: r.data, tecnico: r.tecnico, auxiliar: r.auxiliar || '-', veiculo: r.veiculo };
  });
  Object.values(agrupadas).forEach(r => {
    let tr = document.createElement('tr');
    tr.innerHTML = `<td><b>${r.id_rota}</b></td><td>${formatarDataBr(r.data)}</td><td>1: ${r.tecnico}<br>2: ${r.auxiliar}</td><td><b>${r.veiculo}</b></td><td><button class="btn-primary" onclick="prepararEdicaoRotaMetrika('${r.id_rota}')">📝 CORRIGIR</button> <button class="btn-secondary" onclick="imprimirEspelhoRotaMetrika('${r.id_rota}')">🖨️ IMPRIMIR</button></td>`;
    tbody.appendChild(tr);
  });
}

function salvarRotaFinalMetrika() {
  const tecnico = document.getElementById('rotaTecnico').value; const tecnico2 = document.getElementById('rotaTecnico2').value;
  const veiculo = document.getElementById('rotaVeiculo').value; const data = document.getElementById('rotaData').value;
  if(!tecnico || !veiculo || !data) return alert('PREENCHA TODOS OS CAMPOS OBRIGATÓRIOS DO CABEÇALHO!');
  const paradasLista = [];
  document.querySelectorAll('.container-parada').forEach(card => {
    const id = card.id.split('_')[1]; const cliente = document.getElementById(`cli_parada_${id}`).value; if(!cliente) return;
    const linhasOS = [];
    card.querySelectorAll('tbody tr').forEach(tr => {
      const inputs = tr.querySelectorAll('input');
      linhasOS.push({ numeroOS: inputs[0].value, tag: inputs[1].value, serie: inputs[2].value, equipamento: inputs[3].value, logistica: tr.querySelector('select').value });
    });
    paradasLista.push({ cliente: cliente, linhasOS: linhasOS });
  });
  const pacote = { cabecalho: { tecnico: tecnico, auxiliar: tecnico2 || '-', veiculo: veiculo, data: data }, paradas: paradasLista };
  const urlFinal = `${WEB_APP_URL}?acao=salvarRotaLogistica&dados=${encodeURIComponent(JSON.stringify(pacote))}&prefix=processarRetornoRotaSheets`;
  const scriptElement = document.createElement('script'); scriptElement.src = urlFinal; document.body.appendChild(scriptElement);
}

window.processarRetornoRotaSheets = function(res) { if(res && res.sucesso) { alert('ROTA GRAVADA COM SUCESSO!'); sincronizarDadosPlanilha(); abrirTela('rotas'); } };

function processarMovimentacaoLocacao() {
  const tag = document.getElementById('movTagInput').value.toUpperCase(); const cli = document.getElementById('movCliente').value; const tipo = document.getElementById('movTipo').value;

  const pacote = { tag: tag, equipment: p.equipamento, origens: tipo === 'ENVIO' ? 'SEDE' : cli, destino: tipo === 'ENVIO' ? cli : 'SEDE', tipo: tipo, responsavel: 'SISTEMA' };
  fetch(`${WEB_APP_URL}?acao=registrarMovimentacao&dados=${encodeURIComponent(JSON.stringify(pacote))}`, {method:'POST', mode:'no-cors'}).then(() => { alert('MOVIMENTAÇÃO REALIZADA!'); sincronizarDadosPlanilha(); });

          <div class="form-grupo"><label>PERFIL</label><select id="formUserPerfil" class="select-padrao"><option value="Técnico">TÉCNICO</option><option value="Gestor">GESTOR</option><option value="Admin">ADMIN</option></select></div>
        </div>
        <h4 style="font-size:12px; color:var(--cor-primaria); margin-top:20px;">🪪 DOCUMENTAÇÃO</h4>
        <div class="form-grid"><div class="form-grupo"><label>CPF</label><input type="text" id="formUserCpf" class="input-padrao"></div><div class="form-grupo"><label>TELEFONE</label><input type="text" id="formUserTelefone" class="input-padrao"></div></div>
        <div style="display:flex; justify-content:flex-end; margin-top:15px;"><button class="btn-success" id="btnSalvarUsuarioPlanilha">💾 SALVAR COLABORADOR</button></div>
      </div>
      <div class="card-padrao">
        <h3>COLABORADORES DA BASE</h3>
        <div class="tabela-container"><table class="tabela-sistema"><thead><tr><th>NOME COMPLETO</th><th>LOGIN</th><th>PERFIL</th><th>STATUS</th></tr></thead><tbody id="listaUsuariosTbody"></tbody></table></div>
      </div>`;
    document.getElementById('btnSalvarUsuarioPlanilha').addEventListener('click', enviarUsuarioPlanilha);
    atualizarTabelaUsuariosLocal();
  } else if (aba === 'itens_inventario') {
    document.getElementById('tabItensInventario').classList.add('active');
    subContainer.innerHTML = `
      <div class="card-padrao" style="display:flex; gap:12px;"><button onclick="abrirModalDescricao()" class="btn-success">➕ CADASTRAR DESCRIÇÃO GERAL</button> <button onclick="abrirModalModeloVinculo()" class="btn-primary">➕ HOMOLOGAR MODELO/MARCA</button></div>
      <div class="card-padrao"><div class="tabela-container"><table class="tabela-sistema"><thead><tr><th>EQUIPAMENTO</th><th>MODELO DE FÁBRICA</th><th>FABRICANTE</th></tr></thead><tbody id="tbodyMatrizAtivosParam"></tbody></table></div></div>`;
    desenharTabelaMatrizAtivos();
  } else {
    document.getElementById('tabConfiguracoes').classList.add('active');
    subContainer.innerHTML = `
      <div class="card-padrao">
        <h3>🛠️ CONFIGURAÇÕES GERAIS</h3>
        <div class="form-grid" style="margin-top:15px;">
          <div class="form-grupo"><label>PREFIXO GLOBAL DAS TAGs *</label><input type="text" id="cfgPrefixoTag" class="input-padrao" value="${appState.configuracoes.prefixoTag}"></div>
          <div class="form-grupo"><label>RAZÃO SOCIAL DO SISTEMA *</label><input type="text" id="cfgEmpresaRaiz" class="input-padrao" value="${appState.configuracoes.empresaRaiz}"></div>
        </div>
      </div>`;
  }
}

function abrirModalDescricao() {
  const html = `<div class="modal-overlay"><div class="modal-box"><h3>🏥 NOVA DESCRIÇÃO</h3><input type="text" id="modalInputEquip" class="input-padrao" style="margin:15px 0;"><button class="btn-success" onclick="salvarModalDescricao()">SALVAR</button> <button class="btn-secondary" onclick="fecharModal()">FECHAR</button></div></div>`;
  document.getElementById('modalContainer').innerHTML = html; document.getElementById('modalContainer').classList.remove('hidden');
}

function abrirModalModeloVinculo() {
  const html = `<div class="modal-overlay"><div class="modal-box"><h3>📐 HOMOLOGAR MODELO</h3><input type="text" id="modalSelectEquip" class="input-padrao" placeholder="DESCRIÇÃO"><input type="text" id="modalInputModelo" class="input-padrao" placeholder="MODELO" style="margin:10px 0;"><input type="text" id="modalInputFab" class="input-padrao" placeholder="FABRICANTE"><button class="btn-primary" onclick="salvarModalVinculo()" style="margin-top:15px;">SALVAR</button> <button class="btn-secondary" onclick="fecharModal()">FECHAR</button></div></div>`;
  document.getElementById('modalContainer').innerHTML = html; document.getElementById('modalContainer').classList.remove('hidden');
}

function fecharModal() { document.getElementById('modalContainer').innerHTML = ''; document.getElementById('modalContainer').classList.add('hidden'); }

function salvarModalDescricao() {
  const txt = document.getElementById('modalInputEquip').value.toUpperCase(); if(!txt) return;
  const d = { id_registro: 'mat_'+Date.now(), equipamento: txt, modelo: '-', fabricante: '-', status: 'ATIVO' };
  fetch(`${WEB_APP_URL}?acao=salvarCadastro&tipo=MATRIZ_ATIVOS&dados=${encodeURIComponent(JSON.stringify(d))}`, {method:'POST', mode:'no-cors'}).then(() => { fecharModal(); sincronizarDadosPlanilha(); });
}

function salvarModalVinculo() {
  const eq = document.getElementById('modalSelectEquip').value.toUpperCase(); const mo = document.getElementById('modalInputModelo').value.toUpperCase(); const fa = document.getElementById('modalInputFab').value.toUpperCase();
  const d = { id_registro: 'mat_'+Date.now(), equipamento: eq, modelo: mo, fabricante: fa, status: 'ATIVO' };
  fetch(`${WEB_APP_URL}?acao=salvarCadastro&tipo=MATRIZ_ATIVOS&dados=${encodeURIComponent(JSON.stringify(d))}`, {method:'POST', mode:'no-cors'}).then(() => { fecharModal(); sincronizarDadosPlanilha(); });
}

function desenharTabelaMatrizAtivos() {
  const tbody = document.getElementById('tbodyMatrizAtivosParam'); if(!tbody) return; tbody.innerHTML = '';
  appState.matrizAtivos.forEach(i => {
    tbody.innerHTML += `<tr><td><b>${i.equipamento}</b></td><td>${i.modelo}</td><td>${i.fabricante}</td></tr>`;
  });
}

function atualizarTabelaUsuariosLocal() {
  const tbody = document.getElementById('listaUsuariosTbody'); if(!tbody) return; tbody.innerHTML = '';
  appState.usuarios.forEach(u => {
    tbody.innerHTML += `<tr><td><b>${u.nome}</b></td><td>${u.login}</td><td>${u.perfil}</td><td>${u.status || 'ATIVO'}</td></tr>`;
  });
}

function enviarUsuarioPlanilha() {
  const d = { id: 'usr_'+Date.now(), nome: document.getElementById('formUserNome').value.toUpperCase(), login: document.getElementById('formUserLogin').value.toUpperCase(), senha: document.getElementById('formUserSenha').value, perfil: document.getElementById('formUserPerfil').value, status: 'ATIVO', cpf: document.getElementById('formUserCpf').value, telephone: document.getElementById('formUserTelefone').value };
  const urlFinal = `${WEB_APP_URL}?acao=salvarCadastro&tipo=USUARIO&dados=${encodeURIComponent(JSON.stringify(d))}&prefix=processarRetornoGoogleSheets`;
  const scriptElement = document.createElement('script'); scriptElement.src = urlFinal; document.body.appendChild(scriptElement);
}

window.processarRetornoGoogleSheets = function() { alert('USUÁRIO SALVO!'); sincronizarDadosPlanilha(); abrirTela('gestao'); };

/* =========================================================================
     FUNÇÕES UTILITÁRIAS TÉCNICAS E DE FORMATAÇÃO DE DATA
     ========================================================================= */
function formatarDataBr(d) { if(!d) return '-'; const parts = d.split(' ')[0].split('-'); return parts.length === 3 ? `${parts[2]}/${parts[1]}/${parts[0]}` : d; }
</script>
</body>
</html>
