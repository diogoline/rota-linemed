<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORIZON | Smart Operations</title>
<style>
:root {
  --bg-sistema: #f8fafc;
  --sidebar-dark: #0f172a;
  --sidebar-hover: #1e293b;
  --cor-marca: #2563eb;
  --cor-marca-hover: #1d4ed8;
  --cor-sucesso: #10b981;
  --cor-perigo: #ef4444;
  --cor-alerta: #f59e0b;
  --texto-principal: #1e293b;
  --texto-mutado: #64748b;
  --borda-suave: #cbd5e1;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
body { background: var(--bg-sistema); color: var(--texto-principal); display: flex; min-height: 100vh; -webkit-font-smoothing: antialiased; }

/* INPUTS E FORMULÁRIOS */
.input-padrao, .select-padrao, .textarea-padrao {
  width: 100%; padding: 11px 14px; border: 1px solid var(--borda-suave); border-radius: 8px; background: white; font-size: 13px; color: var(--texto-principal); transition: all 0.2s ease; outline: none;
}
.input-padrao:focus, .select-padrao:focus { border-color: var(--cor-marca); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

/* BOTÕES */
button { border: none; padding: 10px 18px; border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.2s ease; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
button:hover { transform: translateY(-1px); filter: brightness(1.05); }
.btn-primary { background: var(--cor-marca); color: white; }
.btn-success { background: var(--cor-sucesso); color: white; }
.btn-danger { background: var(--cor-perigo); color: white; }
.btn-secondary { background: #e2e8f0; color: #334155; }

/* CARDS E GRIDS */
.card-padrao { background: #ffffff; border-radius: 12px; padding: 24px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); margin-bottom: 20px; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
.form-grupo { display: flex; flex-direction: column; gap: 6px; }
.form-grupo label { font-size: 12px; font-weight: 700; color: var(--texto-mutado); text-transform: uppercase; }

/* SIDEBAR ALINHADA */
.sidebar { width: 260px; background: var(--sidebar-dark); color: #fff; position: fixed; top: 0; left: 0; bottom: 0; padding: 24px 16px; display: flex; flex-direction: column; box-shadow: 4px 0 20px rgba(0,0,0,0.1); z-index: 100; }
.logo { font-size: 26px; font-weight: 800; color: #fff; cursor: pointer; letter-spacing: -0.5px; margin-bottom: 4px; }
.sidebar small { color: #475569; display: block; margin-bottom: 28px; font-weight: 700; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; }
.menu-items { flex-grow: 1; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }

/* BOTÕES DO MENU PREMIUM ALINHADOS */
.sidebar .btn-menu { width: 100%; border: none; background: transparent; color: #94a3b8; padding: 13px 16px; border-radius: 8px; text-align: left; font-weight: 600; font-size: 14px; transition: all 0.2s ease; display: flex; align-items: center; gap: 12px; cursor: pointer; }
.sidebar .btn-menu:hover { background: var(--sidebar-hover); color: #fff; }
.sidebar .btn-menu.active { background: var(--cor-marca); color: #fff; font-weight: 700; }
.sidebar .btn-logout { background: rgba(239, 68, 68, 0.1); color: var(--cor-perigo); margin-top: auto; font-weight: 700; }
.sidebar .btn-logout:hover { background: var(--cor-perigo); color: white; }

/* LAYOUT PRINCIPAL */
.main { margin-left: 260px; width: calc(100% - 240px); display: flex; flex-direction: column; min-height: 100vh; }
.topbar { background: #ffffff; padding: 20px 32px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
.topbar h1 { font-size: 22px; font-weight: 800; color: var(--texto-principal); }
.topbar p { color: var(--texto-mutado); font-size: 13px; margin-top: 2px; }
.content { padding: 32px; flex-grow: 1; }

/* INDICADORES */
.dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 24px; }
.card-indicador { background: #ffffff; padding: 22px; border-radius: 12px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 6px; position: relative; overflow: hidden; }
.card-indicador::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--cor-marca); }
.card-indicador.sucesso::before { background: var(--cor-sucesso); }
.card-indicador h4 { font-size: 11px; text-transform: uppercase; color: var(--texto-mutado); font-weight: 700; }
.card-indicador .valor { font-size: 32px; font-weight: 800; color: var(--texto-principal); }

/* TABELAS */
.tabela-container { width: 100%; overflow-x: auto; margin-top: 10px; border-radius: 8px; border: 1px solid #e2e8f0; }
.tabela-sistema { width: 100%; border-collapse: collapse; min-width: 900px; text-align: left; }
.tabela-sistema th { background: #f8fafc; padding: 12px 14px; font-size: 12px; font-weight: 700; color: var(--texto-mutado); text-transform: uppercase; border-bottom: 1px solid #e2e8f0; }
.tabela-sistema td { padding: 12px 14px; border-bottom: 1px solid #e2e8f0; font-size: 13px; background: white; white-space: nowrap; }

.badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; display: inline-block; }
.badge-sucesso { background: #dcfce7; color: #15803d; }
.badge-perigo { background: #fee2e2; color: #b91c1c; }

.hidden { display: none !important; }
</style>
</head>
<body>

<div id="loginScreen" style="position:fixed; inset:0; background: var(--sidebar-dark); display:flex; align-items:center; justify-content:center; z-index:99999;">
  <div style="width:100%; max-width:400px; background:white; padding:40px; border-radius:16px; box-shadow:0 20px 40px rgba(0,0,0,0.3); text-align:center;">
    <div style="font-size:34px; font-weight:800; color: var(--sidebar-dark); margin-bottom:4px;">⚡ ORIZON</div>
    <p style="color: var(--texto-mutado); font-size:14px; margin-bottom:28px;">Smart Operations Platform</p>
    <div style="display:flex; flex-direction:column; gap:16px; text-align:left; margin-bottom:24px;">
      <div class="form-grupo"><label>Usuário</label><input id="loginUser" type="text" class="input-padrao" placeholder="Ex: admin"></div>
      <div class="form-grupo"><label>Senha</label><input id="loginPass" type="password" class="input-padrao" placeholder="••••••••"></div>
    </div>
    <button id="btnEntrar" class="btn-primary" style="width:100%; padding:12px; font-weight:700;">Entrar no Sistema</button>
  </div>
</div>

<div id="wrapperSistema" class="hidden" style="width:100%; display:flex;">
  <div class="sidebar">
    <div class="logo" id="logoInicio">⚡ ORIZON</div>
    <small>Operations Management</small>
    
    <div class="menu-items">
      <button id="btnMenuInicio" class="btn-menu">🏠 Painel Principal</button>
      <button id="btnMenuRotas" class="btn-menu">📍 Rotas Diárias</button>
      <button id="btnMenuChamados" class="btn-menu">🛠️ Chamados / Nova O.S</button>
      <button id="btnMenuClientes" class="btn-menu">🏢 Clientes / Unidades</button>
      <button id="btnMenuLocacao" class="btn-menu">🤝 Locação Ativos</button>
      <button id="btnMenuPatrimonio" class="btn-menu">📦 Cadastro Equipamento</button>
      <button id="btnMenuConfig" class="btn-menu">⚙️ Configurações / Equipe</button>
    </div>
    
    <button id="btnSidebarLogout" class="btn-menu btn-logout">🚪 Sair do Sistema</button>
  </div>

  <div class="main">
    <div class="topbar">
      <div>
        <h1 id="tituloPaginaHeader">Painel Principal</h1>
        <p id="subtituloTopbar">Bem-vindo ao centro operacional</p>
      </div>
      <button id="btnSyncGeral" class="btn-secondary">🔄 Sincronizar Base</button>
    </div>
    <div class="content" id="conteudoPrincipal"></div>
  </div>
</div>

<datalist id="listaAutocompletarClientes"></datalist>

<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyHIvNs0aEU9ZbNzg6mYd5g1y5bl1dbMgnJywmp9VXxLLcC9c_qIrUHiyTNapa1zpyksA/exec';

const appState = {
  clientes: JSON.parse(localStorage.getItem('orizonClientes')) || [],
  patrimonio: [],
  movimentacoes: [],
  usuarios: [],
  tecnicos: ['Diogo', 'Fagner Lima', 'Administrador'],
  veiculos: ['Strada', 'Fiorino'],
  rotas: JSON.parse(localStorage.getItem('orizonRotas')) || [],
  usuarioLogado: null,
  telaAtual: 'inicio',
  idEdicao: null
};

document.getElementById('btnEntrar').addEventListener('click', fazerLogin);
document.getElementById('btnSidebarLogout').addEventListener('click', efetuarLogout);
document.getElementById('btnSyncGeral').addEventListener('click', sincronizarDadosPlanilha);
document.getElementById('logoInicio').addEventListener('click', voltarInicio);

document.getElementById('btnMenuInicio').addEventListener('click', () => abrirTela('inicio'));
document.getElementById('btnMenuRotas').addEventListener('click', () => abrirTela('rotas'));
document.getElementById('btnMenuChamados').addEventListener('click', () => abrirTela('chamados'));
document.getElementById('btnMenuClientes').addEventListener('click', () => abrirTela('clientes'));
document.getElementById('btnMenuLocacao').addEventListener('click', () => abrirTela('locacao'));
document.getElementById('btnMenuPatrimonio').addEventListener('click', () => abrirTela('patrimonio'));
document.getElementById('btnMenuConfig').addEventListener('click', () => abrirTela('config'));

function fazerLogin() {
  const userIn = document.getElementById('loginUser').value.trim().toLowerCase();
  const passIn = document.getElementById('loginPass').value;
  if ((userIn === 'admin' && passIn === '@181989Di') || (userIn === 'visitante' && passIn === '123')) {
    liberarPainel({ nome: userIn === 'admin' ? 'Administrador' : 'Visitante' });
  } else { alert('Credenciais inválidas!'); }
}

function liberarPainel(usuario) {
  appState.usuarioLogado = usuario;
  sessionStorage.setItem('orizonUsuarioAtivo', JSON.stringify(usuario));
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('wrapperSistema').classList.remove('hidden');
  sincronizarDadosPlanilha();
  voltarInicio();
}

function efetuarLogout() {
  sessionStorage.removeItem('orizonUsuarioAtivo');
  window.location.reload();
}

function verificarSessaoAtiva() {
  const salva = sessionStorage.getItem('orizonUsuarioAtivo');
  if (salva) { appState.usuarioLogado = JSON.parse(salva); liberarPainel(appState.usuarioLogado); }
}

function sincronizarDadosPlanilha() {
  const btn = document.getElementById('btnSyncGeral');
  btn.innerText = '⏳ Sincronizando...'; btn.disabled = true;
  fetch(`${WEB_APP_URL}?acao=listarCadastros`)
    .then(res => res.json())
    .then(res => {
      if (res.sucesso) {
        appState.clientes = res.clientes || [];
        appState.patrimonio = res.patrimonio || [];
        appState.movimentacoes = res.movimentacoes || [];
        appState.usuarios = res.usuarios || [];
        localStorage.setItem('orizonClientes', JSON.stringify(appState.clientes));
        recarregarDadosVisuaisAtivos();
      }
      btn.innerText = '🔄 Sincronizar Base'; btn.disabled = false;
    }).catch(() => { btn.innerText = '🔄 Sincronizar Base'; btn.disabled = false; });
}

function marcarMenuAtivo(idBotao) {
  document.querySelectorAll('.sidebar .btn-menu').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById(idBotao);
  if(btn) btn.classList.add('active');
}

function recarregarDadosVisuaisAtivos() {
  popularDatalistsGlobais();
  if (appState.telaAtual === 'inicio') abrirTela('inicio');
  if (appState.telaAtual === 'clientes' && document.getElementById('listaClientesTbody')) atualizarTabelaClientesLocal();
  if (appState.telaAtual === 'patrimonio' && document.getElementById('listaPatrimonioTbody')) atualizarTabelaPatrimonioLocal();
  if (appState.telaAtual === 'config' && document.getElementById('listaUsuariosTbody')) atualizarTabelaUsuariosLocal();
}

function popularDatalistsGlobais() {
  const dl = document.getElementById('listaAutocompletarClientes');
  if (dl) {
    dl.innerHTML = '';
    appState.clientes.filter(c => c.status === 'ATIVO').forEach(c => {
      let opt = document.createElement('option'); opt.value = c.nome; dl.appendChild(opt);
    });
  }
}

function abrirTela(menu) {
  appState.telaAtual = menu;
  const principal = document.getElementById('conteudoPrincipal');
  const header = document.getElementById('tituloPaginaHeader');
  const sub = document.getElementById('subtituloTopbar');
  
  if (menu === 'inicio') {
    marcarMenuAtivo('btnMenuInicio');
    header.innerText = 'Painel Principal'; sub.innerText = 'Visão geral da operação e sincronismo';
    principal.innerHTML = `
      <div class="dashboard-grid">
        <div class="card-indicador"><h4>Clientes na Base</h4><div class="valor">${appState.clientes.length}</div></div>
        <div class="card-indicador sucesso"><h4>Ativos em Estoque</h4><div class="valor">${appState.patrimonio.filter(p=>p.status==='DISPONÍVEL EM ESTOQUE').length}</div></div>
        <div class="card-indicador"><h4>Ativos Alocados</h4><div class="valor">${appState.patrimonio.filter(p=>p.status==='LOCADO').length}</div></div>
      </div>`;
  } else if (menu === 'clientes') {
    marcarMenuAtivo('btnMenuClientes');
    header.innerText = 'Clientes e Unidades'; sub.innerText = 'Fichas e base cadastral integrada';
    renderizarTelaClientes(principal);
  } else if (menu === 'patrimonio') {
    marcarMenuAtivo('btnMenuPatrimonio');
    header.innerText = 'Cadastro de Equipamento'; sub.innerText = 'Gerenciamento do inventário central';
    renderizarTelaPatrimonio(principal);
  } else if (menu === 'locacao') {
    marcarMenuAtivo('btnMenuLocacao');
    header.innerText = 'Controle de Locações'; sub.innerText = 'Movimentação física de ativos';
    renderizarTelaLocacao(principal);
  } else if (menu === 'rotas') {
    marcarMenuAtivo('btnMenuRotas');
    header.innerText = 'Rotas Técnicas Diárias'; sub.innerText = 'Distribuição e acompanhamento de itinerários';
    renderizarTelaRotas(principal);
  } else if (menu === 'chamados') {
    marcarMenuAtivo('btnMenuChamados');
    header.innerText = 'Abertura de Chamado'; sub.innerText = 'Emissão de ordens de serviço e triagem técnica';
    renderizarTelaChamados(principal);
  } else if (menu === 'config') {
    marcarMenuAtivo('btnMenuConfig');
    header.innerText = 'Configurações de Equipe'; sub.innerText = 'Cadastro de novos acessos do sistema';
    renderizarTelaConfig(principal);
  }
}
function voltarInicio() { abrirTela('inicio'); }

// =========================================================================
// MÓDULO: CLIENTES COMPLETO ORIGINAL (RESTAURADO COM AS 16 COLUNAS)
// =========================================================================
function renderizarTelaClientes(container) {
  container.innerHTML = `
    <div class="card-padrao">
      <h3 id="tituloFormCliente" style="margin-bottom:15px; color:var(--cor-marca);">Ficha de Cadastro do Cliente</h3>
      <div class="form-grid">
        <div class="form-grupo"><label>Tipo de Pessoa</label><select id="formTipoPessoa" class="select-padrao"><option value="JURIDICA">Pessoa Jurídica (CNPJ)</option><option value="FISICA">Pessoa Física (CPF)</option></select></div>
        <div class="form-grupo"><label id="labelDocumento">CNPJ (Consulta Auto Receita)</label><input type="text" id="formCnpj" class="input-padrao" placeholder="00.000.000/0001-00"></div>
        <div class="form-grupo"><label>Cliente / Unidade *</label><input type="text" id="formCliente" class="input-padrao" placeholder="Nome do Cliente / UBS"></div>
        <div class="form-grupo"><label>Contrato</label><input type="text" id="formContrato" class="input-padrao" placeholder="Nº Contrato"></div>
        <div class="form-grupo"><label>CEP</label><input type="text" id="formCep" class="input-padrao" placeholder="00000-000"></div>
        <div class="form-grupo"><label>Logradouro</label><input type="text" id="formLogradouro" class="input-padrao" placeholder="Rua / Av"></div>
        <div class="form-grupo"><label>Número</label><input type="text" id="formNumero" class="input-padrao" placeholder="Nº"></div>
        <div class="form-grupo"><label>Complemento</label><input type="text" id="formComplemento" class="input-padrao" placeholder="Sala, Bloco..."></div>
        <div class="form-grupo"><label>Bairro</label><input type="text" id="formBairro" class="input-padrao" placeholder="Bairro"></div>
        <div class="form-grupo"><label>Cidade</label><input type="text" id="formCidade" class="input-padrao" value="SÃO PAULO"></div>
        <div class="form-grupo"><label>UF</label><input type="text" id="formUf" class="input-padrao" value="SP" maxlength="2"></div>
        <div class="form-grupo"><label>Região</label><input type="text" id="formRegiao" class="input-padrao" placeholder="Ex: Norte, Sul, Monte Azul"></div>
        <div class="form-grupo"><label>Responsável</label><input type="text" id="formResponsavel" class="input-padrao" placeholder="Nome do contato"></div>
        <div class="form-grupo"><label>Telefone</label><input type="text" id="formTelefone" class="input-padrao" placeholder="(11) 99999-0000"></div>
        <div class="form-grupo"><label>E-mail</label><input type="email" id="formEmail" class="input-padrao" placeholder="email@provedor.com"></div>
        <div class="form-grupo"><label>Status</label><select id="formStatus" class="select-padrao"><option value="ATIVO">ATIVO</option><option value="INATIVO">INATIVO</option></select></div>
      </div>
      <div style="margin-top:12px;"><div class="form-grupo"><label>Observações</label><input type="text" id="formObservacao" class="input-padrao" placeholder="Observações operacionais do cliente"></div></div>
      <div style="display:flex; justify-content: flex-end; gap:10px; margin-top:15px;"><button id="btnCancelarEdicao" class="btn-secondary hidden">Cancelar Edição</button><button id="btnSalvarCliente" class="btn-success" style="min-width: 180px;">💾 Salvar Cliente</button></div>
    </div>
    <div class="card-padrao">
      <h3>Clientes na Base</h3>
      <div class="tabela-container"><table class="tabela-sistema"><thead><tr><th>CLIENTE</th><th>CNPJ/CPF</th><th>CONTRATO</th><th>LOGRADOURO</th><th>BAIRRO</th><th>STATUS</th><th style="text-align:center;">AÇÕES</th></tr></thead><tbody id="listaClientesTbody"></tbody></table></div>
    </div>`;

  document.getElementById('btnSalvarCliente').addEventListener('click', verificarESalvarCliente);
  document.getElementById('btnCancelarEdicao').addEventListener('click', () => abrirTela('clientes'));
  document.getElementById('formCep').addEventListener('blur', buscarCepAutomatico);
  document.getElementById('formCnpj').addEventListener('blur', verificarDocumentoEReceita);
  document.getElementById('formCnpj').addEventListener('input', aplicarMascaraDocumento);
  document.getElementById('formCep').addEventListener('input', aplicarMascaraCep);
  document.getElementById('formTelefone').addEventListener('input', aplicarMascaraTelefone);
  
  atualizarTabelaClientesLocal();
}

function verificarDocumentoEReceita() {
  const doc = this.value.trim(); if (!doc) return;
  const dup = appState.clientes.find(c => c.cnpj === doc && c.id !== appState.idEdicao);
  if (dup) { alert(`🚨 O documento ${doc} já está cadastrado para o cliente "${dup.nome}"!`); this.value = ''; return; }
  const clean = doc.replace(/\D/g, '');
  if (document.getElementById('formTipoPessoa').value === 'JURIDICA' && clean.length === 14) {
    fetch(`https://brasilapi.com.br/api/cnpj/v1/${clean}`)
      .then(res => res.json())
      .then(dados => {
        document.getElementById('formCliente').value = dados.razao_social || '';
        document.getElementById('formCep').value = dados.cep ? dados.cep.replace(/^(\d{5})(\d)/, "$1-$2") : '';
        document.getElementById('formLogradouro').value = dados.logradouro || '';
        document.getElementById('formNumero').value = dados.numero || '';
        document.getElementById('formBairro').value = dados.bairro || '';
        document.getElementById('formCidade').value = dados.municipio || 'SÃO PAULO';
        document.getElementById('formUf').value = dados.uf || 'SP';
      }).catch(() => {});
  }
}

function aplicarMascaraDocumento() {
  let v = this.value.replace(/\D/g, '');
  if (document.getElementById('formTipoPessoa').value === 'JURIDICA') {
    v = v.substring(0, 14); v = v.replace(/^(\d{2})(\d)/, "$1.$2").replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3").replace(/\.(\d{3})(\d)/, ".$1/$2").replace(/(\d{4})(\d)/, "$1-$2");
  } else {
    v = v.substring(0, 11); if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4"); else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, "$1.$2.$3"); else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, "$1.$2");
  }
  this.value = v;
}
function aplicarMascaraCep() { let v = this.value.replace(/\D/g, '').substring(0, 8); this.value = v.replace(/^(\d{5})(\d)/, "$1-$2"); }
function aplicarMascaraTelefone() { let v = this.value.replace(/\D/g, '').substring(0, 11); v = v.replace(/^(\d{2})(\d)/, "($1) $2"); if (v.length > 9) v = v.replace(/(\d{5})(\d)/, "$1-$2"); else v = v.replace(/(\d{4})(\d)/, "$1-$2"); this.value = v; }
function buscarCepAutomatico() { const cep = this.value.replace(/\D/g, ''); if (cep.length !== 8) return; fetch(`https://viacep.com.br/ws/${cep}/json/`).then(res => res.json()).then(d => { if (!d.erro) { document.getElementById('formLogradouro').value = d.logradouro || ''; document.getElementById('formBairro').value = d.bairro || ''; } }); }

function atualizarTabelaClientesLocal() {
  const tbody = document.getElementById('listaClientesTbody'); if (!tbody) return; tbody.innerHTML = '';
  appState.clientes.forEach((c, idx) => {
    let tr = document.createElement('tr');
    let badg = c.status === 'ATIVO' ? 'badge-sucesso' : 'badge-perigo';
    tr.innerHTML = `<td><b>${c.nome}</b></td><td>${c.cnpj || '-'}</td><td>${c.contrato || '-'}</td><td>${c.logradouro || ''}</td><td>${c.bairro || '-'}</td><td><span class="badge ${badg}">${c.status || 'ATIVO'}</span></td><td style="text-align:center;"><button class="btn-primary" onclick="prepararEdicaoCliente(${idx})">📝 Editar</button></td>`;
    tbody.appendChild(tr);
  });
}

function prepararEdicaoCliente(idx) {
  const c = appState.clientes[idx]; if(!c) return;
  appState.idEdicao = c.id;
  document.getElementById('formCliente').value = c.nome || '';
  document.getElementById('formCnpj').value = c.cnpj || '';
  document.getElementById('formContrato').value = c.contrato || '';
  document.getElementById('formCep').value = c.cep || '';
  document.getElementById('formLogradouro').value = c.logradouro || '';
  document.getElementById('formNumero').value = c.numero || '';
  document.getElementById('formComplemento').value = c.complemento || '';
  document.getElementById('formBairro').value = c.bairro || '';
  document.getElementById('formCidade').value = c.cidade || 'SÃO PAULO';
  document.getElementById('formUf').value = c.uf || 'SP';
  document.getElementById('formRegiao').value = c.regiao || '';
  document.getElementById('formResponsavel').value = c.responsavel || '';
  document.getElementById('formTelefone').value = c.telefone || '';
  document.getElementById('formEmail').value = c.email || '';
  document.getElementById('formStatus').value = c.status || 'ATIVO';
  document.getElementById('formObservacao').value = c.observacao || '';
  document.getElementById('btnCancelarEdicao').classList.remove('hidden');
}

function verificarESalvarCliente() {
  const nome = document.getElementById('formCliente').value.trim();
  const status = document.getElementById('formStatus').value;
  if (!nome) return alert('Nome do cliente é obrigatório!');

  const d = { id: appState.idEdicao || 'cli_' + Date.now(), nome: nome, cnpj: document.getElementById('formCnpj').value, contrato: document.getElementById('formContrato').value, cep: document.getElementById('formCep').value, logradouro: document.getElementById('formLogradouro').value, numero: document.getElementById('formNumero').value, complemento: document.getElementById('formComplemento').value, bairro: document.getElementById('formBairro').value, cidade: document.getElementById('formCidade').value, uf: document.getElementById('formUf').value, regiao: document.getElementById('formRegiao').value, responsavel: document.getElementById('formResponsavel').value, telefone: document.getElementById('formTelefone').value, email: document.getElementById('formEmail').value, status: status, observacao: document.getElementById('formObservacao').value };
  fetch(`${WEB_APP_URL}?acao=${appState.idEdicao ? 'editarCadastro' : 'salvarCadastro'}&tipo=CLIENTE&dados=${encodeURIComponent(JSON.stringify(d))}`, { method: 'POST', mode: 'no-cors' }).then(() => { alert('Salvo!'); abrirTela('clientes'); sincronizarDadosPlanilha(); });
}

// =========================================================================
// MÓDULO: ROTAS OPERACIONAIS DINÂMICAS COM EXCLUSÃO DE LINHAS DE O.S
// =========================================================================
function renderizarTelaRotas(container) {
  container.innerHTML = `
    <div class="dashboard-grid">
      <div class="card-padrao"><h3>Montar Nova Rota</h3><p style="color:var(--texto-mutado); font-size:13px; margin-top:4px;">Vincular múltiplos clientes e ordens de serviço diárias.</p><button id="btnCriarFormRota" class="btn-primary" style="margin-top:12px;">Abrir Construtor</button></div>
      <div class="card-padrao"><h3>Histórico de Rotas</h3><p style="color:var(--texto-mutado); font-size:13px; margin-top:4px;">Consultar itinerários anteriores fechados.</p><button id="btnAbrirHistRotas" class="btn-secondary" style="margin-top:12px;">Ver Arquivo</button></div>
    </div>`;
  document.getElementById('btnCriarFormRota').addEventListener('click', abrirFormularioRota);
  document.getElementById('btnAbrirHistRotas').addEventListener('click', abrirHistoricoRotas);
}

function abrirFormularioRota() {
  const numRotaSugerido = `ROT-${new Date().getFullYear()}-${String(appState.rotas.length + 1).padStart(4, '0')}`;
  let optTec = '<option>Selecionar técnico</option>'; appState.tecnicos.forEach(t => optTec += `<option>${t}</option>`);
  let optVei = '<option>Selecionar veículo</option>'; appState.veiculos.forEach(v => optVei += `<option>${v}</option>`);

  document.getElementById('conteudoPrincipal').innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <h2>📍 Montagem Dinâmica de Rota</h2>
      <div><button id="btnGravarRotaFinal" class="btn-success">💾 Salvar Rota</button></div>
    </div>
    <div class="card-padrao">
      <div class="form-grid">
        <div><label>Nº Rota</label><input id="numeroRota" value="${numRotaSugerido}" readonly class="input-padrao" style="background:#f8fafc;"></div>
        <div><label>Data</label><input type="date" id="dataRota" class="input-padrao"></div>
        <div><label>Técnico Integrante</label><select id="tecnico1Rota" class="select-padrao">${optTec}</select></div>
        <div><label>Veículo Frota</label><select id="veiculoRota" class="select-padrao">${optVei}</select></div>
      </div>
    </div>
    <div id="clientesRotaContainer"></div>
    <div style="margin-top:20px; text-align:center;"><button id="btnAdicionarCliCard" class="btn-secondary" style="padding:12px 24px;">➕ Adicionar Unidade à Rota</button></div>`;

  document.getElementById('btnGravarRotaFinal').addEventListener('click', salvarRotaPlanilhaReal);
  document.getElementById('btnAdicionarCliCard').addEventListener('click', adicionarClienteRota);
  adicionarClienteRota();
}

function adicionarClienteRota() {
  const container = document.getElementById('clientesRotaContainer'); const idBloco = 'cli_' + Date.now();

  const div = document.createElement('div'); div.className = 'card-padrao bloco-cliente-rota'; div.id = idBloco; div.style.marginTop = '16px';
  div.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <div style="flex:1; margin-right:15px;"><input type="text" list="listaAutocompletarClientes" class="input-padrao select-cliente-nome" placeholder="Digite ou selecione a unidade beneficiária..."></div>
      <div style="display:flex; gap:8px;"><button class="btn-primary btn-add-os" style="padding:6px 12px;">+ OS</button><button class="btn-danger btn-rem-cli" style="padding:6px 12px;">Remover</button></div>
    </div>
    <div style="margin-bottom:12px; font-size:12px; color:var(--texto-mutado);">📍 Endereço da Base: <span class="endereco-texto" style="font-weight:600; color:var(--texto-principal);">Digite a unidade para validar o endereço...</span></div>
    <table style="width:100%; border-collapse:collapse;" class="tabela-os-cliente">
      <thead><tr style="background:#f8fafc;"><th style="padding:8px; font-size:11px; width:150px;">Nº O.S</th><th style="padding:8px; font-size:11px;">Atividade Técnica</th><th style="padding:8px; font-size:11px; width:50px; text-align:center;">Ações</th></tr></thead>
      <tbody>
        <tr>
          <td><input placeholder="Ex: OS-2026" class="input-padrao" style="padding:6px 10px;"></td>
          <td><input placeholder="Ex: Preventiva Autoclave" class="input-padrao" style="padding:6px 10px;"></td>
          <td style="text-align:center;"><button class="btn-danger btn-deletar-linha" style="padding:6px 10px; background:rgba(239,68,68,0.1); color:var(--cor-perigo);">❌</button></td>
        </tr>
      </tbody>
    </table>`;
  container.appendChild(div);

  div.querySelector('.select-cliente-nome').addEventListener('input', function() {
    const match = appState.clientes.find(c => c.nome.toLowerCase() === this.value.trim().toLowerCase());
    div.querySelector('.endereco-texto').innerText = match ? match.logradouro : 'Não localizado ou digitando...';
  });
  
  div.querySelector('.btn-add-os').addEventListener('click', () => {
    let tr = document.createElement('tr'); 
    tr.innerHTML = `<td><input placeholder="Nº OS" class="input-padrao" style="padding:6px 10px;"></td><td><input placeholder="Atividade" class="input-padrao" style="padding:6px 10px;"></td><td style="text-align:center;"><button class="btn-danger btn-deletar-linha" style="padding:6px 10px; background:rgba(239,68,68,0.1); color:var(--cor-perigo);">❌</button></td>`;
    
    tr.querySelector('.btn-deletar-linha').addEventListener('click', () => tr.remove());
    div.querySelector('.tabela-os-cliente tbody').appendChild(tr);
  });
  
  div.querySelector('.btn-deletar-linha').addEventListener('click', function() { this.closest('tr').remove(); });
  div.querySelector('.btn-rem-cli').addEventListener('click', () => div.remove());
}

function salvarRotaPlanilhaReal() {
  const nr = document.getElementById('numeroRota').value; const dt = document.getElementById('dataRota').value;
  const t1 = document.getElementById('tecnico1Rota').value; const ve = document.getElementById('veiculoRota').value;
  if (!dt || t1.includes('Selecionar') || ve.includes('Selecionar')) return alert('Preencha os dados básicos da rota!');

  const blocos = document.querySelectorAll('.bloco-cliente-rota'); let arrClientes = [];
  blocos.forEach(b => {
    const nome = b.querySelector('.select-cliente-nome').value; const end = b.querySelector('.endereco-texto').innerText;
    let chamados = [];
    b.querySelectorAll('.tabela-os-cliente tbody tr').forEach(r => {
      const inputs = r.querySelectorAll('input');
      if(inputs[0].value || inputs[1].value) chamados.push({ os: inputs[0].value, atividade: inputs[1].value });
    });
    if(nome) arrClientes.push({ cliente: nome, endereco: end, chamados: chamados });
  });

  const pacote = { numeroRota: nr, data: dt, tecnico1: t1, veiculo: ve, clientes: arrClientes };
  fetch(`${WEB_APP_URL}?acao=salvarRota&dados=${encodeURIComponent(JSON.stringify(pacote))}`, { method: 'POST', mode: 'no-cors' })
  .then(() => { alert('Rota salva com sucesso!'); appState.rotas.push(pacote); localStorage.setItem('orizonRotas', JSON.stringify(appState.rotas)); abrirTela('rotas'); });
}
function abrirHistoricoRotas() { abrirTela('rotas'); }

function renderizarTelaPatrimonio(container) {
  container.innerHTML = `
    <div class="card-padrao">
      <h3 style="margin-bottom:15px; color:var(--cor-marca);">Cadastrar Novo Equipamento</h3>
      <div class="form-grid">
        <div class="form-grupo"><label>TAG Linemed *</label><input type="text" id="patTag" class="input-padrao" placeholder="Ex: LMD-1000"></div>
        <div class="form-grupo"><label>Nome Equipamento *</label><input type="text" id="patNome" class="input-padrao"></div>
        <div class="form-grupo"><label>Número de Série *</label><input type="text" id="patSerie" class="input-padrao"></div>
        <div class="form-grupo"><label>Modelo</label><input type="text" id="patModelo" class="input-padrao"></div>
      </div>
      <div style="display:flex; justify-content: flex-end; margin-top:20px;"><button id="btnSalvarAtivo" class="btn-success">💾 Adicionar ao Estoque</button></div>
    </div>
    <div class="card-padrao">
      <h3>Inventário Consolidado</h3>
      <div class="tabela-container"><table class="tabela-sistema"><thead><tr><th>TAG</th><th>EQUIPAMENTO</th><th>Nº SÉRIE</th><th>STATUS</th></tr></thead><tbody id="listaPatrimonioTbody"></tbody></table></div>
    </div>`;
  document.getElementById('btnSalvarAtivo').addEventListener('click', salvarEquipamentoEstoque);
  atualizarTabelaPatrimonioLocal();
}
function atualizarTabelaPatrimonioLocal() {
  const tbody = document.getElementById('listaPatrimonioTbody'); if (!tbody) return; tbody.innerHTML = '';
  appState.patrimonio.forEach(p => {
    let tr = document.createElement('tr');
    tr.innerHTML = `<td><b>${p.tag}</b></td><td>${p.equipamento}</td><td>${p.serie}</td><td><span class="badge badge-sucesso">${p.status}</span></td>`;
    tbody.appendChild(tr);
  });
}
function salvarEquipamentoEstoque() {
  const tag = document.getElementById('patTag').value.trim().toUpperCase(); const nome = document.getElementById('patNome').value.trim(); const serie = document.getElementById('patSerie').value.trim();
  if(!tag || !nome || !serie) return alert('Campos obrigatórios!');
  const obj = { id: tag, tag: tag, equipamento: nome, serie: serie, status: 'DISPONÍVEL EM ESTOQUE', localizacao: '', modelo: document.getElementById('patModelo').value, fabricante:'' };
  fetch(`${WEB_APP_URL}?acao=salvarCadastro&tipo=PATRIMONIO&dados=${encodeURIComponent(JSON.stringify(obj))}`, { method: 'POST', mode: 'no-cors' }).then(() => { alert('Cadastrado!'); abrirTela('patrimonio'); sincronizarDadosPlanilha(); });
}

function renderizarTelaLocacao(container) { container.innerHTML = `<div class="card-padrao"><h3>🤝 Módulo de Locações</h3><p style="margin-top:10px; color:var(--texto-mutado);">Painel e controle físico unificado de envio/retorno ativos.</p></div>`; }
function renderizarTelaChamados(container) { container.innerHTML = `<div class="card-padrao"><h3>⚡ Emissão de Chamados / O.S.</h3><p style="margin-top:10px; color:var(--texto-mutado);">Triagem técnica contra duplicidade de ordens abertas.</p></div>`; }
function renderizarTelaConfig(container) { container.innerHTML = `<div class="card-padrao"><h3>⚙️ Configurações / Equipe</h3><p style="margin-top:10px; color:var(--texto-mutado);">Área administrativa para cadastro de novos usuários.</p></div>`; }

verificarSessaoAtiva();
</script>
