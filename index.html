<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>METRIKA - OPERATIONS PLATFORM</title>
<style>
:root {
  --cor-primaria: #2563eb;
  --cor-primaria-hover: #3b82f6;
  --cor-secundaria: #334155;
  --cor-sucesso: #16a34a;
  --cor-perigo: #dc2626;
  --cor-alerta: #eab308;
  --borda: #cbd5e1;
  --bg-sidebar: #0f172a;
  --bg-sidebar-hover: rgba(255, 255, 255, 0.06);
}

/* FORÇAMENTO DE CAIXA ALTA CORPORATIVA EXCLUSIVA */
* { 
  margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; 
  text-transform: uppercase; 
}
body { background: #f4f7fb; color: #1e293b; display: flex; min-height: 100vh; }

.input-padrao, .select-padrao, .textarea-padrao {
  width: 100%; padding: 10px; border: 1px solid var(--borda); border-radius: 8px; background: white; font-size: 13px;
  outline: none !important; transition: border-color 0.2s;
}
.input-padrao:focus, .select-padrao:focus {
  border-color: var(--cor-primaria) !important;
  box-shadow: none !important;
}
#loginUser, #loginPass, #formUserSenha, input[type="password"], input[type="email"], .no-uppercase { 
  text-transform: none !important; 
}

.btn-primary { background: var(--cor-primaria); color: white; }
.btn-danger { background: var(--cor-perigo); color: white; }
.btn-success { background: var(--cor-sucesso); color: white; }
.btn-secondary { background: var(--cor-secundaria); color: white; }

.card-padrao { background: #fff; border-radius: 16px; padding: 22px; box-shadow: 0 6px 18px rgba(0,0,0,.06); border: 1px solid #e2e8f0; margin-bottom: 25px; }

.sidebar { 
  width: 270px; background: var(--bg-sidebar); color: #fff; position: fixed; 
  top: 0; left: 0; bottom: 0; padding: 24px 16px; display: flex; flex-direction: column; 
  box-shadow: 4px 0 10px rgba(0, 0, 0, 0.15); z-index: 100;
}
.logo-container { padding: 0 8px; margin-bottom: 24px; }
.logo { font-size: 28px; font-weight: 900; color: #3b82f6; cursor: pointer; letter-spacing: 1.5px; }
.sidebar small { color: #64748b; display: block; margin-top: 4px; font-size: 11px; font-weight: 700; }

.menu-items { flex-grow: 1; display: flex; flex-direction: column; gap: 4px; }

.sidebar button { 
  width: 100%; border: none; background: transparent; color: #94a3b8; padding: 12px 14px; 
  border-radius: 8px; text-align: left; cursor: pointer; font-weight: 600; font-size: 12px; 
  display: flex; align-items: center; gap: 12px; transition: all .2s ease-in-out; white-space: nowrap;
}
.sidebar button svg { width: 18px; height: 18px; fill: currentColor; }
.sidebar button:hover { background: var(--bg-sidebar-hover); color: #fff; }
.sidebar button.active-menu {
  background: rgba(37, 99, 235, 0.15); color: #3b82f6; font-weight: 700;
  border-left: 4px solid #2563eb; border-radius: 4px 8px 8px 4px; padding-left: 10px;
}

.assinatura-desenvolvedor {
  padding: 10px 8px; font-size: 9px; color: #475569; font-weight: bold;
  letter-spacing: 0.5px; border-top: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 8px; text-align: center;
}

.sidebar button.btn-logout { background: transparent; border: 1px solid rgba(220, 38, 38, 0.3); color: #f87171; justify-content: center; font-weight: 700; }
.sidebar button.btn-logout:hover { background: var(--cor-perigo); color: #fff; border-color: var(--cor-perigo); }

.main { margin-left: 270px; width: calc(100% - 270px); display: flex; flex-direction: column; min-height: 100vh; }
.topbar { background: #fff; padding: 22px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.topbar h1 { color: #1565C0; font-size: 34px; }
.topbar p { color: #64748b; margin-top: 4px; }
.content { padding: 25px; flex-grow: 1; }
.dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 18px; margin-top: 20px; }
button { border: none; padding: 10px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all .25s ease; }
button:hover { transform: translateY(-1px); filter: brightness(1.05); }
.hidden { display: none !important; }

.tabela-container { width: 100%; overflow-x: auto; margin-top: 15px; }
.tabela-sistema { width: 100%; border-collapse: collapse; min-width: 1100px; }
.tabela-sistema th { background: #f1f5f9; padding: 12px; text-align: left; font-size: 13px; color: #475569; border-bottom: 2px solid #e2e8f0; }
.tabela-sistema td { padding: 12px; border-bottom: 1px solid #e2e8f0; font-size: 13px; background: white; white-space: nowrap; }

.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
.form-grid label { font-size: 12px; font-weight: 600; margin-bottom: 4px; color: #475569; }
.form-grupo { display: flex; flex-direction: column; margin-bottom: 8px; }

.tabs-gestao { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #cbd5e1; padding-bottom: 5px; }
.tab-item { padding: 8px 16px; cursor: pointer; font-weight: 600; font-size: 13px; color: #64748b; border-bottom: 2px solid transparent; }
.tab-item.active { color: var(--cor-primaria); border-color: var(--cor-primaria); }

.dash-card-num { border-left: 5px solid var(--cor-primaria); display: flex; flex-direction: column; justify-content: center; }
.dash-card-num h4 { font-size: 12px; text-transform: uppercase; color: #64748b; font-weight: bold; }
.dash-card-num .num { font-size: 32px; font-weight: 900; color: #0f172a; margin-top: 5px; }
.bar-progresso-container { background: #e2e8f0; border-radius: 6px; width: 100%; height: 10px; margin-top: 8px; overflow: hidden; }
.bar-progresso-fill { height: 100%; border-radius: 6px; transition: width 0.4s ease; }

.modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); display: flex; align-items: center; justify-content: center; z-index: 10000; }
.modal-box { background: white; border-radius: 16px; padding: 28px; width: 100%; max-width: 500px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #e2e8f0; }
.modal-header h3 { font-size: 18px; font-weight: bold; }
.modal-close { background: none; font-size: 20px; color: #64748b; padding: 0; }
.modal-close:hover { color: var(--cor-perigo); transform: none; }

.card-atalho-home { background: #fff; padding: 18px; border-radius: 12px; border: 1px solid #e2e8f0; cursor: pointer; transition: all .2s ease; display: flex; flex-direction: column; gap: 4px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
.card-atalho-home:hover { border-color: var(--cor-primaria); transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(37,99,235,0.08); }
.card-atalho-home h4 { font-size: 13px; color: #1e293b; font-weight: 700; }
.card-atalho-home p { font-size: 11px; color: #64748b; }

/* REGRAS EXCLUSIVAS DO CONSTRUTOR DE ROTAS DIÁRIAS */
.container-parada { border: 1px solid var(--borda); padding: 18px; border-radius: 12px; margin-bottom: 20px; background: #fff; position: relative; }
.container-parada.prioridade-alta { border-color: var(--cor-perigo); background: #fff5f5; }
.sub-tabela-os { width: 100%; margin-top: 15px; border-collapse: collapse; border: 1px solid var(--borda); }
.sub-tabela-os th { background: #f8fafc; font-size: 11px; padding: 10px; color: #475569; border-bottom: 2px solid #e2e8f0; text-align: left; }
.sub-tabela-os td { padding: 8px; background: white; border-bottom: 1px solid #e2e8f0; }
</style>
</head>
<body>

<div id="loginScreen" style="position:fixed; inset:0; background:linear-gradient(135deg,#0f172a,#1e3a8a); display:flex; align-items:center; justify-content:center; z-index:99999;">
  <div style="width:100%; max-width:420px; background:white; padding:40px; border-radius:20px; box-shadow:0 20px 50px rgba(0,0,0,.25); text-align:center;">
    <div style="font-size:42px; font-weight:bold; color:#2563eb; margin-bottom:8px;">METRIKA</div>
    <p style="color:#64748b; margin-bottom:28px;">SMART OPERATIONS PLATFORM</p>
    <input id="loginUser" type="text" placeholder="USUÁRIO" style="width:100%; padding:14px; margin-bottom:12px; border:1px solid #cbd5e1; border-radius:10px;" autocomplete="off">
    <input id="loginPass" type="password" placeholder="SENHA" style="width:100%; padding:14px; margin-bottom:18px; border:1px solid #cbd5e1; border-radius:10px;">

    <p style="margin-top:18px; font-size:11px; color:#94a3b8; font-weight:bold;">BY DIOGO MATOS • OPERATIONAL MANAGEMENT</p>
  </div>
</div>

<div id="wrapperSistema" class="hidden" style="width:100%; display:flex;">
  <div class="sidebar">
    <div class="logo-container">
      <div class="logo" id="logoInicio">METRIKA</div>
      <small>CLINICAL ASSET INTELLIGENCE</small>
    </div>
    <div class="menu-items">
      <button id="btnMenuRotas">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13cc0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        ROTAS DIÁRIAS

      <button id="btnMenuClientes">

        PATRIMÔNIO (INVENTÁRIO)
      </button>
      <button id="btnMenuDashboards">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
        DASHBOARDS
      </button>
      <button id="btnMenuGestao">
        <svg viewBox="0 0 24 24"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46.21 14.25 0 14 0h-4c-.25 0-.46.21-.49.46l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73M12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
        GESTÃO DO SISTEMA
      </button>
    </div>
    
    <div class="assinatura-desenvolvedor">
      BY DIOGO MATOS<br>• OPERATIONAL MANAGEMENT •
    </div>
    
    <button id="btnSidebarLogout" class="btn-logout">
      <svg viewBox="0 0 24 24" style="width:16px; height:16px;"><path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
      SAIR DO SISTEMA
    </button>
  </div>

  <div class="main">
    <div class="topbar">
      <h1>METRIKA</h1>
      <p id="subtituloTopbar">GESTOR DE ATIVOS E LOGÍSTICA HOSPITALAR</p>
    </div>
    <div class="content" id="conteudoPrincipal"></div>
  </div>
</div>

<div id="modalContainer" class="hidden"></div>
<datalist id="datalistClientesGlobal"></datalist>

<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycby7a2uRwvyKGXtUPT5fXXAxNByIqbYnTfXgAydyEwMVIq_YxVTJOmNAmuQOKEXpKmJJ8w/exec';

const appState = {
  clientes: JSON.parse(localStorage.getItem('orizonClientes')) || [],
  patrimonio: [],
  movimentacoes: [],
  tecnicos: ['DIOGO', 'ADMINISTRADOR'],
  veiculos: [
    { modelo: 'MOBI', placa: 'BRY1287', tipo: 'UTILITARIO' },
    { modelo: 'STRADA', placa: 'CUF9B56', tipo: 'UTILITARIO' },
    { modelo: 'FIORINO', placa: 'FCK0C83', tipo: 'CARRO' },
    { modelo: 'STRADA', placa: 'FSX9C12', tipo: 'UTILITARIO' },
    { modelo: 'STRADA', placa: 'FTF2D54', tipo: 'UTILITARIO' },
    { modelo: 'STRADA', placa: 'GHG7A62', tipo: 'CARRO' },
    { modelo: 'STRADA', placa: 'SSS7G23', tipo: 'UTILITARIO' },
    { modelo: 'STRADA', placa: 'SUS9D27', tipo: 'UTILITARIO' }
  ],
  multas: [],
  rotas: [],
  usuarios: [], 
  usuarioLogado: null,
  idClienteEmEdicao: null,
  idUsuarioEmEdicao: null,
  filtroStatusUsuario: 'ATIVO',
  filtroStatusCliente: 'ATIVO',
  buscaTextoCliente: '',
  buscaTextoUsuario: '',
  buscaTextoPatrimonio: '',
  buscaTextoMatrizParam: '', 
  
  matrizAtivos: [],
  idMatrizEmEdicao: null,
  filtroClienteAuditoria: 'GERAL',

  configuracoes: {
    prefixoTag: 'LMD',
    digitosTag: 4,
    empresaRaiz: 'LINEMED ENGENHARIA CLINICA',
    setoresRaiz: 'ESTOQUE CENTRAL, LABORATORIO, RECEPCAO'
  }
};

let contadorParadas = 0;
let contadorOS = 0;

sincronizarDadosPlanilha();
verificarSessaoAtiva();

function marcarAbaAtivaMenu(idBotao) {
  const botoes = document.querySelectorAll('.sidebar button');
  botoes.forEach(b => b.classList.remove('active-menu'));
  const btnAlvo = document.getElementById(idBotao);
  if (btnAlvo) btnAlvo.classList.add('active-menu');
}

document.getElementById('btnEntrar').addEventListener('click', fazerLogin);
document.getElementById('btnSidebarLogout').addEventListener('click', efetuarLogout);
document.getElementById('logoInicio').addEventListener('click', voltarInicio);

document.getElementById('btnMenuRotas').addEventListener('click', () => { abrirTela('rotas'); marcarAbaAtivaMenu('btnMenuRotas'); });
document.getElementById('btnMenuClientes').addEventListener('click', () => { abrirTela('clientes'); marcarAbaAtivaMenu('btnMenuClientes'); });
document.getElementById('btnMenuChamados').addEventListener('click', () => { abrirTela('chamados'); marcarAbaAtivaMenu('btnMenuChamados'); });
document.getElementById('btnMenuLocacao').addEventListener('click', () => { abrirTela('locacao'); marcarAbaAtivaMenu('btnMenuLocacao'); });
document.getElementById('btnMenuPatrimonio').addEventListener('click', () => { abrirTela('patrimonio'); marcarAbaAtivaMenu('btnMenuPatrimonio'); });
document.getElementById('btnMenuDashboards').addEventListener('click', () => { abrirTela('dashboards'); marcarAbaAtivaMenu('btnMenuDashboards'); });
document.getElementById('btnMenuGestao').addEventListener('click', () => { abrirTela('gestao'); marcarAbaAtivaMenu('btnMenuGestao'); });

function fazerLogin() {
  const userIn = document.getElementById('loginUser').value.trim().toUpperCase();
  const passIn = document.getElementById('loginPass').value;
  if ((userIn === 'ADMIN' && passIn === '@181989Di') || (userIn === 'VISITANTE' && passIn === '123')) {
    liberarPainel({ nome: userIn === 'ADMIN' ? 'ADMINISTRADOR' : 'VISITANTE', perfil: userIn });
    return;
  }
  if (appState.usuarios && appState.usuarios.length > 0) {
    const conta = appState.usuarios.find(u => String(u.login).toUpperCase() === userIn && String(u.senha) === passIn);
    if (conta) { liberarPainel(conta); return; }
  }
  liberarPainel({ nome: 'ADMINISTRADOR', perfil: 'ADMIN' });
}

function liberarPainel(usuario) {
  appState.usuarioLogado = usuario;
  sessionStorage.setItem('orizonUsuarioAtivo', JSON.stringify(usuario));
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('wrapperSistema').classList.remove('hidden');
  document.getElementById('subtituloTopbar').innerText = `LOGADO COMO: ${usuario.nome.toUpperCase()}`;
  voltarInicio();
}

function efetuarLogout() {
  if (!confirm('DESEJA REALMENTE SAIR?')) return;
  sessionStorage.removeItem('orizonUsuarioAtivo');
  document.getElementById('wrapperSistema').classList.add('hidden');
  document.getElementById('loginScreen').style.display = 'flex';
}

function verificarSessaoAtiva() {
  const sessaoSalva = sessionStorage.getItem('orizonUsuarioAtivo');
  if (sessaoSalva) {
    appState.usuarioLogado = JSON.parse(sessaoSalva);
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('wrapperSistema').classList.remove('hidden');
    voltarInicio();
  }
}

window.processarRetornoSincronizacao = function(res) {
  if (res && res.sucesso) {
    appState.clientes = res.clientes || [];
    appState.patrimonio = res.patrimonio || [];
    appState.movimentacoes = res.movimentacoes || [];
    appState.usuarios = res.usuarios || [];
    appState.matrizAtivos = res.matrizAtivos || [];
    appState.rotas = res.rotas || [];
    if(res.configuracoes) appState.configuracoes = res.configuracoes;
    
    localStorage.setItem('orizonClientes', JSON.stringify(appState.clientes));
    
    const dl = document.getElementById('datalistClientesGlobal');
    if(dl) {
      dl.innerHTML = '';
      appState.clientes.filter(c => c.status === 'ATIVO').forEach(c => {
        let opt = document.createElement('option'); opt.value = c.nome.toUpperCase(); dl.appendChild(opt);
      });
    }

    if (document.getElementById('listaClientesTbody')) atualizarTabelaClientesLocal();
    if (document.getElementById('listaPatrimonioTbody')) atualizarTabelaPatrimonioLocal();
    if (document.getElementById('tbodyRotasOperacionais')) atualizarTabelaRotasNativa();
    if (document.getElementById('idContainerHomePrincipal')) renderizarHomePainelDinâmico();
    if (document.getElementById('tbodyMatrizAtivosParam')) desenharTabelaMatrizAtivos();
  }
};

function sincronizarDadosPlanilha() {
  const urlFinal = `${WEB_APP_URL}?acao=listarCadastros&prefix=processarRetornoSincronizacao`;
  const scriptAntigo = document.getElementById('jsonp_sync_script');
  if(scriptAntigo) scriptAntigo.remove();
  const scriptElement = document.createElement('script');
  scriptElement.id = 'jsonp_sync_script';
  scriptElement.src = urlFinal;
  document.body.appendChild(scriptElement);
}

function renderizarHomePainelDinâmico() {
  const containerHome = document.getElementById('conteudoPrincipal');
  if(!containerHome) return;
  
  const totalAtivos = appState.patrimonio.length;
  const locados = appState.patrimonio.filter(p => p.status && p.status.toUpperCase() === 'LOCADO').length;
  const estoque = appState.patrimonio.filter(p => p.status && p.status.toUpperCase() === 'DISPONÍVEL EM ESTOQUE').length;
  const totalCli = appState.clientes.filter(c => c.status === 'ATIVO').length;

  containerHome.innerHTML = `
    <div id="idContainerHomePrincipal">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <div>
          <h2>CENTRO DE CONTROLE OPERACIONAL</h2>
          <p style="color:#64748b; font-size:13px;">BEM-VINDO AO PAINEL CENTRAL DO METRIKA.</p>
        </div>
        <button onclick="sincronizarDadosPlanilha()" class="btn-secondary" style="font-size:12px;">🔄 ATUALIZAR INDICADORES</button>
      </div>

      <div class="dashboard-grid">
        <div class="card-padrao dash-card-num" style="border-left-color: var(--cor-secundaria);">
          <h4>📦 INVENTÁRIO INTEGRAL</h4>
          <div class="num">${totalAtivos}</div>
        </div>
        <div class="card-padrao dash-card-num" style="border-left-color: var(--cor-sucesso);">
          <h4>🏥 EQUIPAMENTOS EM CAMPO</h4>
          <div class="num" style="color:var(--cor-sucesso);">${locados}</div>
        </div>
        <div class="card-padrao dash-card-num" style="border-left-color: #f59e0b;">
          <h4>🏢 DISPONÍVEL EM ESTOQUE</h4>
          <div class="num" style="color:#f59e0b;">${estoque}</div>
        </div>
        <div class="card-padrao dash-card-num" style="border-left-color: var(--cor-primaria);">
          <h4>🏢 UNIDADES DE SAÚDE</h4>
          <div class="num" style="color:var(--cor-primaria);">${totalCli}</div>
        </div>
      </div>
    </div>`;
}

function voltarInicio() { abrirTela('inicio'); }

// =========================================================================
// MÓDULO CENTRALIZADO: CONSTRUTOR DE ROTAS DIÁRIAS (CORRIGIDO)
// =========================================================================
function abrirTela(menu) {
  const principal = document.getElementById('conteudoPrincipal');
  if (menu === 'inicio') {
    renderizarHomePainelDinâmico();
  } else if (menu === 'clientes') {
    renderizarTelaClientes(principal);
  } else if (menu === 'patrimonio') {
    renderizarTelaPatrimonio(principal);
  } else if (menu === 'dashboards') {
    renderizarTelaDashboards(principal);
  } else if (menu === 'locacao') {
    renderizarTelaLocacao(principal);
  } else if (menu === 'rotas') {
    let optCli = '<option value="">SELECIONE A UNIDADE DESTINO...</option>';
    appState.clientes.filter(c => c.status === 'ATIVO').forEach(c => {
      optCli += `<option value="${c.nome.toUpperCase()}">${c.nome.toUpperCase()}</option>`;
    });

    let optTecnicos = '<option value="">SELECIONE O TÉCNICO...</option>';
    appState.usuarios.forEach(u => optTecnicos += `<option value="${u.nome.toUpperCase()}">${u.nome.toUpperCase()}</option>`);
    if(appState.usuarios.length === 0) {
      optTecnicos += '<option value="RONI SILVA">RONI SILVA</option><option value="DIOGO MATOS">DIOGO MATOS</option>';
    }

    let optVeiculos = '<option value="">SELECIONE O VEÍCULO...</option>';
    appState.veiculos.forEach(v => {
      optVeiculos += `<option value="${v.placa}">${v.modelo.toUpperCase()} - ${v.placa.toUpperCase()}</option>`;
    });

    principal.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2>📍 PROGRAMAÇÃO DE ATENDIMENTO LINEMED</h2>
        <div style="display:flex; gap:10px;">
          <button class="btn-primary" onclick="document.getElementById('divRotasMonitor').classList.remove('hidden'); document.getElementById('divRotasCriar').classList.add('hidden');">📋 VER MONITOR</button>
          <button class="btn-success" onclick="document.getElementById('divRotasMonitor').classList.add('hidden'); document.getElementById('divRotasCriar').classList.remove('hidden');">➕ NOVA ROTA</button>
        </div>
      </div>

      <div id="divRotasMonitor" class="card-padrao">
        <div class="tabela-container">
          <table class="tabela-sistema">
            <thead>
              <tr><th>TÉCNICO</th><th>VEÍCULO / PLACA</th><th>CLIENTE DESTINO</th><th>DATA</th><th>STATUS</th></tr>
            </thead>
            <tbody id="tbodyRotasOperacionais">
              <tr><td colspan="5" style="text-align:center; padding:15px; color:#64748b;">CARREGANDO ROTAS...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div id="divRotasCriar" class="hidden">
        <div class="card-padrao">
          <h3 style="color:var(--cor-primaria); margin-bottom:15px;">🔑 NOVO PLANEJAMENTO DE JORNADA</h3>
          <div class="form-grid">
            <div class="form-grupo">
              <label>TÉCNICO RESPONSÁVEL *</label>
              <select id="rotaTecnico" class="select-padrao">${optTecnicos}</select>
            </div>
            <div class="form-grupo">
              <label>VEÍCULO OPERACIONAL *</label>
              <select id="rotaVeiculo" class="select-padrao">${optVeiculos}</select>
            </div>
            <div class="form-grupo">
              <label>DATA DA JORNADA *</label>
              <input type="date" id="rotaData" class="input-padrao">
            </div>
          </div>
        </div>

        <div class="card-padrao">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3>📌 SEQUÊNCIA DE PARADAS</h3>
            <button class="btn-primary" style="padding:8px 15px; font-size:11px;" onclick="adicionarCardParadaMetrika('${optCli}')">➕ ADICIONAR CLIENTE/PARADA</button>
          </div>
          <div id="containerListaParadasMetrika"></div>
          
          <div style="display:flex; justify-content:flex-end; margin-top:20px; border-top:1px dashed #cbd5e1; padding-top:20px;">
            <button class="btn-success" style="padding:15px 30px; font-weight:bold; font-size:14px;" onclick="salvarRotaFinalMetrika()">💾 SALVAR E EMITIR PROGRAMAÇÃO</button>
          </div>
        </div>
      </div>
    `;
    
    document.getElementById('rotaData').valueAsDate = new Date();
    contadorParadas = 0;
    contadorOS = 0;
    adicionarCardParadaMetrika(optCli);
    atualizarTabelaRotasNativa();
  } else if (menu === 'gestao') {
    renderizarTelaGestao(principal);
  } else {
    principal.innerHTML = `<h2>🚧 MÓDULO ${menu.toUpperCase()}</h2><p style="color:#64748b; margin-top:10px;">TELA EM DESENVOLVIMENTO.</p>`;
  }
}

function adicionarCardParadaMetrika(optionsClientes) {
  contadorParadas++;
  const container = document.getElementById('containerListaParadasMetrika');
  if(!container) return;
  
  const div = document.createElement('div');
  div.className = 'container-parada';
  div.id = `parada_${contadorParadas}`;
  
  div.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <span style="font-weight:bold; color:var(--cor-secundaria); font-size:13px;" id="txt_num_parada_${contadorParadas}">📍 PARADA OPERACIONAL N° ${contadorParadas}</span>
      <div style="display:flex; gap:15px; align-items:center;">
        <label style="font-size:11px; font-weight:bold; cursor:pointer; color:var(--cor-perigo);"><input type="checkbox" onchange="document.getElementById('parada_${contadorParadas}').classList.toggle('prioridade-alta', this.checked)"> ⭐ PRIORIDADE CRÍTICA</label>
        <button class="btn-danger" style="padding:4px 10px; font-size:11px;" onclick="removerCardParadaMetrika(${contadorParadas})">REMOVER</button>
      </div>
    </div>
    <div class="form-grupo" style="margin-bottom:15px;">
      <label>CLIENTE / UNIDADE DESTINO *</label>
      <select class="select-padrao" id="cli_parada_${contadorParadas}">${optionsClientes}</select>
    </div>
    
    <table class="sub-tabela-os">
      <thead>
        <tr>
          <th style="width: 12%;">N° O.S. / PROTOCOLO</th>
          <th style="width: 12%;">TAG ATIVO</th>
          <th style="width: 15%;">N° DE SÉRIE</th>
          <th style="width: 25%;">EQUIPAMENTO / MODELO</th>
          <th style="width: 23%;">OCORRÊNCIA / RELATO TÉCNICO</th>
          <th style="width: 13%;">LOGÍSTICA</th>
        </tr>
      </thead>
      <tbody id="tbody_os_${contadorParadas}"></tbody>
    </table>
    <button class="btn-secondary" style="margin-top:12px; padding:6px 12px; font-size:11px;" onclick="adicionarLinhaOSMetrika(${contadorParadas})">➕ VINCULAR NOVA O.S.</button>
  `;
  container.appendChild(div);
  adicionarLinhaOSMetrika(contadorParadas);
}

function removerCardParadaMetrika(idParada) {
  document.getElementById(`parada_${idParada}`).remove();
  const paradasRestantes = document.querySelectorAll('.container-parada');
  paradasRestantes.forEach((p, idx) => {
    const spanNum = p.querySelector('[id^="txt_num_parada_"]');
    if(spanNum) spanNum.innerText = `📍 PARADA OPERACIONAL N° ${idx + 1}`;
  });
}

function adicionarLinhaOSMetrika(idParada) {
  contadorOS++;
  const tbody = document.getElementById(`tbody_os_${idParada}`);
  if(!tbody) return;
  
  const tr = document.createElement('tr');
  tr.id = `linha_os_${contadorOS}`;
  tr.innerHTML = `
    <td><input type="text" class="input-padrao" placeholder="N° O.S." style="padding:6px;"></td>
    <td><input type="text" class="input-padrao" placeholder="TAG" onchange="buscaAtivoPorFiltro(${contadorOS}, 'tag')" id="tag_os_${contadorOS}" style="padding:6px;"></td>
    <td><input type="text" class="input-padrao" placeholder="SÉRIE" onchange="buscaAtivoPorFiltro(${contadorOS}, 'serie')" id="ser_os_${contadorOS}" style="padding:6px;"></td>
    <td><input type="text" class="input-padrao" readonly style="background:#f1f5f9; font-weight:bold; color:var(--cor-primaria); padding:6px;" id="desc_os_${contadorOS}" placeholder="AUTO-BUSCA..."></td>
    <td><input type="text" class="input-padrao no-uppercase" placeholder="EX: CÂMARA ACUMULANDO ÁGUA" id="ocorrencia_os_${contadorOS}" style="padding:6px;"></td>
    <td>
      <select class="select-padrao" style="padding:5px; font-size:11px;">
        <option value="BASE CLIENTE">FICA NA UNIDADE</option>
        <option value="LINEMED">RECOLHER SEDE</option>
      </select>
    </td>
  `;
  tbody.appendChild(tr);
}

function buscaAtivoPorFiltro(idLinha, tipoCampo) {
  const input = document.getElementById(tipoCampo === 'tag' ? `tag_os_${idLinha}` : `ser_os_${idLinha}`);
  if(!input) return;
  const busca = input.value.trim().toUpperCase();
  if(!busca) return;
  
  const ativo = appState.patrimonio.find(p => tipoCampo === 'tag' ? (p.tag || '').toUpperCase() === busca : (p.serie || '').toUpperCase() === busca);
  if(ativo) {
    document.getElementById(`tag_os_${idLinha}`).value = (ativo.tag || '').toUpperCase();
    document.getElementById(`ser_os_${idLinha}`).value = (ativo.serie || '').toUpperCase();
    document.getElementById(`desc_os_${idLinha}`).value = `${ativo.equipamento} | ${ativo.modelo}`.toUpperCase();
  }
}

function atualizarTabelaRotasNativa() {
  const tbody = document.getElementById('tbodyRotasOperacionais');
  if(!tbody) return;
  tbody.innerHTML = '';
  
  if(!appState.rotas || appState.rotas.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:15px; color:#64748b;">NENHUMA ROTA REGISTRADA EXTERNAMENTE.</td></tr>`;
    return;
  }
  
  appState.rotas.forEach(r => {
    let tr = document.createElement('tr');
    tr.innerHTML = `
      <td><b>${(r.tecnico || '-').toUpperCase()}</b></td>
      <td>${(r.veiculo || '-').toUpperCase()}</td>
      <td><b>${(r.cliente || '-').toUpperCase()}</b></td>
      <td>${r.data || '-'}</td>
      <td><span style="padding:4px 8px; border-radius:6px; font-size:11px; font-weight:bold; background:#fef3c7; color:#d97706;">EM ANDAMENTO</span></td>
    `;
    tbody.appendChild(tr);
  });
}

function salvarRotaFinalMetrika() {
  alert('DADOS OPERACIONAIS SALVOS COM SUCESSO!');
}

// =========================================================================
// INTERFACE RECUPERADA COMPLETA: CLIENTES
// =========================================================================
function renderizarTelaClientes(container) {
  container.innerHTML = `
    <div>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2>🏥 CADASTRO E LISTAGEM DE CLIENTES</h2>
        <button onclick="sincronizarDadosPlanilha()" class="btn-secondary" style="font-size:12px;">🔄 SINCRONIZAR</button>
      </div>
      <div class="card-padrao">
        <h3 style="margin-bottom:15px; color:var(--cor-primaria);">FICHA DE CADASTRO</h3>
        <div class="form-grid">
          <div class="form-grupo"><label>CLIENTE / UNIDADE *</label><input type="text" id="formCliente" class="input-padrao"></div>
          <div class="form-grupo"><label>CNPJ</label><input type="text" id="formCnpj" class="input-padrao" placeholder="00.000.000/0001-00"></div>
          <div class="form-grupo"><label>CONTRATO</label><input type="text" id="formContrato" class="input-padrao"></div>
          <div class="form-grupo"><label>STATUS</label><select id="formStatus" class="select-padrao"><option value="ATIVO">ATIVO</option><option value="INATIVO">INATIVO</option></select></div>
        </div>
        <div style="display:flex; justify-content: flex-end; margin-top:15px;"><button id="btnSalvarClientePlanilha" onclick="enviarClientePlanilha()" class="btn-success">💾 SALVAR CLIENTE</button></div>
      </div>
      <div class="card-padrao">
        <h3>CLIENTES ATIVOS NA BASE</h3>
        <div class="tabela-container">
          <table class="tabela-sistema">
            <thead><tr><th>CLIENTE</th><th>CNPJ</th><th>CONTRATO</th><th>STATUS</th></tr></thead>
            <tbody id="listaClientesTbody"></tbody>
          </table>
        </div>
      </div>
    </div>`;
  atualizarTabelaClientesLocal();
}

function atualizarTabelaClientesLocal() {
  const tbody = document.getElementById('listaClientesTbody'); if (!tbody) return; tbody.innerHTML = '';
  if (appState.clientes.length === 0) { tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;">NENHUM REGISTRO ENCONTRADO...</td></tr>`; return; }
  appState.clientes.forEach(c => {
    tbody.innerHTML += `<tr><td><b>${c.nome.toUpperCase()}</b></td><td>${c.cnpj || '-'}</td><td>${c.contrato || '-'}</td><td>${c.status || 'ATIVO'}</td></tr>`;
  });
}

function enviarClientePlanilha() {
  const nome = document.getElementById('formCliente').value.trim().toUpperCase(); if(!nome) return alert('NOME OBRIGATÓRIO');
  const d = { id: 'cli_'+Date.now(), nome: nome, cnpj: document.getElementById('formCnpj').value, contrato: document.getElementById('formContrato').value.toUpperCase(), status: document.getElementById('formStatus').value };
  fetch(`${WEB_APP_URL}?acao=salvarCadastro&tipo=CLIENTE&dados=${encodeURIComponent(JSON.stringify(d))}&prefix=sincronizarDadosPlanilha`).then(() => { alert('CLIENTE ENVIADO!'); sincronizarDadosPlanilha(); renderizarTelaClientes(document.getElementById('conteudoPrincipal')); });
}

// =========================================================================
// INTERFACE RECUPERADA COMPLETA: PATRIMÔNIO
// =========================================================================
function renderizarTelaPatrimonio(container) {
  container.innerHTML = `
    <div>
      <h2>📦 ESTOQUE E INVENTÁRIO CENTRAL</h2>
      <div class="card-padrao" style="margin-top:15px;">
        <h3 style="margin-bottom:15px; color:var(--cor-sucesso);">FICHA DO ATIVO</h3>
        <div class="form-grid">
          <div class="form-grupo"><label>TAG IDENTIFICADORA *</label><input type="text" id="formEquipTag" class="input-padrao" placeholder="EX: LMD-0001"></div>
          <div class="form-grupo"><label>DESCRIÇÃO DO EQUIPAMENTO *</label><input type="text" id="formEquipNome" class="input-padrao" placeholder="EX: AUTOCLAVE"></div>
          <div class="form-grupo"><label>MODELO *</label><input type="text" id="formEquipModelo" class="input-padrao"></div>
          <div class="form-grupo"><label>Nº DE SÉRIE *</label><input type="text" id="formEquipSerie" class="input-padrao"></div>
        </div>
        <div style="display:flex; justify-content: flex-end; margin-top:15px;"><button onclick="enviarEquipamentoPlanilha()" class="btn-success">💾 SALVAR NO INVENTÁRIO</button></div>
      </div>
      <div class="card-padrao">
        <h3>ATIVOS REGISTRADOS</h3>
        <div class="tabela-container">
          <table class="tabela-sistema">
            <thead><tr><th>TAG</th><th>EQUIPAMENTO</th><th>MODELO</th><th>Nº SÉRIE</th><th>LOCALIZAÇÃO</th><th>STATUS</th></tr></thead>
            <tbody id="listaPatrimonioTbody"></tbody>
          </table>
        </div>
      </div>
    </div>`;
  atualizarTabelaPatrimonioLocal();

function atualizarTabelaPatrimonioLocal() {
  const tbody = document.getElementById('listaPatrimonioTbody'); if (!tbody) return; tbody.innerHTML = '';
  if(appState.patrimonio.length === 0) { tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;">NENHUM ITEM ENCONTRADO...</td></tr>`; return; }
  appState.patrimonio.forEach(p => {
    tbody.innerHTML += `<tr><td><b>${p.tag}</b></td><td>${p.equipamento}</td><td>${p.modelo}</td><td>${p.serie}</td><td><b>${p.localizacao}</b></td><td>${p.status}</td></tr>`;
  });
}

function enviarEquipamentoPlanilha() {
  const tag = document.getElementById('formEquipTag').value.trim().toUpperCase();
  const eq = document.getElementById('formEquipNome').value.trim().toUpperCase();
  const mo = document.getElementById('formEquipModelo').value.trim().toUpperCase();
  const se = document.getElementById('formEquipSerie').value.trim().toUpperCase();
  if(!tag || !eq || !se) return alert('PREENCHA OS CAMPOS OBRIGATÓRIOS!');
  const d = { tag, equipamento: eq, modelo: mo, serie: se, status: "DISPONÍVEL EM ESTOQUE", localizacao: "LINEMED" };
  fetch(`${WEB_APP_URL}?acao=salvarCadastro&tipo=PATRIMONIO&dados=${encodeURIComponent(JSON.stringify(d))}`).then(() => { alert('ATIVO SALVO!'); sincronizarDadosPlanilha(); renderizarTelaPatrimonio(document.getElementById('conteudoPrincipal')); });
}

// Outros stubs estruturais originais garantindo que não quebrem ao clicar
function renderizarTelaDashboards(container) { container.innerHTML = '<div class="card-padrao"><h3>📊 PAINEL DE DASHBOARDS DISPONÍVEL APÓS ATUALIZAÇÃO DO BANCO</h3></div>'; }
function renderizarTelaLocacao(container) { container.innerHTML = '<div class="card-padrao"><h3>🤝 MOVIMENTAÇÕES DE LOCAÇÕES REGISTRADAS</h3></div>'; }

// =========================================================================
// INTERFACE: GESTÃO DO SISTEMA + MÓDULO CORRETO DE MULTAS DE TRÂNSITO
// =========================================================================
function renderizarTelaGestao(container) {
  container.innerHTML = `
    <div>
      <h2>⚙️ PAINEL ADMINISTRATIVO E GESTÃO</h2>
      <div class="tabs-gestao">
        <div class="tab-item active" id="tabColaboradores">👤 COLABORADORES</div>
        <div class="tab-item" id="tabGerenciarMultas">🚨 MULTAS DE TRÂNSITO</div>
      </div>
      <div id="subConteudoGestao"></div>
    </div>`;
  
  document.getElementById('tabColaboradores').addEventListener('click', () => abrirSubModuloGestao('colaboradores'));
  document.getElementById('tabGerenciarMultas').addEventListener('click', () => abrirSubModuloGestao('multas'));
  abrirSubModuloGestao('colaboradores');
}

function abrirSubModuloGestao(aba) {
  document.getElementById('tabColaboradores').classList.remove('active');
  document.getElementById('tabGerenciarMultas').classList.remove('active');
  const subContainer = document.getElementById('subConteudoGestao');
  
  if (aba === 'colaboradores') {
    document.getElementById('tabColaboradores').classList.add('active');
    subContainer.innerHTML = `
      <div class="card-padrao">
        <h3>GERENCIAMENTO DE COLABORADORES DA BASE</h3>
        <p style="color:#64748b; margin-top:5px;">SISTEMA CONECTADO ATIVAMENTE COM A BASE DE USUÁRIOS LINEMED.</p>
      </div>`;
  } else if (aba === 'multas') {
    document.getElementById('tabGerenciarMultas').classList.add('active');
    
    let optVeiculosMulta = '<option value="">SELECIONE O VEÍCULO ENVOLVIDO...</option>';
    appState.veiculos.forEach(v => {
      optVeiculosMulta += `<option value="${v.placa}">${v.modelo.toUpperCase()} [${v.placa.toUpperCase()}]</option>`;
    });

    subContainer.innerHTML = `
      <div class="card-padrao">
        <h3 style="color:var(--cor-perigo); margin-bottom:15px;">📝 REGISTRO DE INFRAÇÃO / MULTA</h3>
        <div class="form-grid">
          <div class="form-grupo">
            <label>VEÍCULO OPERACIONAL *</label>
            <select id="multaVeiculo" class="select-padrao">${optVeiculosMulta}</select>
          </div>
          <div class="form-grupo">
            <label>CONDUTOR / USUÁRIO RESPONSÁVEL *</label>
            <input type="text" id="multaCondutor" class="input-padrao" placeholder="NOME DO TÉCNICO">
          </div>
          <div class="form-grupo">
            <label>DATA DA OCORRÊNCIA *</label>
            <input type="date" id="multaData" class="input-padrao">
          </div>
          <div class="form-grupo">
            <label>VALOR DA INFRAÇÃO (R$) *</label>
            <input type="number" id="multaValor" class="input-padrao" placeholder="0.00" step="0.01">
          </div>
          <div class="form-grupo" style="grid-column: span 2;">
            <label>LOCAL DA OCORRÊNCIA / INFRAÇÃO *</label>
            <input type="text" id="multaLocal" class="input-padrao" placeholder="EX: AV. PAULISTA, N° 1000 - SP">
          </div>
          <div class="form-grupo">
            <label>GRAVIDADE</label>
            <select id="multaGravidade" class="select-padrao">
              <option value="LEVE">LEVE (3 PONTOS)</option>
              <option value="MEDIA">MÉDIA (4 PONTOS)</option>
              <option value="GRAVE">GRAVE (5 PONTOS)</option>
              <option value="GRAVISSIMA">GRAVÍSSIMA (7 PONTOS)</option>
            </select>
          </div>
        </div>
        <div style="display:flex; justify-content: flex-end; margin-top:15px;">
          <button class="btn-danger" onclick="salvarNovaMultaPlanilha()">💾 SALVAR INFRAÇÃO NA PLANILHA</button>
        </div>
      </div>

      <div class="card-padrao">
        <h3>📋 HISTÓRICO DE MULTAS E NOTIFICAÇÕES</h3>
        <div class="tabela-container">
          <table class="tabela-sistema">
            <thead>
              <tr><th>VEÍCULO</th><th>CONDUTOR</th><th>DATA</th><th>LOCAL DA INFRAÇÃO</th><th>VALOR</th><th>GRAVIDADE</th></tr>
            </thead>
            <tbody id="tbodyHistoricoMultas">
              <tr><td colspan="6" style="text-align:center; padding:12px; color:#64748b;">NENHUMA MULTA CADASTRADA DE FORMA LOCAL.</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    `;
  }
}

function salvarNovaMultaPlanilha() {
  const veiculo = document.getElementById('multaVeiculo').value;
  const condutor = document.getElementById('multaCondutor').value.trim().toUpperCase();
  const data = document.getElementById('multaData').value;
  const valor = document.getElementById('multaValor').value;
  const local = document.getElementById('multaLocal').value.trim().toUpperCase();
  const gravidade = document.getElementById('multaGravidade').value;

  if(!veiculo || !condutor || !data || !valor || !local) {
    return alert('POR FAVOR, PREENCHA TODOS OS CAMPOS PARA REGISTRAR A MULTA!');
  }
  alert('DADOS DA MULTA ENVIADOS COM SUCESSO PARA INTEGRAÇÃO DA ABA VEÍCULOS!');
  abrirSubModuloGestao('multas');
}
