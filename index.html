<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORIZON - Gestão Inteligente</title>
<style>
:root {
  --cor-primaria: #2563eb;
  --cor-secundaria: #334155;
  --cor-sucesso: #16a34a;
  --cor-perigo: #dc2626;
  --borda: #cbd5e1;
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
body { background: #f4f7fb; color: #1e293b; display: flex; min-height: 100vh; }

.input-padrao, .select-padrao, .textarea-padrao {
  width: 100%; padding: 10px; border: 1px solid var(--borda); border-radius: 8px; background: white; font-size: 13px;
}
.btn-primary { background: var(--cor-primaria); color: white; }
.btn-danger { background: var(--cor-perigo); color: white; }
.btn-success { background: var(--cor-sucesso); color: white; }
.btn-secondary { background: var(--cor-secundaria); color: white; }

.card-padrao { background: #fff; border-radius: 16px; padding: 22px; box-shadow: 0 6px 18px rgba(0,0,0,.06); border: 1px solid #e2e8f0; }
.sidebar { width: 240px; background: linear-gradient(180deg, #0f172a, #111827); color: #fff; position: fixed; top: 0; left: 0; bottom: 0; padding: 24px 16px; display: flex; flex-direction: column; }
.menu-items { flex-grow: 1; }
.logo { font-size: 34px; font-weight: bold; color: #60a5fa; cursor: pointer; margin-bottom: 8px; }
.sidebar small { color: #94a3b8; display: block; margin-bottom: 28px; }
.sidebar button { width: 100%; border: none; background: linear-gradient(135deg, #1e293b, #334155); color: #fff; padding: 14px 16px; border-radius: 12px; text-align: left; margin-bottom: 10px; cursor: pointer; font-weight: 600; font-size: 14px; transition: all .25s ease; }
.sidebar button:hover { background: linear-gradient(135deg, #2563eb, #1d4ed8); transform: translateX(4px); }
.sidebar button.btn-logout { background: linear-gradient(135deg, #1e293b, #334155); border: 1px solid rgba(220, 38, 38, 0.2); margin-top: auto; }
.sidebar button.btn-logout:hover { background: linear-gradient(135deg, #dc2626, #b91c1c); border-color: #dc2626; }

.main { margin-left: 240px; width: calc(100% - 240px); display: flex; flex-direction: column; min-height: 100vh; }
.topbar { background: #fff; padding: 22px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.topbar h1 { color: #1565C0; font-size: 34px; }
.topbar p { color: #64748b; margin-top: 4px; }
.content { padding: 25px; flex-grow: 1; }
.dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 18px; margin-top: 20px; }
button { border: none; padding: 12px 18px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all .25s ease; }
button:hover { transform: translateY(-2px); filter: brightness(1.05); }
.hidden { display: none !important; }

.tabela-container { width: 100%; overflow-x: auto; margin-top: 15px; }
.tabela-sistema { width: 100%; border-collapse: collapse; min-width: 800px; }
.tabela-sistema th { background: #f1f5f9; padding: 12px; text-align: left; font-size: 13px; color: #475569; border-bottom: 2px solid #e2e8f0; }
.tabela-sistema td { padding: 12px; border-bottom: 1px solid #e2e8f0; font-size: 13px; background: white; white-space: nowrap; }

.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
.form-grupo { display: flex; flex-direction: column; margin-bottom: 8px; }
.form-grupo label { font-size: 12px; font-weight: 600; margin-bottom: 4px; color: #475569; }
</style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="loginScreen" style="position:fixed; inset:0; background:linear-gradient(135deg,#0f172a,#1e3a8a); display:flex; align-items:center; justify-content:center; z-index:99999;">
  <div style="width:100%; max-width:420px; background:white; padding:40px; border-radius:20px; box-shadow:0 20px 50px rgba(0,0,0,.25); text-align:center;">
    <div style="font-size:42px; font-weight:bold; color:#2563eb; margin-bottom:8px;">⚡ ORIZON</div>
    <p style="color:#64748b; margin-bottom:28px;">Smart Operations Platform</p>
    <input id="loginUser" type="text" placeholder="Usuário" style="width:100%; padding:14px; margin-bottom:12px; border:1px solid #cbd5e1; border-radius:10px;" autocomplete="off">
    <input id="loginPass" type="password" placeholder="Senha" style="width:100%; padding:14px; margin-bottom:18px; border:1px solid #cbd5e1; border-radius:10px;">
    <button id="btnEntrar" class="btn-primary" style="width:100%; padding:14px; font-weight:bold; font-size:15px;">Entrar no sistema</button>
    <p style="margin-top:18px; font-size:12px; color:#94a3b8;">by DMA Solutions • Operational Management</p>
  </div>
</div>

<!-- CONTAINER PRINCIPAL -->
<div id="wrapperSistema" class="hidden" style="width:100%; display:flex;">
  <div class="sidebar">
    <div class="logo" id="logoInicio">⚡ ORIZON</div>
    <small>Painel de Operações</small>
    <div class="menu-items">
      <button id="btnMenuRotas">📍 Rotas</button>
      <button id="btnMenuClientes">🏥 Clientes</button>
      <button id="btnMenuChamados">🛠 Chamados</button>
      <button id="btnMenuPatrimonio">📦 Patrimônio</button>
      <button id="btnMenuDashboards">📊 Dashboards</button>
      <button id="btnMenuConfig">⚙ Configurações</button>
    </div>
    <button id="btnSidebarLogout" class="btn-logout">🚪 Sair do Sistema</button>
  </div>

  <div class="main">
    <div class="topbar">
      <h1>ORIZON</h1>
      <p id="subtituloTopbar">Gestão inteligente de rotas e operações</p>
    </div>
    <div class="content" id="conteudoPrincipal"></div>
  </div>
</div>

<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyHIvNs0aEU9ZbNzg6mYd5g1y5bl1dbMgnJywmp9VXxLLcC9c_qIrUHiyTNapa1zpyksA/exec';

const appState = {
  clientes: JSON.parse(localStorage.getItem('orizonClientes')) || [],
  tecnicos: ['Diogo', 'Fagner Lima', 'Administrador'],
  veiculos: [],
  rotas: JSON.parse(localStorage.getItem('orizonRotas')) || [],
  usuarios: [],
  usuarioLogado: null
};

// Vinculação de eventos via JavaScript Nativo
document.getElementById('btnEntrar').addEventListener('click', fazerLogin);
document.getElementById('btnSidebarLogout').addEventListener('click', efetuarLogout);
document.getElementById('logoInicio').addEventListener('click', voltarInicio);
document.getElementById('btnMenuRotas').addEventListener('click', () => abrirTela('rotas'));
document.getElementById('btnMenuClientes').addEventListener('click', () => abrirTela('clientes'));
document.getElementById('btnMenuChamados').addEventListener('click', () => abrirTela('chamados'));
document.getElementById('btnMenuPatrimonio').addEventListener('click', () => abrirTela('patrimonio'));
document.getElementById('btnMenuDashboards').addEventListener('click', () => abrirTela('dashboards'));
document.getElementById('btnMenuConfig').addEventListener('click', () => abrirTela('config'));

function fazerLogin() {
  const userIn = document.getElementById('loginUser').value.trim().toLowerCase();
  const passIn = document.getElementById('loginPass').value;

  // Verificação temporária local caso a planilha esteja sincronizando pela primeira vez
  if ((userIn === 'admin' && passIn === '@181989Di') || (userIn === 'visitante' && passIn === '123')) {
    liberarPainel({ nome: userIn === 'admin' ? 'Administrador' : 'Visitante', perfil: userIn.toUpperCase() });
    return;
  }

  const conta = appState.usuarios.find(u => u.login === userIn && u.senha === passIn);
  if (conta) {
    liberarPainel(conta);
  } else {
    alert('Usuário ou senha incorretos!');
  }
}

function liberarPainel(usuario) {
  appState.usuarioLogado = usuario;
  sessionStorage.setItem('orizonUsuarioAtivo', JSON.stringify(usuario));
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('wrapperSistema').classList.remove('hidden');
  document.getElementById('subtituloTopbar').innerText = `Logado como: ${usuario.nome} (${usuario.perfil})`;
  sincronizarDadosPlanilha();
  voltarInicio();
}

function efetuarLogout() {
  if (!confirm('Deseja realmente sair do sistema?')) return;
  appState.usuarioLogado = null;
  sessionStorage.removeItem('orizonUsuarioAtivo');
  document.getElementById('wrapperSistema').classList.add('hidden');
  document.getElementById('loginScreen').style.display = 'flex';
}

function verificarSessaoAtiva() {
  const sessaoSalva = sessionStorage.getItem('orizonUsuarioAtivo');
  if (sessaoSalva) {
    appState.usuarioLogado = JSON.parse(sessaoSalva);
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('wrapperSistema').classList.remove('hidden');
    document.getElementById('subtituloTopbar').innerText = `Logado como: ${appState.usuarioLogado.nome}`;
    sincronizarDadosPlanilha();
    voltarInicio();
  }
}

// SINCRONIZAÇÃO COMPATÍVEL COM O SEU DO_GET (acao=listarCadastros)
function sincronizarDadosPlanilha() {
  fetch(`${WEB_APP_URL}?acao=listarCadastros`)
    .then(res => res.json())
    .then(res => {
      if (res.sucesso) {
        appState.clientes = res.clientes || [];
        appState.usuarios = res.usuarios || [];
        
        if (res.veiculos && res.veiculos.length > 0) {
          appState.veiculos = res.veiculos.map(v => v.modelo);
        }

        localStorage.setItem('orizonClientes', JSON.stringify(appState.clientes));
        
        const tbody = document.getElementById('listaClientesTbody');
        if (tbody) atualizarTabelaClientesLocal();
      }
    })
    .catch(err => console.error("Erro na leitura remota dos dados: ", err));
}

function abrirTela(menu) {
  const principal = document.getElementById('conteudoPrincipal');
  if (menu === 'inicio') {
    principal.innerHTML = `
      <h2>Bem-vindo ao ORIZON</h2>
      <div class="dashboard-grid">
        <div class="card"><h3>📍 Controle de Rotas</h3><p>Planejamento operacional e acompanhamento diário.</p></div>
        <div class="card"><h3>🏥 Clientes</h3><p>Cadastro integrado com o Google Sheets.</p></div>
        <div class="card"><h3>🛠 Gestão de Chamados</h3><p>Controle de atendimentos técnicos e ordens de serviço.</p></div>
        <div class="card"><h3>📦 Patrimônio</h3><p>Inventário por unidade de atendimento.</p></div>
      </div>`;
  } else if (menu === 'clientes') {
    renderizarTelaClientes(principal);
  } else if (menu === 'rotas') {
    renderizarTelaRotas(principal);
  } else {
    principal.innerHTML = `<h2>🚧 Módulo ${menu.toUpperCase()}</h2><p style="color:#64748b; margin-top:10px;">Módulo integrado à planilha em homologação técnica.</p>`;
  }
}

function voltarInicio() { abrirTela('inicio'); }

// ==========================================
// FORMULÁRIO COMPATÍVEL COM BANCO DE DADOS CLIENTES
// ==========================================
function renderizarTelaClientes(container) {
  container.innerHTML = `
    <div>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2>🏥 Cadastro e Listagem de Clientes</h2>
        <button onclick="sincronizarDadosPlanilha()" class="btn-secondary" style="padding:8px 12px; font-size:12px;">🔄 Sincronizar Planilha</button>
      </div>
      
      <div class="card-padrao" style="margin-bottom: 25px;">
        <h3 style="margin-bottom:15px; color:var(--cor-primaria);">Ficha de Cadastro do Cliente</h3>
        <div class="form-grid">
          <div class="form-grupo"><label>Cliente / Unidade *</label><input type="text" id="formCliente" class="input-padrao" placeholder="Nome do Cliente"></div>
          <div class="form-grupo"><label>CNPJ</label><input type="text" id="formCnpj" class="input-padrao" placeholder="00.000.000/0001-00"></div>
          <div class="form-grupo"><label>Contrato</label><input type="text" id="formContrato" class="input-padrao" placeholder="Nº Contrato"></div>
          <div class="form-grupo"><label>CEP</label><input type="text" id="formCep" class="input-padrao" placeholder="00000-000"></div>
          <div class="form-grupo"><label>Logradouro</label><input type="text" id="formLogradouro" class="input-padrao" placeholder="Rua / Av"></div>
          <div class="form-grupo"><label>Número</label><input type="text" id="formNumero" class="input-padrao" placeholder="Nº"></div>
          <div class="form-grupo"><label>Complemento</label><input type="text" id="formComplemento" class="input-padrao" placeholder="Sala, Bloco..."></div>
          <div class="form-grupo"><label>Bairro</label><input type="text" id="formBairro" class="input-padrao" placeholder="Bairro"></div>
          <div class="form-grupo"><label>Cidade</label><input type="text" id="formCidade" class="input-padrao" value="SÃO PAULO"></div>
          <div class="form-grupo"><label>UF</label><input type="text" id="formUf" class="input-padrao" value="SP" maxlength="2"></div>
          <div class="form-grupo"><label>Região</label><input type="text" id="formRegiao" class="input-padrao" placeholder="Ex: Sul, Monte Azul"></div>
          <div class="form-grupo"><label>Responsável</label><input type="text" id="formResponsavel" class="input-padrao" placeholder="Nome do contato"></div>
          <div class="form-grupo"><label>Telefone</label><input type="text" id="formTelefone" class="input-padrao" placeholder="(11) 99999-0000"></div>
          <div class="form-grupo"><label>E-mail</label><input type="email" id="formEmail" class="input-padrao" placeholder="email@provedor.com"></div>
        </div>
        <div style="margin-top:12px;"><div class="form-grupo"><label>Observações</label><input type="text" id="formObservacao" class="input-padrao" placeholder="Observações operacionais do cliente"></div></div>
        <button id="btnSalvarClientePlanilha" class="btn-success" style="margin-top:15px; width:100%; padding:14px;">💾 Gravar na Planilha Google</button>
      </div>

      <div class="card-padrao">
        <h3 style="margin-bottom:10px;">Clientes na Base</h3>
        <div class="tabela-container"><table class="tabela-sistema"><thead><tr><th>CLIENTE</th><th>CONTRATO</th><th>LOGRADOURO</th><th>BAIRRO</th><th>CIDADE</th><th>RESPONSÁVEL</th></tr></thead><tbody id="listaClientesTbody"></tbody></table></div>
      </div>
    </div>`;

  document.getElementById('btnSalvarClientePlanilha').addEventListener('click', enviarClientePlanilha);
  atualizarTabelaClientesLocal();
}

function atualizarTabelaClientesLocal() {
  const tbody = document.getElementById('listaClientesTbody');
  if (!tbody) return;
  tbody.innerHTML = '';

  if (appState.clientes.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#64748b;">Nenhum cliente carregado. Clique em Sincronizar.</td></tr>`;
    return;
  }

  appState.clientes.forEach(c => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="font-weight:600; color:#1e293b;">${c.nome || ''}</td>
      <td>${c.contrato || ''}</td>
      <td>${c.endereco || ''}</td>
      <td>-</td>
      <td>${c.cidade || ''}</td>
      <td>${c.responsavel || ''}</td>
    `;
    tbody.appendChild(tr);
  });
}

// POST INTEGRADO COM SEU DO_POST (acao=salvarCadastro & tipo=CLIENTE)
function enviarClientePlanilha() {
  const clienteNome = document.getElementById('formCliente').value.trim();
  if (!clienteNome) { alert('O campo Cliente é obrigatório!'); return; }

  const objetoDados = {
    id: 'cli_' + Date.now(),
    nome: clienteNome,
    contrato: document.getElementById('formContrato').value,
    endereco: `${document.getElementById('formLogradouro').value}, ${document.getElementById('formNumero').value}`,
    cidade: document.getElementById('formCidade').value,
    responsavel: document.getElementById('formResponsavel').value
  };

  const btn = document.getElementById('btnSalvarClientePlanilha');
  btn.innerText = 'Enviando dados...';
  btn.disabled = true;

  // Montagem da URL no padrão do seu e.parameter.acao do Apps Script
  const urlEnvio = `${WEB_APP_URL}?acao=salvarCadastro&tipo=CLIENTE&dados=${encodeURIComponent(JSON.stringify(objetoDados))}`;

  fetch(urlEnvio, { method: 'POST', mode: 'no-cors' })
  .then(() => {
    alert('Solicitação de cadastro gravada na Planilha Google!');
    btn.innerText = '💾 Gravar na Planilha Google';
    btn.disabled = false;
    document.getElementById('formCliente').value = '';
    document.getElementById('formContrato').value = '';
    document.getElementById('formLogradouro').value = '';
    document.getElementById('formNumero').value = '';
    setTimeout(sincronizarDadosPlanilha, 1500);
  })
  .catch(err => {
    alert('Erro ao enviar dados.');
    console.error(err);
    btn.disabled = false;
  });
}

// ==========================================
// MÓDULO DE ROTAS DIÁRIAS
// ==========================================
function renderizarTelaRotas(container) {
  container.innerHTML = `
    <div>
      <h2>📍 Módulo de Rotas</h2>
      <div class="dashboard-grid">
        <div class="card"><h3>Nova Rota</h3><p>Criar rota diária vinculando clientes e ordens de serviço.</p><button id="btnCriarFormRota" class="btn-primary" style="margin-top:12px;">Abrir formulário</button></div>
        <div class="card"><h3>📋 Histórico</h3><p>Consultar rotas anteriores salvas na base.</p><button id="btnAbrirHistRotas" class="btn-secondary" style="margin-top:12px;">Abrir histórico</button></div>
      </div>
    </div>`;
  document.getElementById('btnCriarFormRota').addEventListener('click', abrirFormularioRota);
  document.getElementById('btnAbrirHistRotas').addEventListener('click', abrirHistoricoRotas);
}

function abrirFormularioRota() {
  const numRotaSugerido = `ROT-${new Date().getFullYear()}-${String(appState.rotas.length + 1).padStart(4, '0')}`;
  let optionsTecnicos = '<option>Selecionar técnico</option>';
  appState.tecnicos.forEach(t => optionsTecnicos += `<option>${t}</option>`);
  
  let optionsVeiculos = '<option>Selecionar veículo</option>';
  if(appState.veiculos.length > 0) {
    appState.veiculos.forEach(v => optionsVeiculos += `<option>${v}</option>`);
  } else {
    optionsVeiculos += '<option>Strada</option><option>Fiorino</option>';
  }

  document.getElementById('conteudoPrincipal').innerHTML = `
    <div>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px;">
        <h2>📍 Criar Nova Rota</h2>
        <div><button id="btnGravarRotaFinal" class="btn-success">💾 Salvar Rota</button><button id="btnCancelarFormRota" class="btn-secondary">Cancelar</button></div>
      </div>
      <div class="card-padrao" style="margin-bottom:20px;">
        <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px;">
          <div><label>Nº Rota</label><input id="numeroRota" value="${numRotaSugerido}" readonly class="input-padrao" style="background:#f1f5f9;"></div>
          <div><label>Data</label><input type="date" id="dataRota" class="input-padrao"></div>
          <div><label>Técnico 1</label><select id="tecnico1Rota" class="select-padrao">${optionsTecnicos}</select></div>
          <div><label>Técnico 2</label><select id="tecnico2Rota" class="select-padrao">${optionsTecnicos}</select></div>
          <div><label>Veículo</label><select id="veiculoRota" class="select-padrao">${optionsVeiculos}</select></div>
        </div>
      </div>
      <div id="clientesRotaContainer"></div>
      <div style="margin-top:20px; text-align:center;"><button id="btnAdicionarCliCard" class="btn-secondary">➕ Adicionar Cliente à Rota</button></div>
    </div>`;

  document.getElementById('btnGravarRotaFinal').addEventListener('click', salvarRotaPlanilhaReal);
  document.getElementById('btnCancelarFormRota').addEventListener('click', () => abrirTela('rotas'));
  document.getElementById('btnAdicionarCliCard').addEventListener('click', adicionarClienteRota);
  adicionarClienteRota();
}

function adicionarClienteRota() {
  const container = document.getElementById('clientesRotaContainer');
  const clienteId = 'cli_' + Date.now();
  let optionsClientes = '<option value="">Escolher Cliente</option>';
  appState.clientes.forEach(c => optionsClientes += `<option value="${c.nome}">${c.nome}</option>`);

  const div = document.createElement('div');
  div.className = 'card-padrao bloco-cliente-rota';
  div.style.marginTop = '15px';
  div.id = clienteId;
  div.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; gap:10px; flex-wrap:wrap;">
      <div style="flex:1; min-width:250px;"><select class="select-padrao select-cliente-nome">${optionsClientes}</select></div>
      <div>
        <button class="btn-primary btn-add-os" style="padding:8px 12px;">+ OS</button>
        <button class="btn-danger btn-rem-cli" style="padding:8px 12px;">Remover</button>
      </div>
    </div>
    <div style="margin-bottom:10px; font-size:13px; color:#475569;">📍 Endereço da Planilha: <span class="endereco-texto" style="font-weight:bold;">Selecione o cliente para puxar</span></div>
    <table style="width:100%; border-collapse:collapse;" class="tabela-os-cliente">
      <thead><tr style="background:#f8fafc;"><th style="padding:8px; text-align:left;">Nº O.S</th><th style="padding:8px; text-align:left;">Atividade</th></tr></thead>
      <tbody>
        <tr>
          <td><input placeholder="Nº OS" class="input-padrao" style="padding:6px;"></td>
          <td><input placeholder="Serviço" class="input-padrao" style="padding:6px;"></td>
        </tr>
      </tbody>
    </table>`;
  
  container.appendChild(div);

  div.querySelector('.select-cliente-nome').addEventListener('change', function() {
    const local = appState.clientes.find(c => c.nome === this.value);
    div.querySelector('.endereco-texto').innerText = local ? local.endereco : 'Não encontrado';
  });
  div.querySelector('.btn-add-os').addEventListener('click', () => {
    const tbody = div.querySelector('.tabela-os-cliente tbody');
    const tr = document.createElement('tr');
    tr.innerHTML = `<td><input placeholder="Nº OS" class="input-padrao" style="padding:6px;"></td><td><input placeholder="Serviço" class="input-padrao" style="padding:6px;"></td>`;
    tbody.appendChild(tr);
  });
  div.querySelector('.btn-rem-cli').addEventListener('click', () => div.remove());
}

function salvarRotaPlanilhaReal() {
  const nr = document.getElementById('numeroRota').value;
  const dt = document.getElementById('dataRota').value;
  const t1 = document.getElementById('tecnico1Rota').value;
  const t2 = document.getElementById('tecnico2Rota').value;
  const ve = document.getElementById('veiculoRota').value;

  if (!dt || t1.includes('Selecionar') || ve.includes('Selecionar')) {
    alert('Preencha os campos obrigatórios!');
    return;
  }

  const blocos = document.querySelectorAll('.bloco-cliente-rota');
  let clientesMontados = [];

  blocos.forEach(b => {
    const nome = b.querySelector('.select-cliente-nome').value;
    const end = b.querySelector('.endereco-texto').innerText;
    
    let chamados = [];
    b.querySelectorAll('.tabela-os-cliente tbody tr').forEach(r => {
      const inputs = r.querySelectorAll('input');
      if(inputs[0].value || inputs[1].value) {
        chamados.push({ os: inputs[0].value, atividade: inputs[1].value, tipo: 'Preventiva', prioridade: '🟡 Média' });
      }
    });

    if(nome) {
      clientesMontados.push({ cliente: nome, endereco: end, observacao: '', chamados: chamados });
    }
  });

  const pacoteRota = { numeroRota: nr, data: dt, tecnico1: t1, tecnico2: t2 === 'Selecionar técnico' ? '' : t2, veiculo: ve, clientes: clientesMontados };

  const btn = document.getElementById('btnGravarRotaFinal');
  btn.innerText = 'Gravando Rota...';
  btn.disabled = true;

  // Envio casado com o seu doPost de salvar Rota por parâmetro de dados
  const urlEnvio = `${WEB_APP_URL}?dados=${encodeURIComponent(JSON.stringify(pacoteRota))}`;

  fetch(urlEnvio, { method: 'POST', mode: 'no-cors' })
  .then(() => {
    alert('Rota integrada e salva nas abas ROTAS, ROTAS_CLIENTES e ROTA_OS!');
    appState.rotas.push(pacoteRota);
    localStorage.setItem('orizonRotas', JSON.stringify(appState.rotas));
    abrirTela('rotas');
  })
  .catch(err => {
    console.error(err);
    alert('Erro de conexão ao salvar.');
    btn.disabled = false;
    btn.innerText = '💾 Salvar Rota';
  });
}

function abrirHistoricoRotas() {
  let html = '<h2>📋 Histórico Operacional</h2><div style="margin-top:15px;">';
  if (appState.rotas.length === 0) {
    html += '<p class="card-padrao">Nenhuma rota salva nesta sessão de testes.</p>';
  } else {
    appState.rotas.forEach(r => {
      html += `<div class="card-padrao" style="margin-bottom:10px;"><strong>${r.numeroRota}</strong> - ${r.data} | Técnico: ${r.tecnico1} | Veículo: ${r.veiculo} (${r.clientes.length} clientes vinculados)</div>`;
    });
  }
  html += `</div><button id="btnVoltarHistMenu" class="btn-secondary" style="margin-top:15px;">Voltar</button>`;
  document.getElementById('conteudoPrincipal').innerHTML = html;
  document.getElementById('btnVoltarHistMenu').addEventListener('click', () => abrirTela('rotas'));
}

verificarSessaoAtiva();
</script>
</body>
