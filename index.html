<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>METRIKA - OPERATIONS PLATFORM</title>

<!-- =========================================================================
     BLOCO 1: ESTILOS GERAIS E ARQUITETURA DE DESIGN DA INTERFACE (CSS)
     ========================================================================= -->
<style>
:root {
  --cor-primaria: #2563eb;
  --cor-primaria-hover: #3b82f6;
  --cor-secundaria: #334155;
  --cor-sucesso: #16a34a;
  --cor-perigo: #dc2626;
  --cor-alerta: #eab308;
  --borda: #cbd5e1;
  --bg-sidebar: #0f172a;
  --bg-sidebar-hover: rgba(255, 255, 255, 0.06);
}

/* FORÇAMENTO DE CAIXA ALTA CORPORATIVA EXCLUSIVA */
* { 
  margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; 
  text-transform: uppercase; 
}
body { background: #f4f7fb; color: #1e293b; display: flex; min-height: 100vh; }

.input-padrao, .select-padrao, .textarea-padrao {
  width: 100%; padding: 10px; border: 1px solid var(--borda); border-radius: 8px; background: white; font-size: 13px;
  outline: none !important; transition: border-color 0.2s;
}
.input-padrao:focus, .select-padrao:focus {
  border-color: var(--cor-primaria) !important;
  box-shadow: none !important;
}
#loginUser, #loginPass, #formUserSenha, input[type="password"], input[type="email"], .no-uppercase { 
  text-transform: none !important; 
}

.btn-primary { background: var(--cor-primaria); color: white; }
.btn-danger { background: var(--cor-perigo); color: white; }
.btn-success { background: var(--cor-sucesso); color: white; }
.btn-secondary { background: var(--cor-secundaria); color: white; }

.card-padrao { background: #fff; border-radius: 16px; padding: 22px; box-shadow: 0 6px 18px rgba(0,0,0,.06); border: 1px solid #e2e8f0; margin-bottom: 25px; }

.sidebar { 
  width: 270px; background: var(--bg-sidebar); color: #fff; position: fixed; 
  top: 0; left: 0; bottom: 0; padding: 24px 16px; display: flex; flex-direction: column; 
  box-shadow: 4px 0 10px rgba(0, 0, 0, 0.15); z-index: 100;
}
.logo-container { padding: 0 8px; margin-bottom: 24px; }
.logo { font-size: 28px; font-weight: 900; color: #3b82f6; cursor: pointer; letter-spacing: 1.5px; }
.sidebar small { color: #64748b; display: block; margin-top: 4px; font-size: 11px; font-weight: 700; }

.menu-items { flex-grow: 1; display: flex; flex-direction: column; gap: 4px; }

.sidebar button { 
  width: 100%; border: none; background: transparent; color: #94a3b8; padding: 12px 14px; 
  border-radius: 8px; text-align: left; cursor: pointer; font-weight: 600; font-size: 12px; 
  display: flex; align-items: center; gap: 12px; transition: all .2s ease-in-out; white-space: nowrap;
}
.sidebar button svg { width: 18px; height: 18px; fill: currentColor; }
.sidebar button:hover { background: var(--bg-sidebar-hover); color: #fff; }
.sidebar button.active-menu {
  background: rgba(37, 99, 235, 0.15); color: #3b82f6; font-weight: 700;
  border-left: 4px solid #2563eb; border-radius: 4px 8px 8px 4px; padding-left: 10px;
}

.assinatura-desenvolvedor {
  padding: 10px 8px; font-size: 9px; color: #475569; font-weight: bold;
  letter-spacing: 0.5px; border-top: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 8px; text-align: center;
}

.sidebar button.btn-logout { background: transparent; border: 1px solid rgba(220, 38, 38, 0.3); color: #f87171; justify-content: center; font-weight: 700; }
.sidebar button.btn-logout:hover { background: var(--cor-perigo); color: #fff; border-color: var(--cor-perigo); }

.main { margin-left: 270px; width: calc(100% - 270px); display: flex; flex-direction: column; min-height: 100vh; }
.topbar { background: #fff; padding: 22px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.topbar h1 { color: #1565C0; font-size: 34px; }
.topbar p { color: #64748b; margin-top: 4px; }
.content { padding: 25px; flex-grow: 1; }
.dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 18px; margin-top: 20px; }
button { border: none; padding: 10px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all .25s ease; }
button:hover { transform: translateY(-1px); filter: brightness(1.05); }
.hidden { display: none !important; }

.tabela-container { width: 100%; overflow-x: auto; margin-top: 15px; }
.tabela-sistema { width: 100%; border-collapse: collapse; min-width: 1100px; }
.tabela-sistema th { background: #f1f5f9; padding: 12px; text-align: left; font-size: 13px; color: #475569; border-bottom: 2px solid #e2e8f0; }
.tabela-sistema td { padding: 12px; border-bottom: 1px solid #e2e8f0; font-size: 13px; background: white; white-space: nowrap; }

.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
.form-grid label { font-size: 12px; font-weight: 600; margin-bottom: 4px; color: #475569; }
.form-grupo { display: flex; flex-direction: column; margin-bottom: 8px; }

.tabs-gestao { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #cbd5e1; padding-bottom: 5px; }
.tab-item { padding: 8px 16px; cursor: pointer; font-weight: 600; font-size: 13px; color: #64748b; border-bottom: 2px solid transparent; }
.tab-item.active { color: var(--cor-primaria); border-color: var(--cor-primaria); }

.dash-card-num { border-left: 5px solid var(--cor-primaria); display: flex; flex-direction: column; justify-content: center; }
.dash-card-num h4 { font-size: 12px; text-transform: uppercase; color: #64748b; font-weight: bold; }
.dash-card-num .num { font-size: 32px; font-weight: 900; color: #0f172a; margin-top: 5px; }
.bar-progresso-container { background: #e2e8f0; border-radius: 6px; width: 100%; height: 10px; margin-top: 8px; overflow: hidden; }
.bar-progresso-fill { height: 100%; border-radius: 6px; transition: width 0.4s ease; }

.modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); display: flex; align-items: center; justify-content: center; z-index: 10000; }
.modal-box { background: white; border-radius: 16px; padding: 28px; width: 100%; max-width: 500px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #e2e8f0; }
.modal-header h3 { font-size: 18px; font-weight: bold; }
.modal-close { background: none; font-size: 20px; color: #64748b; padding: 0; }
.modal-close:hover { color: var(--cor-perigo); transform: none; }

.card-atalho-home { background: #fff; padding: 18px; border-radius: 12px; border: 1px solid #e2e8f0; cursor: pointer; transition: all .2s ease; display: flex; flex-direction: column; gap: 4px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
.card-atalho-home:hover { border-color: var(--cor-primaria); transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(37,99,235,0.08); }
.card-atalho-home h4 { font-size: 13px; color: #1e293b; font-weight: 700; }
.card-atalho-home p { font-size: 11px; color: #64748b; }

.container-parada { border: 1px solid var(--borda); padding: 18px; border-radius: 12px; margin-bottom: 20px; background: #fff; position: relative; }
.container-parada.prioridade-alta { border-color: var(--cor-perigo); background: #fff5f5; }
.sub-tabela-os { width: 100%; margin-top: 15px; border-collapse: collapse; border: 1px solid var(--borda); }
.sub-tabela-os th { background: #f8fafc; font-size: 11px; padding: 10px; color: #475569; border-bottom: 2px solid #e2e8f0; text-align: left; }
.sub-tabela-os td { padding: 8px; background: white; border-bottom: 1px solid #e2e8f0; }
</style>
</head>
<body>

<div id="loginScreen" style="position:fixed; inset:0; background:linear-gradient(135deg,#0f172a,#1e3a8a); display:flex; align-items:center; justify-content:center; z-index:99999;">

<!-- =========================================================================
     BLOCO 3: ESTRUTURA CORE (SIDEBAR NAVIGATION & MAIN PANEL)
     ========================================================================= -->
<div id="wrapperSistema" class="hidden" style="width:100%; display:flex;">
  <div class="sidebar">
    <div class="logo-container">
      <div class="logo" id="logoInicio">METRIKA</div>
      <small>CLINICAL ASSET INTELLIGENCE</small>
    </div>
    <div class="menu-items">
      <button id="btnMenuRotas">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13cc0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>

        DASHBOARDS
      </button>
      <button id="btnMenuGestao">
        <svg viewBox="0 0 24 24"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46.21 14.25 0 14 0h-4c-.25 0-.46.21-.49.46l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73M12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
        GESTÃO DO SISTEMA
      </button>
    </div>
    
    <div class="assinatura-desenvolvedor">
      BY DIOGO MATOS<br>• OPERATIONAL MANAGEMENT •
    </div>
    
    <button id="btnSidebarLogout" class="btn-logout">
      <svg viewBox="0 0 24 24" style="width:16px; height:16px;"><path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>

  <div class="main">

<div id="modalContainer" class="hidden"></div>
<datalist id="datalistClientesGlobal"></datalist>

<!-- =========================================================================
     BLOCO 4: MOTOR DE LÓGICA E INTEGRAÇÃO DE SCRIPT DO METRIKA
     ========================================================================= -->
<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycby7a2uRwvyKGXtUPT5fXXAxNByIqbYnTfXgAydyEwMVIq_YxVTJOmNAmuQOKEXpKmJJ8w/exec';

/* ==================== CONFIGURAÇÃO GLOBAL DO ESTADO (APPSTATE) ==================== */
const appState = {
  clientes: JSON.parse(localStorage.getItem('orizonClientes')) || [],
  patrimonio: [],
  movimentacoes: [],
  tecnicos: ['DIOGO', 'ADMINISTRADOR'],
  veiculos: ['FIAT STRADA 01 (BRA2E19)', 'FIAT STRADA 02 (ABC1D23)', 'CHEVROLET ONYX (XYZ9H88)', 'MOTO OPERACIONAL (KTM3M11)', 'BASE LINEMED'],
  rotas: [],
  multas: [],
  usuarios: [], 
  usuarioLogado: null,
  idClienteEmEdicao: null,
  idUsuarioEmEdicao: null,
  idMultaEmEdicao: null,
  idRotaEmEdicao: null, // Controle exclusivo para alteração de jornada existente
  filtroStatusUsuario: 'ATIVO',
  filtroStatusCliente: 'ATIVO',
  buscaTextoCliente: '',
  buscaTextoUsuario: '',
  buscaTextoPatrimonio: '',
  buscaTextoMatrizParam: '', 
  buscaTextoMultas: '',
  buscaTextoRotas: '', // Filtro de busca do monitor de rotas

  matrizAtivos: [],
  idMatrizEmEdicao: null,
  filtroClienteAuditoria: 'GERAL',

  configuracoes: {
    prefixoTag: 'LMD',
    digitosTag: 4,
    empresaRaiz: 'LINEMED ENGENHARIA CLINICA',
    setoresRaiz: 'ESTOQUE CENTRAL, LABORATORIO, RECEPCAO'
  }
};

let contadorParadas = 0;
let contadorOS = 0;

sincronizarDadosPlanilha();
verificarSessaoAtiva();

function marcarAbaAtivaMenu(idBotao) {
  const botoes = document.querySelectorAll('.sidebar button');
  botoes.forEach(b => b.classList.remove('active-menu'));
  const btnAlvo = document.getElementById(idBotao);
  if (btnAlvo) btnAlvo.classList.add('active-menu');
}

/* ==================== DISPARADORES DE EVENTOS DO MENU PRINCIPAL ==================== */
document.getElementById('btnEntrar').addEventListener('click', fazerLogin);
document.getElementById('btnSidebarLogout').addEventListener('click', efetuarLogout);
document.getElementById('logoInicio').addEventListener('click', voltarInicio);

document.getElementById('btnMenuRotas').addEventListener('click', () => { appState.idRotaEmEdicao = null; abrirTela('rotas'); marcarAbaAtivaMenu('btnMenuRotas'); });
document.getElementById('btnMenuClientes').addEventListener('click', () => { abrirTela('clientes'); marcarAbaAtivaMenu('btnMenuClientes'); });
document.getElementById('btnMenuChamados').addEventListener('click', () => { abrirTela('chamados'); marcarAbaAtivaMenu('btnMenuChamados'); });
document.getElementById('btnMenuLocacao').addEventListener('click', () => { abrirTela('locacao'); marcarAbaAtivaMenu('btnMenuLocacao'); });
document.getElementById('btnMenuMultas').addEventListener('click', () => { abrirTela('multas'); marcarAbaAtivaMenu('btnMenuMultas'); });
document.getElementById('btnMenuPatrimonio').addEventListener('click', () => { abrirTela('patrimonio'); marcarAbaAtivaMenu('btnMenuPatrimonio'); });
document.getElementById('btnMenuDashboards').addEventListener('click', () => { abrirTela('dashboards'); marcarAbaAtivaMenu('btnMenuDashboards'); });
document.getElementById('btnMenuGestao').addEventListener('click', () => { abrirTela('gestao'); marcarAbaAtivaMenu('btnMenuGestao'); });

/* ==================== SISTEMA DE CONTROLE DE ACESSOS E SESSÕES ==================== */
function fazerLogin() {
  const userIn = document.getElementById('loginUser').value.trim().toUpperCase();
  const passIn = document.getElementById('loginPass').value;

  if ((userIn === 'ADMIN' && passIn === '@181989Di') || (userIn === 'VISITANTE' && passIn === '123')) {
    liberarPainel({ nome: userIn === 'ADMIN' ? 'ADMINISTRADOR' : 'VISITANTE', perfil: userIn });
    return;
  }
  
  if (appState.usuarios && appState.usuarios.length > 0) {
    const conta = appState.usuarios.find(u => String(u.login).toUpperCase() === userIn && String(u.senha) === passIn);
    if (conta) { 
      liberarPainel(conta); 
      return;
    }
  }
  alert('USUÁRIO OU SENHA INCORRETOS OU BASE AINDA CARREGANDO!');
}

function liberarPainel(usuario) {
  appState.usuarioLogado = usuario;
  sessionStorage.setItem('orizonUsuarioAtivo', JSON.stringify(usuario));
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('wrapperSistema').classList.remove('hidden');
  document.getElementById('subtituloTopbar').innerText = `LOGADO COMO: ${usuario.nome.toUpperCase()} (${(usuario.perfil || 'USUÁRIO').toUpperCase()})`;
  voltarInicio();
}

function sidebarLogoutSemPopup() {
  appState.usuarioLogado = null;
  sessionStorage.removeItem('orizonUsuarioAtivo');
  document.getElementById('wrapperSistema').classList.add('hidden');
  document.getElementById('loginScreen').style.display = 'flex';
}

function efetuarLogout() {
  if (!confirm('DESEJA REALMENTE SAIR?')) return;
  sidebarLogoutSemPopup();
}

function verificarSessaoAtiva() {
  const sessaoSalva = sessionStorage.getItem('orizonUsuarioAtivo');
  if (sessaoSalva) {
    appState.usuarioLogado = JSON.parse(sessaoSalva);
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('wrapperSistema').classList.remove('hidden');
    document.getElementById('subtituloTopbar').innerText = `LOGADO COMO: ${appState.usuarioLogado.nome.toUpperCase()}`;
    voltarInicio();
  }
}

/* ==================== COMUNICAÇÃO ASSÍNCRONA E SINCRONIZAÇÃO JSONP ==================== */
window.processarRetornoSincronizacao = function(res) {
  if (res && res.sucesso) {
    appState.clientes = res.clientes || [];
    appState.patrimonio = res.patrimonio || [];
    appState.movimentacoes = res.movimentacoes || [];
    appState.usuarios = res.usuarios || [];
    
    // PRESERVAÇÃO RIGOROSA DAS PLACAS DOS VEÍCULOS CORPORATIVOS
    appState.veiculos = ['FIAT STRADA 01 (BRA2E19)', 'FIAT STRADA 02 (ABC1D23)', 'CHEVROLET ONYX (XYZ9H88)', 'MOTO OPERACIONAL (KTM3M11)', 'BASE LINEMED']; 
    
    appState.matrizAtivos = res.matrizAtivos || [];
    appState.rotas = res.rotas || [];
    appState.multas = res.multas || [];
    if(res.configuracoes) appState.configuracoes = res.configuracoes;
    
    localStorage.setItem('orizonClientes', JSON.stringify(appState.clientes));
    
    const dl = document.getElementById('datalistClientesGlobal');
    if(dl) {
      dl.innerHTML = '';
      appState.clientes.filter(c => c.status === 'ATIVO').forEach(c => {
        let opt = document.createElement('option'); opt.value = c.nome.toUpperCase(); dl.appendChild(opt);
      });
    }

    if (document.getElementById('listaClientesTbody')) atualizarTabelaClientesLocal();
    if (document.getElementById('listaPatrimonioTbody')) atualizarTabelaPatrimonioLocal();
    if (document.getElementById('movTagInput')) atualizarDatalistTags();
    if (document.getElementById('listaUsuariosTbody')) atualizarTabelaUsuariosLocal();
    if (document.getElementById('tbodyMatrizAtivosParam')) desenharTabelaMatrizAtivos();
    if (document.getElementById('idContainerHomePrincipal')) renderizarHomePainelDinâmico();
    if (document.getElementById('containerModuloAuditoria')) renderizarModuloAuditoria();
    if (document.getElementById('tbodyRotasOperacionais')) atualizarTabelaRotasNativa();
    if (document.getElementById('listaMultasTbody')) atualizarTabelaMultasLocal();
    
    if (document.getElementById('cardFormEquipamento') && !document.getElementById('cardFormEquipamento').classList.contains('hidden')) {
      recalcularTagSequencialDinamica();
    }
  }
};

function sincronizarDadosPlanilha() {
  const urlFinal = `${WEB_APP_URL}?acao=listarCadastros&prefix=processarRetornoSincronizacao`;
  const scriptAntigo = document.getElementById('jsonp_sync_script');
  if(scriptAntigo) scriptAntigo.remove();
  
  const scriptElement = document.createElement('script');
  scriptElement.id = 'jsonp_sync_script';
  scriptElement.src = urlFinal;
  document.body.appendChild(scriptElement);
}

function buscarEnderecoClienteMetrika(idParada) {
  const select = document.getElementById(`cli_parada_${idParada}`);
  const labelEnd = document.getElementById(`end_exibicao_parada_${idParada}`);
  if(!select || !labelEnd) return;
  
  const nomeCliente = select.value;
  const match = appState.clientes.find(c => c.nome.toUpperCase() === nomeCliente.toUpperCase());
  if (match) {
    labelEnd.innerText = `📍 ENDEREÇO: ${match.logradouro || ''}, Nº ${match.numero || ''} - BAIRRO: ${match.bairro || ''} - ${match.cidade || ''}/${match.uf || ''}`;
  } else {
    labelEnd.innerText = '';
  }
}

function removerCardParadaMetrika(idParada) {
  document.getElementById(`parada_${idParada}`).remove();
  const paradasRestantes = document.querySelectorAll('.container-parada');
  paradasRestantes.forEach((p, idx) => {
    const spanNum = p.querySelector('[id^="txt_num_parada_"]');
    if(spanNum) spanNum.innerText = `📍 PARADA OPERACIONAL N° ${idx + 1}`;

function buscaAtivoPorFiltro(idLinha, tipoCampo) {
  const input = document.getElementById(tipoCampo === 'tag' ? `tag_os_${idLinha}` : `ser_os_${idLinha}`);
  if(!input) return;
  const busca = input.value.trim().toUpperCase();
  if(!busca) return;
  
  const ativo = appState.patrimonio.find(p => tipoCampo === 'tag' ? (p.tag || '').toUpperCase() === busca : (p.serie || '').toUpperCase() === busca);
  if(ativo) {
    document.getElementById(`tag_os_${idLinha}`).value = (ativo.tag || '').toUpperCase();
    document.getElementById(`ser_os_${idLinha}`).value = (ativo.serie || '').toUpperCase();
    document.getElementById(`desc_os_${idLinha}`).value = `${ativo.equipamento} | ${ativo.modelo}`.toUpperCase();
    document.getElementById(`desc_os_${idLinha}`).style.color = 'var(--cor-sucesso)';
  } else {
    document.getElementById(`desc_os_${idLinha}`).value = "NÃO LOCALIZADO NO INVENTÁRIO";
    document.getElementById(`desc_os_${idLinha}`).style.color = 'var(--cor-perigo)';
  }
}

function atualizarTabelaRotasNativa() {
  const tbody = document.getElementById('tbodyRotasOperacionais');
  if(!tbody) return;
  tbody.innerHTML = '';
  
  if(!appState.rotas || appState.rotas.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:15px; color:#64748b;">NENHUMA JORNADA LOCALIZADA NA BASE...</td></tr>`;
    return;
  }

  // AGRUPAMENTO LOGÍSTICO EXCLUSIVO EM MEMÓRIA POR ID DA ROTA
  const rotasAgrupadas = {};
  appState.rotas.forEach(r => {
    const id = r.id_rota || r.ID_ROTA || 'ROT-PADRAO';
    if(!rotasAgrupadas[id]) {
      rotasAgrupadas[id] = {
        id_rota: id,
        data: r.data || r.DATA || '-',
        tecnico: r.tecnico || r.TECNICO || '-',
        auxiliar: r.auxiliar || r.AUXILIAR || '-',
        veiculo: r.veiculo || r.VEICULO || '-',
        clientes: []
      };
    }
    if(r.cliente && !rotasAgrupadas[id].clientes.includes(r.cliente.toUpperCase())) {
      rotasAgrupadas[id].clientes.push(r.cliente.toUpperCase());
    }
  });

  const filtradas = Object.values(rotasAgrupadas).filter(r => {
    const txt = appState.buscaTextoRotas || '';
    return txt === '' || 
           r.id_rota.toUpperCase().includes(txt) ||
           r.tecnico.toUpperCase().includes(txt) ||
           r.auxiliar.toUpperCase().includes(txt) ||
           r.veiculo.toUpperCase().includes(txt) ||
           r.clientes.join(', ').includes(txt);
  });

  if(filtradas.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:15px; color:#64748b;">NENHUM CORRESPONDENTE PARA A CONSULTA.</td></tr>`;
    return;
  }

  filtradas.forEach(r => {
    let tr = document.createElement('tr');
    tr.innerHTML = `
      <td><small><b>${r.id_rota}</b></small></td>
      <td><b>${formatarDataBr(r.data)}</b></td>
      <td><small>1: ${r.tecnico}<br>2: ${r.auxiliar}</small></td>
      <td><b>${r.veiculo}</b></td>
      <td>
        <button class="btn-primary" style="padding:4px 10px; font-size:11px;" onclick="prepararEdicaoRotaMetrika('${r.id_rota}')">📝 CORRIGIR</button>
        <button class="btn-secondary" style="padding:4px 10px; font-size:11px;" onclick="imprimirEspelhoRotaMetrika('${r.id_rota}')">🖨️ IMPRIMIR</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function prepararEdicaoRotaMetrika(idRota) {
  appState.idRotaEmEdicao = idRota;
  const linhas = appState.rotas.filter(r => (r.id_rota || r.ID_ROTA) === idRota);
  if(linhas.length === 0) return;

  document.getElementById('divRotasMonitor').add('hidden');
  document.getElementById('divRotasCriar').classList.remove('hidden');
  document.getElementById('tituloFormJornada').innerText = "ALTERAR PLANEJAMENTO DE JORNADA";

  const cab = linhas[0];
  document.getElementById('rotaTecnico').value = cab.tecnico || cab.TECNICO || '';
  document.getElementById('rotaTecnico2').value = cab.auxiliar || cab.AUXILIAR || '';
  document.getElementById('rotaVeiculo').value = cab.veiculo || cab.VEICULO || '';
  
  if(cab.data) {
    try {
      let dObj = new Date(cab.data);
      if(!isNaN(dObj.getTime())) document.getElementById('rotaData').value = dObj.toISOString().split('T')[0];
    } catch(e){}
  }

  const container = document.getElementById('containerListaParadasMetrika');
  container.innerHTML = '';
  contadorParadas = 0;

  // RECONSTRÓI AS PARADAS COM SEUS RESPECTIVOS ENDEREÇOS E LINHAS DE O.S.
  const paradasMapeadas = {};
  linhas.forEach(l => {
    const cName = l.cliente.toUpperCase();
    if(!paradasMapeadas[cName]) paradasMapeadas[cName] = [];

    const tbody = document.getElementById(`tbody_os_${contadorParadas}`);
    tbody.innerHTML = ''; // Limpa a linha inicial automática

    paradasMapeadas[cName].forEach(osLinha => {
      contadorOS++;
      const tr = document.createElement('tr');
      tr.id = `linha_os_${contadorOS}`;
      
      let descComposta = osLinha.descricao || '';

        <td><input type="text" class="input-padrao" readonly value="${nomeExtraido}" style="background:#f1f5f9; font-weight:bold; color:var(--cor-primaria); padding:6px;" id="desc_os_${contadorOS}"></td>

}

function salvarRotaFinalMetrika() {
  const tecnico = document.getElementById('rotaTecnico').value;
  const tecnico2 = document.getElementById('rotaTecnico2').value;
  const veiculo = document.getElementById('rotaVeiculo').value;
  const data = document.getElementById('rotaData').value;
  
  if(!tecnico || !veiculo || !data) {
    return alert('POR FAVOR, PREENCHA OS DADOS OBRIGATÓRIOS DO CABEÇALHO DA JORNADA!');
  }

  const paradasLista = [];
  const cardsParadas = document.querySelectorAll('.container-parada');

  if(cardsParadas.length === 0) return alert('ADICIONE AO MENOS UMA PARADA OPERACIONAL!');
  let validacaoOk = true;

  cardsParadas.forEach(card => {
    const idAtual = card.id.split('_')[1];
    const cliente = document.getElementById(`cli_parada_${idAtual}`).value;
    
    if(!cliente) {
      alert('POR FAVOR, INDIQUE O CLIENTE DESTINO DE TODAS AS PARADAS!');
      validacaoOk = false;
      return;
    }

    const linhasOS = [];
    const trs = document.querySelectorAll(`#tbody_os_${idAtual} tr`);

    trs.forEach(tr => {
      const inputs = tr.querySelectorAll('input');
      const selectLogistica = tr.querySelector('select');
      const numeroOS = inputs[0].value.trim() || 'S/N';
      const tag = inputs[1].value.trim().toUpperCase();
      const serie = inputs[2].value.trim().toUpperCase();
      const equipamento = inputs[3].value.trim().toUpperCase();

      linhasOS.push({
        numeroOS: numeroOS,
        tag: tag,
        serie: serie,
        equipamento: equipamento,
        logistica: selectLogistica ? selectLogistica.value : 'BASE'
      });
    });

    paradasLista.push({
      cliente: cliente,
      linhasOS: linhasOS
    });
  });

  if(!validacaoOk) return;

  const pacoteRota = {
    cabecalho: {
      tecnico: tecnico,
      auxiliar: tecnico2 || '-',
      veiculo: veiculo,
      data: data
    },
    paradas: paradasLista
  };

  const acao = appState.idRotaEmEdicao ? 'editarCadastro' : 'salvarCadastro';
  if(appState.idRotaEmEdicao) pacoteRota.id_rota = appState.idRotaEmEdicao;

  const urlFinal = `${WEB_APP_URL}?acao=${acao}&tipo=MULTAS&dados=${encodeURIComponent(JSON.stringify(pacoteRota))}&prefix=processarRetornoRotaSheets`;
  
  // Como o ponte.gs trata salvarRotaLogistica de forma isolada, mudamos a acao para bater na rota de gravacao unificada do Apps Script
  const urlFinalReal = `${WEB_APP_URL}?acao=salvarRotaLogistica&dados=${encodeURIComponent(JSON.stringify(pacoteRota))}&prefix=processarRetornoRotaSheets`;

  const scriptAntigo = document.getElementById('jsonp_rota_execution_script');
  if(scriptAntigo) scriptAntigo.remove();

  const scriptElement = document.createElement('script');
  scriptElement.id = 'jsonp_rota_execution_script';
  scriptElement.src = urlFinalReal;
  document.body.appendChild(scriptElement);
}

function aplicarMascaraCep() { let v = this.value.replace(/\D/g, '').substring(0, 8); this.value = v.replace(/^(\d{5})(\d)/, "$1-$2"); }
function aplicarMascaraTelefone() { let v = this.value.replace(/\D/g, '').substring(0, 11); v = v.replace(/^(\d{2})(\d)/, "($1) $2"); if (v.length > 9) v = v.replace(/(\d{5})(\d)/, "$1-$2"); else v = v.replace(/(\d{4})(\d)/, "$1-$2"); this.value = v; }
function buscarCepAutomatico() { const cep = this.value.replace(/\D/g, ''); if (cep.length !== 8) return; fetch(`https://viacep.com.br/ws/${cep}/json/`).then(res => res.json()).then(d => { if (!d.erro) { document.getElementById('formLogradouro').value = d.logradouro.toUpperCase(); document.getElementById('formBairro').value = d.bairro.toUpperCase(); } }); }

function verificarDocumentoEReceita() {
  const doc = this.value.trim(); if (!doc) return;
  const isCnpj = document.getElementById('formTipoPessoa').value === 'JURIDICA';
  const dup = appState.clientes.find(c => c.cnpj === doc && c.id !== appState.idClienteEmEdicao);
  if (dup) { alert(isCnpj ? 'CNPJ JÁ CADASTRADO!' : 'CPF JÁ CADASTRADO!'); this.value = ''; return; }
  const clean = doc.replace(/\D/g, '');
  if (isCnpj && clean.length === 14) {
    fetch(`https://brasilapi.com.br/api/cnpj/v1/${clean}`)
      .then(res => res.json())
      .then(dados => {
        document.getElementById('formCliente').value = (dados.razao_social || dados.nome || '').toUpperCase();
        document.getElementById('formCep').value = dados.cep || '';
        document.getElementById('formLogradouro').value = (dados.logradouro || '').toUpperCase();
        document.getElementById('formNumero').value = dados.numero || '';
        document.getElementById('formBairro').value = (dados.bairro || '').toUpperCase();
        document.getElementById('formCidade').value = (dados.municipio || 'SÃO PAULO').toUpperCase();
        document.getElementById('formUf').value = (dados.uf || 'SP').toUpperCase();
        if(dados.nome_fantasia && dados.nome_fantasia.trim() !== '') { document.getElementById('formObservacao').value = "FANTASIA: " + dados.nome_fantasia.toUpperCase(); }
      }).catch(() => {});
  }
}

function aplicarMascaraDocumento() {
  let v = this.value.replace(/\D/g, '');
  if (document.getElementById('formTipoPessoa').value === 'JURIDICA') {
    v = v.substring(0, 14); v = v.replace(/^(\d{2})(\d)/, "$1.$2").replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3").replace(/\.(\d{3})(\d)/, ".$1/$2").replace(/(\d{4})(\d)/, "$1-$2");
  } else {
    v = v.substring(0, 11); if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4"); else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, "$1.$2.$3"); else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, "$1.$2");
  }
  this.value = v;
}

function recalcularTagSequencialDinamica() {
  let prefixo = (appState.configuracoes.prefixoTag || 'LMD').toUpperCase();
  let digitos = parseInt(appState.configuracoes.digitosTag || 4);
  let maiorNumero = 0;
  
  if (appState.patrimonio && appState.patrimonio.length > 0) {
    appState.patrimonio.forEach(p => {
      if(p.tag && p.tag.toUpperCase().startsWith(prefixo)) {
        let extraido = p.tag.replace(/[^0-9]/g, '');
        if(extraido) {
          let num = parseInt(extraido);
          if(num > maiorNumero) maiorNumero = num;
        }
      }
    });
  }
  
  let proximoNum = maiorNumero + 1;
  let numFormatado = String(proximoNum).padStart(digitos, '0');
  const campoTag = document.getElementById('formEquipTag');
  if(campoTag) campoTag.value = `${prefixo}-${numFormatado}`;
}

function renderizarModuloAuditoria() {

  let optCliAuditoria = `<option value="GERAL">[ GERAL ] - TODAS AS UNIDADES</option>`;
  appState.clientes.filter(c => c.status === 'ATIVO').forEach(c => {

  });

  let itemsAuditoria = appState.patrimonio.filter(p => p.status && p.status.toUpperCase() === 'LOCADO');
  if(appState.filtroClienteAuditoria !== 'GERAL') {

    cardsHtml += `<div class="card-padrao dash-card-num" style="border-left-color: var(--cor-primaria);"><h4>${tipo}</h4><div class="num">${totaisPorTipo[tipo]}</div><small style="color:#64748b;">QUANTITATIVO TOTAL</small></div>`;

          <tbody id="tbodyTabelaAuditoria"></tbody>
        </table>
      </div>
    </div>`;

  document.getElementById('selectFiltroAuditoria').addEventListener('change', function() { appState.filtroClienteAuditoria = this.value; renderizarModuloAuditoria(); });

function atualizarDatalistTags() {
  const dl = document.getElementById('listaTagsAutocomplete'); if(!dl) return; dl.innerHTML = '';
  const tipo = document.getElementById('movTipo').value;
  appState.patrimonio.filter(p => p.status && (tipo === 'ENVIO' ? p.status.toUpperCase() === 'DISPONÍVEL EM ESTOQUE' : p.status.toUpperCase() === 'LOCADO')).forEach(p => {
    let opt = document.createElement('option'); opt.value = p.tag.toUpperCase(); dl.appendChild(opt);
  });
}

function filtrarEquipamentosDoCliente() {
  const cli = this.value; const tbody = document.getElementById('tbodyItensLocadosCliente'); tbody.innerHTML = ''; if(!cli) return;
  appState.patrimonio.filter(p => p.status && p.status.toUpperCase() === 'LOCADO' && p.localizacao && p.localizacao.toUpperCase() === cli).forEach(p => {
    tbody.innerHTML += `<tr><td><b>${p.tag}</b></td><td>${p.equipamento}</td><td>${p.serie}</td><td>${p.patrimonio || '-'}</td><td>${p.modelo}</td><td>${p.fabricante}</td></tr>`;
  });
}

function processarMovimentacaoLocacao() {
  const tipo = document.getElementById('movTipo').value; const tag = document.getElementById('movTagInput').value.trim().toUpperCase(); const cli = document.getElementById('movCliente').value;
  if(!tag || !cli) return alert('PREENCHA OS CAMPOS!');
  const p = appState.patrimonio.find(x => x.tag.toUpperCase() === tag); if(!p) return alert('NÃO ENCONTRADO!');
  const pacote = { tag: tag, equipment: p.equipamento.toUpperCase(), origens: tipo === 'ENVIO' ? 'SEDE CENTRAL' : cli, destino: tipo === 'ENVIO' ? cli : 'SEDE CENTRAL', tipo: tipo, responsavel: (appState.usuarioLogado?.nome || 'SISTEMA').toUpperCase(), observacao: document.getElementById('movObs').value.toUpperCase() };
  fetch(`${WEB_APP_URL}?acao=registrarMovimentacao&dados=${encodeURIComponent(JSON.stringify(pacote))}`, { method: 'POST', mode: 'no-cors' }).then(() => { alert('SUCESSO!'); sincronizarDadosPlanilha(); });
}

function atualizarTabelaMultasLocal() {
  const tbody = document.getElementById('listaMultasTbody');
  if (!tbody) return;
  tbody.innerHTML = '';

  if (!appState.multas || appState.multas.length === 0) {
    tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; padding:15px; color:#64748b;">NENHUMA MULTA LOCALIZADA NO BANCO DE DADOS...</td></tr>`;
    return;
  }

  const filtrados = appState.multas.filter(m => {
    const txt = appState.buscaTextoMultas || '';
    return (txt === '') || 
           (m.placa || m.PLACA || '').toUpperCase().includes(txt) ||
           (m.condutor || m.CONDUTOR || '').toUpperCase().includes(txt) ||
           (m.local || m.LOCAL || '').toUpperCase().includes(txt);
  });

  if (filtrados.length === 0) {
    tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; padding:15px; color:#64748b;">NENHUM REGISTRO CORRESPONDENTE...</td></tr>`;
    return;
  }

  filtrados.forEach(m => {
    let tr = document.createElement('tr');
    let id = m.id_multa || m.ID_MULTA || '-';
    let placa = m.placa || m.PLACA || '-';
    let condutor = m.condutor || m.CONDUTOR || '-';
    let data = m.data || m.DATA || '-';
    let valor = m.valor || m.VALOR || '0.00';
    let local = m.local || m.LOCAL || '-';
    let gravidade = m.gravidade || m.GRAVIDADE || '-';
    let situacao = (m.situacao || m.SITUAÇÃO || 'ABERTO').toUpperCase();

    let idx = appState.multas.findIndex(orig => (orig.id_multa || orig.ID_MULTA) === id);
    let bg = situacao === 'PAGO' ? '#dcfce7; color:#16a34a;' : situacao === 'RECURSO' ? '#dbeafe; color:#2563eb;' : '#fee2e2; color:#dc2626;';

    tr.innerHTML = `
      <td><small>${id}</small></td>
      <td><b>${placa.toUpperCase()}</b></td>
      <td>${condutor.toUpperCase()}</td>
      <td><b>${formatarDataBr(data)}</b></td>
      <td>R$ ${parseFloat(valor).toFixed(2)}</td>
      <td><span style="font-size:12px; color:#475569;">${local.toUpperCase()}</span></td>
      <td><small>${gravidade.toUpperCase()}</small></td>
      <td><span style="padding:4px 8px; border-radius:6px; font-size:11px; font-weight:bold; background:${bg}">${situacao}</span></td>
      <td style="text-align:center;"><button class="btn-primary" style="padding: 4px 8px;" onclick="prepararEdicaoMulta(${idx})">📝 CORRIGIR</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function prepararEdicaoMulta(i) {
  const m = appState.multas[i];
  appState.idMultaEmEdicao = m.id_multa || m.ID_MULTA;
  
  abrirTela('multas');
  
  document.getElementById('formMultaPlaca').value = (m.placa || m.PLACA || '').toUpperCase();
  document.getElementById('formMultaCondutor').value = (m.condutor || m.CONDUTOR || '').toUpperCase();
  document.getElementById('formMultaValor').value = m.valor || m.VALOR;
  document.getElementById('formMultaLocal').value = (m.local || m.LOCAL || '').toUpperCase();
  document.getElementById('formMultaGravidade').value = (m.gravidade || m.GRAVIDADE || 'LEVE').toUpperCase();
  document.getElementById('formIdSituacaoMulta').value = (m.situacao || m.SITUAÇÃO || 'ABERTO').toUpperCase();
  
  if(m.data || m.DATA) {
    try {
      let dObj = new Date(m.data || m.DATA);
      if(!isNaN(dObj.getTime())) {
        document.getElementById('formMultaData').value = dObj.toISOString().split('T')[0];
      }
    } catch(e) {}
  }
}

function enviarMultaPlanilha() {
  const placa = document.getElementById('formMultaPlaca').value;
  const condutor = document.getElementById('formMultaCondutor').value;
  const data = document.getElementById('formMultaData').value;
  const valor = document.getElementById('formMultaValor').value;
  const local = document.getElementById('formMultaLocal').value.trim().toUpperCase();
  const gravidade = document.getElementById('formMultaGravidade').value;
  const situacao = document.getElementById('formIdSituacaoMulta').value;

  if(!placa || !condutor || !data || !valor || !local) {
    return alert('POR FAVOR, PREENCHA TODOS OS CAMPOS OBRIGATÓRIOS (*)!');
  }

  const idFinal = appState.idMultaEmEdicao ? appState.idMultaEmEdicao : 'MLT_' + Date.now();

  const d = {
    id_multa: idFinal,
    ID_MULTA: idFinal,
    placa: placa,
    PLACA: placa,
    condutor: condutor,
    CONDUTOR: condutor,
    data: data,
    DATA: data,
    valor: valor,
    VALOR: valor,
    local: local,
    LOCAL: local,
    gravidade: gravidade,
    GRAVIDADE: gravidade,
    situacao: situacao,
    SITUAÇÃO: situacao
  };

  const acao = appState.idMultaEmEdicao ? 'editarCadastro' : 'salvarCadastro';
  const urlFinal = `${WEB_APP_URL}?acao=${acao}&tipo=MULTAS&dados=${encodeURIComponent(JSON.stringify(d))}&prefix=processarRetornoMultaSheets`;
  
  const scriptAntigo = document.getElementById('jsonp_multa_execution_script');
  if(scriptAntigo) scriptAntigo.remove();

  const scriptElement = document.createElement('script');
  scriptElement.id = 'jsonp_multa_execution_script';
  scriptElement.src = urlFinal;
  document.body.appendChild(scriptElement);
}

            <label>QUANTIDADE DE DÍGITOS DA TAG</label>
            <input type="number" id="cfgDigitosTag" class="input-padrao" value="${appState.configuracoes.digitosTag || 4}">
          </div>
          <div class="form-grupo">
            <label>EMPRESA RAIZ (SEDE)</label>
            <input type="text" id="cfgEmpresaRaiz" class="input-padrao" value="${appState.configuracoes.empresaRaiz || ''}">
          </div>
          <div class="form-grupo">
            <label>SETORES DA SEDE (SEPARADOS POR VÍRGULA)</label>
            <input type="text" id="cfgSetoresRaiz" class="input-padrao" value="${appState.configuracoes.setoresRaiz || ''}">
          </div>
        </div>
        <div style="display:flex; justify-content: flex-end; margin-top:20px;">
          <button id="btnSalvarConfiguracoes" class="btn-primary" onclick="salvarConfiguracoesGeraisMetrika()">💾 SALVAR PARÂMETROS</button>
        </div>
      </div>
    `;
  }
}

// Persistência e sincronização de novos parâmetros corporativos
window.salvarConfiguracoesGeraisMetrika = function() {
  const prefixo = document.getElementById('cfgPrefixoTag').value.trim().toUpperCase();
  const digitos = document.getElementById('cfgDigitosTag').value;
  const empresa = document.getElementById('cfgEmpresaRaiz').value.trim().toUpperCase();
  const setores = document.getElementById('cfgSetoresRaiz').value.trim().toUpperCase();
  
  appState.configuracoes.prefixoTag = prefixo;
  appState.configuracoes.digitosTag = digitos;
  appState.configuracoes.empresaRaiz = empresa;
  appState.configuracoes.setoresRaiz = setores;
  
  const urlFinal = `${WEB_APP_URL}?acao=salvarCadastro&tipo=CONFIGURACAO&dados=${encodeURIComponent(JSON.stringify(appState.configuracoes))}&prefix=processarRetornoConfigSheets`;
  
  const scriptAntigo = document.getElementById('jsonp_cfg_execution_script');
  if(scriptAntigo) scriptAntigo.remove();
  
  const scriptElement = document.createElement('script');
  scriptElement.id = 'jsonp_cfg_execution_script';
  scriptElement.src = urlFinal;
  document.body.appendChild(scriptElement);
};

window.processarRetornoConfigSheets = function(res) {
  alert('PARÂMETROS GERAIS ATUALIZADOS COM SUCESSO NO BANCO DE DADOS!');
  sincronizarDadosPlanilha();
};

/* ==================== FUNÇÕES UTILITÁRIAS E FORMATADORES DE DADOS ==================== */
function formatarDataBr(dataUs) { 
  if(!dataUs) return '-'; 
  if (String(dataUs).includes('GMT') || String(dataUs).includes(':')) {
    const d = new Date(dataUs);
    if (!isNaN(d.getTime())) {
      const dia = String(d.getDate()).padStart(2, '0');
      const mes = String(d.getMonth() + 1).padStart(2, '0');
      const ano = d.getFullYear();
      return `${dia}/${mes}/${ano}`;
    }
  }
  const partes = String(dataUs).split(' ')[0].split('-'); 
  if(partes.length !== 3) return dataUs; 
  return `${partes[2]}/${partes[1]}/${partes[0]}`; 
}

function atualizarTabelaUsuariosLocal() {
  const tbody = document.getElementById('listaUsuariosTbody'); if (!tbody) return; tbody.innerHTML = '';
  if(!appState.usuarios || appState.usuarios.length === 0) return;
  
  appState.usuarios.forEach((u) => {
    const st = (u.status || 'ATIVO').toUpperCase();
    const bg = st === 'ATIVO' ? '#dcfce7' : '#fee2e2';
    tbody.innerHTML += `<tr><td><b>${u.nome.toUpperCase()}</b></td><td>${u.login.toUpperCase()}</td><td>${u.perfil.toUpperCase()}</td><td><span style="padding:4px 8px; background:${bg}; border-radius:6px;">${st}</span></td></tr>`;
  });
}

window.processarRetornoGoogleSheets = function() { alert('COLABORADOR CADASTRADO COM SUCESSO!'); sincronizarDadosPlanilha(); };
function enviarUsuarioPlanilha() {
  const nome = document.getElementById('formUserNome').value.trim().toUpperCase(); const login = document.getElementById('formUserLogin').value.trim().toUpperCase(); const senha = document.getElementById('formUserSenha').value;
  if (!nome || !login || !senha) return alert('CAMPOS OBRIGATÓRIOS!');
  const d = { id: 'usr_' + Date.now(), nome: nome, login: login, senha: senha, perfil: document.getElementById('formUserPerfil').value, status: 'ATIVO' };
  const urlFinal = `${WEB_APP_URL}?acao=salvarCadastro&tipo=USUARIO&dados=${encodeURIComponent(JSON.stringify(d))}&prefix=processarRetornoGoogleSheets`;
  const scriptElement = document.createElement('script'); scriptElement.src = urlFinal; document.body.appendChild(scriptElement);
}
