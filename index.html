<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>METRIKA - OPERATIONS PLATFORM</title>
<style>
:root {
  --cor-primaria: #2563eb;
  --cor-primaria-hover: #3b82f6;
  --cor-secundaria: #334155;
  --cor-sucesso: #16a34a;
  --cor-perigo: #dc2626;
  --borda: #cbd5e1;
  --bg-sidebar: #0f172a;
  --bg-sidebar-hover: rgba(255, 255, 255, 0.06);
}

/* CAIXA ALTA EM TODO O SISTEMA, EXCEÇÃO APENAS PARA CAMPOS DE SENHA E E-MAIL */
* { 
  margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; 
  text-transform: uppercase; 
}
body { background: #f4f7fb; color: #1e293b; display: flex; min-height: 100vh; }

.input-padrao, .select-padrao, .textarea-padrao {
  width: 100%; padding: 10px; border: 1px solid var(--borda); border-radius: 8px; background: white; font-size: 13px;
}
/* BLINDAGEM COMPLETA DA TELA DE LOGIN E CAMPOS DE CRÍTICA DE MINÚSCULAS */
#loginUser, #loginPass, #formUserSenha, input[type="password"], input[type="email"], .no-uppercase, #batchSearch { 
  text-transform: none !important; 
}

.btn-primary { background: var(--cor-primaria); color: white; }
.btn-danger { background: var(--cor-perigo); color: white; }
.btn-success { background: var(--cor-sucesso); color: white; }
.btn-secondary { background: var(--cor-secundaria); color: white; }

.card-padrao { background: #fff; border-radius: 16px; padding: 22px; box-shadow: 0 6px 18px rgba(0,0,0,.06); border: 1px solid #e2e8f0; margin-bottom: 25px; }

/* ARQUITETURA DE DESIGN DA SIDEBAR - IDENTIDADE PROPRIA DIOGO MATOS */
.sidebar { 
  width: 270px; 
  background: var(--bg-sidebar); 
  color: #fff; 
  position: fixed; 
  top: 0; left: 0; bottom: 0; 
  padding: 24px 16px; 
  display: flex; 
  flex-direction: column; 
  box-shadow: 4px 0 10px rgba(0, 0, 0, 0.15);
  z-index: 100;
}
.logo-container {
  padding: 0 8px;
  margin-bottom: 24px;
}
.logo { font-size: 28px; font-weight: 900; color: #3b82f6; cursor: pointer; letter-spacing: 1.5px; }
.sidebar small { color: #64748b; display: block; margin-top: 4px; font-size: 11px; font-weight: 700; }

.menu-items { 
  flex-grow: 1; 
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.sidebar button { 
  width: 100%; 
  border: none; 
  background: transparent; 
  color: #94a3b8; 
  padding: 12px 14px; 
  border-radius: 8px; 
  text-align: left; 
  cursor: pointer; 
  font-weight: 600; 
  font-size: 12px; 
  display: flex;
  align-items: center;
  gap: 12px;
  transition: all .2s ease-in-out; 
  white-space: nowrap;
}
.sidebar button svg {
  width: 18px;
  height: 18px;
  fill: currentColor;
  transition: fill .2s ease;
}
.sidebar button:hover { 
  background: var(--bg-sidebar-hover); 
  color: #fff;
}
.sidebar button.active-menu {
  background: rgba(37, 99, 235, 0.15);
  color: #3b82f6;
  font-weight: 700;
  border-left: 4px solid #2563eb;
  border-radius: 4px 8px 8px 4px;
  padding-left: 10px;
}

.assinatura-desenvolvedor {
  padding: 10px 8px;
  font-size: 9px;
  color: #475569;
  font-weight: bold;
  letter-spacing: 0.5px;
  border-top: 1px solid rgba(255, 255, 255, 0.05);
  margin-bottom: 8px;
  text-align: center;
}

.sidebar button.btn-logout { 
  background: transparent; 
  border: 1px solid rgba(220, 38, 38, 0.3); 
  color: #f87171;
  justify-content: center;
  font-weight: 700;
}
.sidebar button.btn-logout:hover { 
  background: var(--cor-perigo); 
  color: #fff;
  border-color: var(--cor-perigo);
}

.main { margin-left: 270px; width: calc(100% - 270px); display: flex; flex-direction: column; min-height: 100vh; }
.topbar { background: #fff; padding: 22px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.topbar h1 { color: #1565C0; font-size: 34px; }
.topbar p { color: #64748b; margin-top: 4px; }
.content { padding: 25px; flex-grow: 1; }
.dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 18px; margin-top: 20px; }
button { border: none; padding: 10px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all .25s ease; }
button:hover { transform: translateY(-1px); filter: brightness(1.05); }
.hidden { display: none !important; }

.tabela-container { width: 100%; overflow-x: auto; margin-top: 15px; }
.tabela-sistema { width: 100%; border-collapse: collapse; min-width: 1100px; }
.tabela-sistema th { background: #f1f5f9; padding: 12px; text-align: left; font-size: 13px; color: #475569; border-bottom: 2px solid #e2e8f0; }
.tabela-sistema td { padding: 12px; border-bottom: 1px solid #e2e8f0; font-size: 13px; background: white; white-space: nowrap; }

.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
.form-grid label { font-size: 12px; font-weight: 600; margin-bottom: 4px; color: #475569; }
.form-grupo { display: flex; flex-direction: column; margin-bottom: 8px; }

.tabs-gestao { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #cbd5e1; padding-bottom: 5px; }
.tab-item { padding: 8px 16px; cursor: pointer; font-weight: 600; font-size: 13px; color: #64748b; border-bottom: 2px solid transparent; }
.tab-item.active { color: var(--cor-primaria); border-color: var(--cor-primaria); }

.dash-card-num { border-left: 5px solid var(--cor-primaria); display: flex; flex-direction: column; justify-content: center; }
.dash-card-num h4 { font-size: 12px; text-transform: uppercase; color: #64748b; font-weight: bold; }
.dash-card-num .num { font-size: 32px; font-weight: 900; color: #0f172a; margin-top: 5px; }
.bar-progresso-container { background: #e2e8f0; border-radius: 6px; width: 100%; height: 10px; margin-top: 8px; overflow: hidden; }
.bar-progresso-fill { height: 100%; border-radius: 6px; transition: width 0.4s ease; }

.modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); display: flex; align-items: center; justify-content: center; z-index: 10000; }
.modal-box { background: white; border-radius: 16px; padding: 28px; width: 100%; max-width: 500px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #e2e8f0; }
.modal-header h3 { font-size: 18px; font-weight: bold; }
.modal-close { background: none; font-size: 20px; color: #64748b; padding: 0; }
.modal-close:hover { color: var(--cor-perigo); transform: none; }

/* ESTILO EXCLUSIVO DO TRANSPORTE MÚLTIPLO - ADAPTADO AO METRIKA ORIGINAL */
.modal-lote-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(3px); display: flex; align-items: center; justify-content: center; z-index: 99999; }
.modal-lote-box { background: #0f172a; border: 1px solid #1e293b; border-radius: 20px; width: 90%; max-width: 1000px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
.modal-lote-header { background: #1e293b; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
.modal-lote-header h2 { font-size: 18px; color: #fff; font-weight: 800; display: flex; align-items: center; gap: 10px; }
.modal-lote-content { padding: 25px; overflow-y: auto; flex: 1; }
.search-batch-box { background: #1e293b; border: 2px solid #2563eb; border-radius: 12px; padding: 15px; margin: 20px 0; }
.batch-preview { background: #020617; border: 1px dashed #3b82f6; border-radius: 10px; padding: 12px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
.batch-table-wrapper { background: #020617; border-radius: 12px; border: 1px solid #1e293b; margin-top: 15px; max-height: 250px; overflow-y: auto; }

/* COMPONENTES DA NOVA TELA INICIAL COMPACTA */
.card-atalho-home { background: #fff; padding: 18px; border-radius: 12px; border: 1px solid #e2e8f0; cursor: pointer; transition: all .2s ease; display: flex; flex-direction: column; gap: 4px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
.card-atalho-home:hover { border-color: var(--cor-primaria); transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(37,99,235,0.08); }
.card-atalho-home h4 { font-size: 13px; color: #1e293b; font-weight: 700; }
.card-atalho-home p { font-size: 11px; color: #64748b; }

@media print {
  body * { visibility: hidden; }
  #printArea, #printArea * { visibility: visible; }
  #printArea { position: absolute; left: 0; top: 0; width: 100%; text-transform: none !important; color: black !important; }
  #printArea * { text-transform: none !important; }
}
</style>
</head>
<body>

<div id="loginScreen" style="position:fixed; inset:0; background:linear-gradient(135deg,#0f172a,#1e3a8a); display:flex; align-items:center; justify-content:center; z-index:99999;">
  <div style="width:100%; max-width:420px; background:white; padding:40px; border-radius:20px; box-shadow:0 20px 50px rgba(0,0,0,.25); text-align:center;">
    <div style="font-size:42px; font-weight:bold; color:#2563eb; margin-bottom:8px;">METRIKA</div>
    <p style="color:#64748b; margin-bottom:28px;">SMART OPERATIONS PLATFORM</p>
    <input id="loginUser" type="text" placeholder="USUÁRIO" style="width:100%; padding:14px; margin-bottom:12px; border:1px solid #cbd5e1; border-radius:10px;" autocomplete="off">
    <input id="loginPass" type="password" placeholder="SENHA" style="width:100%; padding:14px; margin-bottom:18px; border:1px solid #cbd5e1; border-radius:10px;">
    <button id="btnEntrar" class="btn-primary" style="width:100%; padding:14px; font-weight:bold; font-size:15px;">ENTRAR NO SISTEMA</button>
    <p style="margin-top:18px; font-size:11px; color:#94a3b8; font-weight:bold;">BY DIOGO MATOS • OPERATIONAL MANAGEMENT</p>
  </div>
</div>

<div id="wrapperSistema" class="hidden" style="width:100%; display:flex;">
  <div class="sidebar">
    <div class="logo-container">
      <div class="logo" id="logoInicio">METRIKA</div>
      <small>CLINICAL ASSET INTELLIGENCE</small>
    </div>
    <div class="menu-items">
      <button id="btnMenuRotas">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13cc0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        ROTAS DIÁRIAS
      </button>
      <button id="btnMenuClientes">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-1.99.9-1.99 2L3 19c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-1 11h-4v4h-4v-4H6v-4h4V6h4v4h4v4z"/></svg>
        CLIENTES / UNIDADES
      </button>
      <button id="btnMenuChamados">
        <svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-15.7c-.5-.8-1.4-1.3-2.4-1.3s-1.9.5-2.4 1.3L1.3 19c-.5.8-.5 1.8 0 2.6.4.8 1.3 1.3 2.3 1.3h18.2c1 0 1.9-.5 2.3-1.3.5-.8.5-1.8 0-2.6zm-11.2-8.5c0-.6.4-1 1-1s1 .4 1 1v4c0 .6-.4 1-1 1s-1-.4-1-1v-4zm1 9.3c-.7 0-1.3-.6-1.3-1.3 0-.7.6-1.3 1.3-1.3.7 0 1.3.6 1.3 1.3 0 .7-.6 1.3-1.3 1.3z"/></svg>
        CHAMADOS DE MAINT
      </button>
      <button id="btnMenuLocacao">
        <svg viewBox="0 0 24 24"><path d="M18 1h-8C8.9 1 8 1.9 8 3v3h2V5h8v14h-8v-1h-2v3c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V3c0-1.1-.9-2-2-2zM6.71 15.29l1.42 1.42L13.42 12l-5.3-5.3-1.42 1.42L9.59 11H1v2h8.59l-2.88 2.29z"/></svg>
        LOCAÇÃO DE ATIVOS
      </button>
      <button id="btnMenuPatrimonio">
        <svg viewBox="0 0 24 24"><path d="M22 6.18L12 2 2 6.18V12c0 5.52 4.48 10 10 10s10-4.48 10-10V6.18zm-10 13.8c-4.41 0-8-3.59-8-8V7.58l8-3.35 8 3.35v4.41c0 4.41-3.59 8-8 8z"/></svg>
        PATRIMÔNIO (INVENTÁRIO)
      </button>
      <button id="btnMenuDashboards">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
        DASHBOARDS
      </button>
      <button id="btnMenuGestao">
        <svg viewBox="0 0 24 24"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46.21 14.25 0 14 0h-4c-.25 0-.46.21-.49.46l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.25.24.46.49.46h4c.25 0 .46-.21.49-.46l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
        GESTÃO DO SISTEMA
      </button>
    </div>
    <div class="assinatura-desenvolvedor">BY DIOGO MATOS<br>• OPERATIONAL MANAGEMENT •</div>
    <button id="btnSidebarLogout" class="btn-logout"><svg viewBox="0 0 24 24" style="width:16px; height:16px;"><path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg> SAIR DO SISTEMA</button>
  </div>

  <div class="main">
    <div class="topbar">
      <h1>METRIKA</h1>
      <p id="subtituloTopbar">GESTÃO INTELIGENTE DE ROTAS E OPERATIONS</p>
    </div>
    <div class="content" id="conteudoPrincipal"></div>
  </div>
</div>

<div id="modalContainer" class="hidden"></div>
<div id="printArea" class="hidden"></div>
<datalist id="datalistClientesGlobal"></datalist>

<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzQp8eTxvrQXEg1dqnFA33WSrEMmVv6LXmk55f4jBCC4Sv7DL7EWeLtvzdhRlsef9_AJQ/exec';

const appState = {
  clientes: JSON.parse(localStorage.getItem('orizonClientes')) || [],
  patrimonio: [], movimentacoes: [], tecnicos: ['DIOGO', 'ADMINISTRADOR'], veiculos: [], rotas: [], usuarios: [], 
  usuarioLogado: null, idClienteEmEdicao: null, idUsuarioEmEdicao: null, filtroStatusUsuario: 'ATIVO', filtroStatusCliente: 'ATIVO',
  buscaTextoCliente: '', buscaTextoUsuario: '', buscaTextoPatrimonio: '', buscaTextoMatrizParam: '', 
  matrizAtivos: [], idMatrizEmEdicao: null,
  
  // Variáveis isoladas do carrinho de lote
  carrinhoLote: [], equipamentoIdentificadoLote: null
};

sincronizarDadosPlanilha();
verificarSessaoAtiva();

function marcarAbaAtivaMenu(idBotao) {
  const botoes = document.querySelectorAll('.sidebar button');
  botoes.forEach(b => b.classList.remove('active-menu'));
  const btnAlvo = document.getElementById(idBotao); if (btnAlvo) btnAlvo.classList.add('active-menu');
}

document.getElementById('btnEntrar').addEventListener('click', fazerLogin);
document.getElementById('btnSidebarLogout').addEventListener('click', efetuarLogout);
document.getElementById('logoInicio').addEventListener('click', voltarInicio);

document.getElementById('btnMenuRotas').addEventListener('click', () => { abrirTela('rotas'); marcarAbaAtivaMenu('btnMenuRotas'); });
document.getElementById('btnMenuClientes').addEventListener('click', () => { abrirTela('clientes'); marcarAbaAtivaMenu('btnMenuClientes'); });
document.getElementById('btnMenuChamados').addEventListener('click', () => { abrirTela('chamados'); marcarAbaAtivaMenu('btnMenuChamados'); });
document.getElementById('btnMenuLocacao').addEventListener('click', () => { abrirTela('locacao'); marcarAbaAtivaMenu('btnMenuLocacao'); });
document.getElementById('btnMenuPatrimonio').addEventListener('click', () => { abrirTela('patrimonio'); marcarAbaAtivaMenu('btnMenuPatrimonio'); });
document.getElementById('btnMenuDashboards').addEventListener('click', () => { abrirTela('dashboards'); marcarAbaAtivaMenu('btnMenuDashboards'); });
document.getElementById('btnMenuGestao').addEventListener('click', () => { abrirTela('gestao'); marcarAbaAtivaMenu('btnMenuGestao'); });

function fazerLogin() {
  const userIn = document.getElementById('loginUser').value.trim().toUpperCase();
  const passIn = document.getElementById('loginPass').value;
  if ((userIn === 'ADMIN' && passIn === '@181989Di') || (userIn === 'VISITANTE' && passIn === '123')) {
    liberarPainel({ nome: userIn === 'ADMIN' ? 'ADMINISTRADOR' : 'VISITANTE', perfil: userIn }); return;
  }
  if (appState.usuarios && appState.usuarios.length > 0) {
    const conta = appState.usuarios.find(u => String(u.login).toUpperCase() === userIn && String(u.senha) === passIn);
    if (conta) { liberarPainel(conta); return; }
  }
  alert('USUÁRIO OU SENHA INCORRETOS OU BASE AINDA CARREGANDO!');
}

function liberarPainel(usuario) {
  appState.usuarioLogado = usuario;
  sessionStorage.setItem('orizonUsuarioAtivo', JSON.stringify(usuario));
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('wrapperSistema').classList.remove('hidden');
  document.getElementById('subtituloTopbar').innerText = `LOGADO COMO: ${usuario.nome.toUpperCase()} (${(usuario.perfil || 'USUÁRIO').toUpperCase()})`;
  voltarInicio();
}

function sidebarLogoutSemPopup() {
  appState.usuarioLogado = null; sessionStorage.removeItem('orizonUsuarioAtivo');
  document.getElementById('wrapperSistema').classList.add('hidden'); document.getElementById('loginScreen').style.display = 'flex';
}
function efetuarLogout() { if (!confirm('DESEJA REALMENTE SAIR?')) return; sidebarLogoutSemPopup(); }
function verificarSessaoAtiva() {
  const sessaoSalva = sessionStorage.getItem('orizonUsuarioAtivo');
  if (sessaoSalva) {
    appState.usuarioLogado = JSON.parse(sessaoSalva);
    document.getElementById('loginScreen').style.display = 'none'; document.getElementById('wrapperSistema').classList.remove('hidden');
    document.getElementById('subtituloTopbar').innerText = `LOGADO COMO: ${appState.usuarioLogado.nome.toUpperCase()}`;
    voltarInicio();
  }
}

window.processarRetornoSincronizacao = function(res) {
  if (res && res.sucesso) {
    appState.clientes = res.clientes || []; appState.patrimonio = res.patrimonio || []; appState.movimentacoes = res.movimentacoes || []; appState.usuarios = res.usuarios || []; appState.veiculos = res.veiculos || []; appState.matrizAtivos = res.matrizAtivos || [];
    localStorage.setItem('orizonClientes', JSON.stringify(appState.clientes));
    
    const dl = document.getElementById('datalistClientesGlobal');
    if(dl) {
      dl.innerHTML = '';
      appState.clientes.filter(c => c.status === 'ATIVO').forEach(c => {
        let opt = document.createElement('option'); opt.value = c.nome.toUpperCase(); dl.appendChild(opt);
      });
    }

    if (document.getElementById('listaClientesTbody')) atualizarTabelaClientesLocal();
    if (document.getElementById('listaPatrimonioTbody')) atualizarTabelaPatrimonioLocal();
    if (document.getElementById('movTagInput')) atualizarDatalistTags();
    if (document.getElementById('listaUsuariosTbody')) atualizarTabelaUsuariosLocal();
    if (document.getElementById('tbodyMatrizAtivosParam')) desenharTabelaMatrizAtivos();
    if (document.getElementById('idContainerHomePrincipal')) renderizarHomePainelDinâmico();
  }
};

function sincronizarDadosPlanilha() {
  const urlFinal = `${WEB_APP_URL}?acao=listarCadastros&prefix=processarRetornoSincronizacao`;
  const scriptAntigo = document.getElementById('jsonp_sync_script'); if(scriptAntigo) scriptAntigo.remove();
  const scriptElement = document.createElement('script'); scriptElement.id = 'jsonp_sync_script'; scriptElement.src = urlFinal; document.body.appendChild(scriptElement);
}

function renderizarHomePainelDinâmico() {
  const containerHome = document.getElementById('idContainerHomePrincipal'); if(!containerHome) return;
  const totalAtivos = appState.patrimonio.length;
  const locados = appState.patrimonio.filter(p => p.status.toUpperCase() === 'LOCADO').length;
  const estoque = appState.patrimonio.filter(p => p.status.toUpperCase() === 'DISPONÍVEL EM ESTOQUE').length;
  const totalCli = appState.clientes.filter(c => c.status === 'ATIVO').length;

  const dicionarioContagem = {};

function handleSearchLote(val) {
  const query = val.trim().toUpperCase(); const preview = document.getElementById('batchPreview');
  if(query.length < 3) { preview.classList.add('hidden'); return; }

  // 3 em 1 Inteligente: Identifica o Ativo de Forma Unificada por TAG, Série ou Patrimônio
  const item = appState.patrimonio.find(p => 
    (p.tag && p.tag.toUpperCase() === query) || (p.serie && p.serie.toUpperCase() === query) || (p.patrimonio && p.patrimonio.toUpperCase() === query)
  );

  if(item) {
    appState.equipamentoIdentificadoLote = item;
    preview.innerHTML = `
      <div style="text-align:left;"><span style="font-size:10px; color:#3b82f6; font-weight:800;">EQUIPAMENTO LOCALIZADO:</span><br><strong style="color:#fff;">${item.equipamento.toUpperCase()} - ${item.modelo.toUpperCase()}</strong></div>
      <div style="text-align:right; color:#94a3b8; font-size:11px; font-weight:700;">SÉRIE: ${item.serie.toUpperCase()} | PAT: ${item.patrimonio||'-'}</div>`;
    preview.classList.remove('hidden');
  } else { appState.equipamentoIdentificadoLote = null; preview.classList.add('hidden'); }
}

function processarEnterLote() {
  if(!appState.equipamentoIdentificadoLote) return; const item = appState.equipamentoIdentificadoLote;
  if(appState.carrinhoLote.some(i => i.tag === item.tag)) { alert("ESTA TAG JÁ CONSTA NO LOTE ATUAL!"); return; }
  
  appState.carrinhoLote.push(item); atualizarTabelaLote();
  
  // Reseta campo e joga o foco contínuo no teclado para agilidade total
  document.getElementById('batchSearch').value = ""; document.getElementById('batchPreview').classList.add('hidden');
  appState.equipamentoIdentificadoLote = null; document.getElementById('batchSearch').focus();
}

function atualizarTabelaLote() {
  const tbody = document.getElementById('batchTableBody'); tbody.innerHTML = "";
  appState.carrinhoLote.forEach((item, idx) => {
    tbody.innerHTML += `<tr><td style="font-weight:800; color:#3b82f6;">${item.tag}</td><td>${item.equipamento} - ${item.modelo}</td><td>${item.serie}</td><td>${item.patrimonio||'-'}</td><td style="text-align:center;"><button onclick="removerDoLote(${idx})" style="color:var(--cor-perigo); background:transparent; border:none; cursor:pointer;">✕</button></td></tr>`;
  });
  document.getElementById('loteContador').innerText = `${appState.carrinhoLote.length} ITENS`;
}
function removerDoLote(i) { appState.carrinhoLote.splice(i,1); atualizarTabelaLote(); }
function fecharModalLote() { document.getElementById('modalContainer').classList.add('hidden'); }

function finalizarLoteEImprimir() {

    cliente: cli, motivo: document.getElementById('loteMotivo').value, fluxo: document.getElementById('loteFluxo').value,

  });

  document.getElementById('printArea').innerHTML = `
    <div style="padding:40px; font-family: Arial, sans-serif; color:#000;">
      <div style="display:flex; justify-content:space-between; border-bottom:2px solid #000; padding-bottom:10px;">
        <div><h1 style="margin:0; font-size:24px; font-weight:900;">LINEMED ENGENHARIA CLÍNICA</h1><p style="margin:2px 0 0 0; font-size:12px; color:#444;">Controle de Logística e Movimentação Preventiva/Corretiva</p></div>
        <div style="text-align:right;"><p style="margin:0; font-weight:bold; font-size:14px;">GUIA DE TRANSPORTE LOTE</p><p style="margin:2px 0 0 0; font-size:11px;">EMISSÃO: ${pacote.data}</p></div>
      </div>
      <div style="margin:20px 0; background:#f1f5f9; padding:15px; border-radius:6px; font-size:13px; border:1px solid #cbd5e1; line-height:1.6;">
        <strong>🏥 UNIDADE DESTINO:</strong> ${pacote.cliente} &nbsp;|&nbsp; <strong>🏷️ MOTIVO CONTRATUAL:</strong> ${pacote.motivo} <br>
        <strong>⚙️ DIRETRIZ DE FLUXO:</strong> ${pacote.fluxo} &nbsp;|&nbsp; <strong>👤 RESPONSÁVEL:</strong> ${pacote.responsavel}
      </div>
      <table style="width:100%; border-collapse:collapse; font-size:12px; margin-top:15px;">
        <thead><tr style="background:#e2e8f0;"><th style="border:1px solid #000; padding:8px; width:5%;">ITEM</th><th style="border:1px solid #000; padding:8px; width:15%;">TAG</th><th style="border:1px solid #000; padding:8px; width:45%;">DESCRIÇÃO DETALHADA DO EQUIPAMENTO</th><th style="border:1px solid #000; padding:8px; width:15%;">Nº SÉRIE</th><th style="border:1px solid #000; padding:8px; width:15%;">PATRIMÔNIO</th><th style="border:1px solid #000; padding:8px; width:5%;">CONF.</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div style="margin-top:25px; border:1px dashed #000; padding:12px; font-size:12px; background:#fafafa;"><strong>OBSERVAÇÕES DO PROTOCOLO:</strong> ${pacote.obs}</div>
      <div style="margin-top:80px; display:flex; justify-content:space-between;">
        <div style="width:45%; border-top:1px solid #000; text-align:center; padding-top:6px; font-size:12px; font-weight:bold;">RESPONSÁVEL ENVIO (LINEMED)</div>
        <div style="width:45%; border-top:1px solid #000; text-align:center; padding-top:6px; font-size:12px; font-weight:bold;">RESPONSÁVEL RECEBIMENTO (UNIDADE)</div>

    </div>`;

  fetch(`${WEB_APP_URL}?acao=registrarLote&dados=${encodeURIComponent(JSON.stringify(pacote))}`, { method: 'POST', mode: 'no-cors' })
  .then(() => {
    alert("🚀 PACOTE ENVIADO AO GOOGLE SHEETS COM SUCESSO!\n\nAbrindo gerenciador de impressão para folha A4...");
    window.print(); fecharModalLote(); sincronizarDadosPlanilha();
  });
}

  appState.patrimonio.filter(p => tipo === 'ENVIO' ? p.status.toUpperCase() === 'DISPONÍVEL EM ESTOQUE' : p.status.toUpperCase() === 'LOCADO').forEach(p => {
    let opt = document.createElement('option'); opt.value = p.tag.toUpperCase(); dl.appendChild(opt);

  const cli = this.value; const tbody = document.getElementById('tbodyItensLocadosCliente'); tbody.innerHTML = '';

  const pacote = { tag: tag, equipment: p.equipamento.toUpperCase(), origens: tipo === 'ENVIO' ? 'SEDE CENTRAL' : cli, destino: tipo === 'ENVIO' ? cli : 'SEDE CENTRAL', tipo: tipo, responsavel: (appState.usuarioLogado?.nome || 'SISTEMA').toUpperCase(), observacao: document.getElementById('movObs').value.toUpperCase() };
  fetch(`${WEB_APP_URL}?acao=registrarMovimentacao&dados=${encodeURIComponent(JSON.stringify(pacote))}`, { method: 'POST', mode: 'no-cors' }).then(() => { alert('SUCESSO!'); sincronizarDadosPlanilha(); });

function aplicarMascaraCep() { let v = this.value.replace(/\D/g, '').substring(0, 8); this.value = v.replace(/^(\d{5})(\d)/, "$1-$2"); }
function aplicarMascaraTelefone() { let v = this.value.replace(/\D/g, '').substring(0, 11); v = v.replace(/^(\d{2})(\d)/, "($1) $2"); if (v.length > 9) v = v.replace(/(\d{5})(\d)/, "$1-$2"); else v = v.replace(/(\d{4})(\d)/, "$1-$2"); this.value = v; }
function buscarCepAutomatico() { const cep = this.value.replace(/\D/g, ''); if (cep.length !== 8) return; fetch(`https://viacep.com.br/ws/${cep}/json/`).then(res => res.json()).then(d => { if (!d.erro) { document.getElementById('formLogradouro').value = d.logradouro.toUpperCase(); document.getElementById('formBairro').value = d.bairro.toUpperCase(); } }); }

function verificarDocumentoEReceita() {
  const doc = this.value.trim(); if (!doc) return;
  const isCnpj = document.getElementById('formTipoPessoa').value === 'JURIDICA';
  const dup = appState.clientes.find(c => c.cnpj === doc && c.id !== appState.idClienteEmEdicao);
  if (dup) { alert(isCnpj ? 'CNPJ JÁ CADASTRADO!' : 'CPF JÁ CADASTRADO!'); this.value = ''; return; }
  const clean = doc.replace(/\D/g, '');
  if (isCnpj && clean.length === 14) {
    fetch(`https://brasilapi.com.br/api/cnpj/v1/${clean}`).then(res => res.json()).then(dados => {
        document.getElementById('formCliente').value = (dados.razao_social || dados.nome || '').toUpperCase();
        document.getElementById('formCep').value = dados.cep || '';
        document.getElementById('formLogradouro').value = (dados.logradouro || '').toUpperCase();
        document.getElementById('formNumero').value = dados.numero || '';
        document.getElementById('formBairro').value = (dados.bairro || '').toUpperCase();
        document.getElementById('formCidade').value = (dados.municipio || 'SÃO PAULO').toUpperCase();
        document.getElementById('formUf').value = (dados.uf || 'SP').toUpperCase();
        if(dados.nome_fantasia && dados.nome_fantasia.trim() !== '') { document.getElementById('formObservacao').value = "FANTASIA: " + dados.nome_fantasia.toUpperCase(); }
    }).catch(() => {});
  }
}

function aplicarMascaraDocumento() {
  let v = this.value.replace(/\D/g, '');
  if (document.getElementById('formTipoPessoa').value === 'JURIDICA') {
    v = v.substring(0, 14); v = v.replace(/^(\d{2})(\d)/, "$1.$2").replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3").replace(/\.(\d{3})(\d)/, ".$1/$2").replace(/(\d{4})(\d)/, "$1-$2");
  } else {
    v = v.substring(0, 11); if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4"); else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, "$1.$2.$3"); else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, "$1.$2");
  }
  this.value = v;
}

    document.getElementById('tabColaboradores').classList.add('active');
    subContainer.innerHTML = `
      <div class="card-padrao">
        <h3 id="tituloFormUsuario">FICHA DO COLABORADOR</h3>
        <div class="form-grid">
          <div class="form-grupo"><label>NOME COMPLETO *</label><input type="text" id="formUserNome" class="input-padrao"></div>
          <div class="form-grupo"><label>USUÁRIO / LOGIN *</label><input type="text" id="formUserLogin" class="input-padrao"></div>
          <div class="form-grupo"><label>SENHA DE ACESSO *</label><input type="password" id="formUserSenha" class="input-padrao"></div>
          <div class="form-grupo"><label>PERFIL</label><select id="formUserPerfil" class="select-padrao"><option value="Técnico">TÉCNICO</option><option value="Gestor">GESTOR</option><option value="Admin">ADMIN</option></select></div>
          <div class="form-grupo"><label>CPF</label><input type="text" id="formUserCpf" class="input-padrao"></div>
          <div class="form-grupo"><label>TELEFONE</label><input type="text" id="formUserTelefone" class="input-padrao"></div>
          <div class="form-grupo"><label>STATUS</label><select id="formUserStatus" class="select-padrao"><option value="ATIVO">ATIVO</option><option value="INATIVO">INATIVO</option></select></div>
        </div>
        <div style="display:flex; justify-content: flex-end; gap:10px; margin-top:20px;"><button id="btnCancelarEdicaoUsuario" class="btn-secondary hidden">CANCELAR</button><button id="btnSalvarUsuarioPlanilha" class="btn-success">💾 SALVAR COLABORADOR</button></div>
      </div>
      <div class="card-padrao">
        <div class="tabela-container"><table class="tabela-sistema"><thead><tr><th>NOME COMPLETO</th><th>LOGIN</th><th>CPF</th><th>PERFIL</th><th>STATUS</th><th style="text-align:center;">AÇÕES</th></tr></thead><tbody id="listaUsuariosTbody"></tbody></table></div>
      </div>`;
    document.getElementById('btnCancelarEdicaoUsuario').addEventListener('click', limparFormularioUsuario);
    document.getElementById('btnSalvarUsuarioPlanilha').addEventListener('click', enviarUsuarioPlanilha);
    atualizarTabelaUsuariosLocal();
  } else if (aba === 'itens_inventario') {
    document.getElementById('tabItensInventario').classList.add('active');
    subContainer.innerHTML = `
      <div class="card-padrao" style="display: flex; gap: 12px; align-items: center; justify-content: space-between;">
        <div style="display: flex; gap: 12px;"><button onclick="abrirModalDescricao()" class="btn-success">➕ CADASTRAR DESCRIÇÃO GERAL</button><button onclick="abrirModalModeloVinculo()" class="btn-primary">➕ HOMOLOGAR MODELO</button></div>
        <div><input type="text" id="inputBuscaMatrizParam" class="input-padrao" placeholder="PESQUISAR ITEM NA MATRIZ..." style="width: 280px;"></div>
      </div>
      <div class="card-padrao"><div class="tabela-container"><table class="tabela-sistema"><thead><tr><th>EQUIPAMENTO / DESCRIÇÃO</th><th>MODELO DE FÁBRICA</th><th>FABRICANTE OFICIAL</th><th>CÓDIGO ANVISA</th><th>STATUS</th><th style="text-align: center;">AÇÕES</th></tr></thead><tbody id="tbodyMatrizAtivosParam"></tbody></table></div></div>`;
    document.getElementById('inputBuscaMatrizParam').addEventListener('input', function() { appState.buscaTextoMatrizParam = this.value.trim().toUpperCase(); desenharTabelaMatrizAtivos(); });
    desenharTabelaMatrizAtivos();
  }
}

function normalizarTermoMatriz(str) { if (!str) return ''; return str.toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().replace(/[^A-Z0-9]/g, '').trim(); }
function calcularDistanciaLevenshtein(a, b) { const m = []; for (let i = 0; i <= b.length; i++) m[i] = [i]; for (let j = 0; j <= a.length; j++) m[0][j] = j; for (let i = 1; i <= b.length; i++) { for (let j = 1; j <= a.length; j++) { if (b.charAt(i - 1) === a.charAt(j - 1)) m[i][j] = m[i - 1][j - 1]; else m[i][j] = Math.min(m[i - 1][j - 1] + 1, Math.min(m[i][j - 1] + 1, m[i - 1][j] + 1)); } } return m[b.length][a.length]; }

window.abrirModalDescricao = function(id = null) {
  appState.idMatrizEmEdicao = id; let val = ""; if(id) { const r = appState.matrizAtivos.find(x => String(x.ID_REGISTRO || x.id_registro) === String(id)); if(r) val = (r.EQUIPAMENTO || r.equipamento || "").toUpperCase(); }
  const html = `<div class="modal-overlay"><div class="modal-box"><div class="modal-header"><h3>🏥 NOVA DESCRIÇÃO</h3><button onclick="fecharModal()" class="modal-close">✕</button></div><div class="form-grupo"><label>DESCRIÇÃO *</label><input type="text" id="modalInputEquip" class="input-padrao" value="${val}"></div><div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;"><button onclick="fecharModal()" class="btn-secondary">CANCELAR</button><button onclick="salvarModalDescricao()" class="btn-success">💾 SALVAR</button></div></div></div>`;
  const c = document.getElementById('modalContainer'); c.innerHTML = html; c.classList.remove('hidden'); document.getElementById('modalInputEquip').focus();
};

window.abrirModalModeloVinculo = function(id = null) {
  appState.idMatrizEmEdicao = id; let eq = "", mo = "", fa = "", an = ""; if(id) { const r = appState.matrizAtivos.find(x => String(x.ID_REGISTRO || x.id_registro) === String(id)); if(r) { eq = (r.EQUIPAMENTO || r.equipamento).toUpperCase(); mo = (r.MODELO || r.modelo || "").toUpperCase(); fa = (r.FABRICANTE || r.fabricante || "").toUpperCase(); an = (r.ANVISA || r.anvisa || "").toUpperCase(); } }
  const unicos = [...new Set(appState.matrizAtivos.map(i => (i.EQUIPAMENTO || i.equipamento).toUpperCase()))].filter(Boolean).sort();
  let opts = '<option value="">SELECIONE A DESCRIÇÃO...</option>'; unicos.forEach(u => opts += `<option value="${u}" ${u === eq ? 'selected' : ''}>${u}</option>`);
  const html = `<div class="modal-overlay"><div class="modal-box"><div class="modal-header"><h3>📐 HOMOLOGAR MODELO</h3><button onclick="fecharModal()" class="modal-close">✕</button></div><div class="form-grupo"><label>DESCRIÇÃO *</label><select id="modalSelectEquip" class="select-padrao">${opts}</select></div><div class="form-grupo"><label>MODELO *</label><input type="text" id="modalInputModelo" class="input-padrao" value="${mo}"></div><div class="form-grupo"><label>FABRICANTE *</label><input type="text" id="modalInputFab" class="input-padrao" value="${fa}"></div><div class="form-grupo"><label>ANVISA</label><input type="text" id="modalInputAnvisa" class="input-padrao" value="${an}"></div><div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;"><button onclick="fecharModal()" class="btn-secondary">CANCELAR</button><button onclick="salvarModalVinculo()" class="btn-primary">💾 SALVAR</button></div></div></div>`;
  document.getElementById('modalContainer').innerHTML = html; document.getElementById('modalContainer').classList.remove('hidden');
};

window.fecharModal = function() { document.getElementById('modalContainer').innerHTML = ''; document.getElementById('modalContainer').classList.add('hidden'); appState.idMatrizEmEdicao = null; };
window.fecharModalProcesso = function() { fecharModal(); sincronizarDadosPlanilha(); };

window.salvarModalDescricao = function() {
  const inp = document.getElementById('modalInputEquip').value.trim().toUpperCase(); if(!inp) return alert('DIGITE A DESCRIÇÃO!');
  const norm = normalizarTermoMatriz(inp); let dup = null;
  for (let i = 0; i < appState.matrizAtivos.length; i++) {
    const ex = appState.matrizAtivos[i]; if (appState.idMatrizEmEdicao && String(ex.ID_REGISTRO || ex.id_registro) === String(appState.idMatrizEmEdicao)) continue;
    const nomeEx = ex.EQUIPAMENTO || ex.equipamento || ''; const normEx = normalizarTermoMatriz(nomeEx);
    if (norm === normEx || (norm.length >= 4 && normEx.length >= 4 && calcularDistanciaLevenshtein(norm, normEx) <= 2)) { dup = nomeEx; break; }
  }
  if (dup) return alert(`🚨 BLOQUEIO DE SEGURANÇA:\n\nTERMO IDÊNTICO OU MUITO PRÓXIMO A "${dup.toUpperCase()}" JÁ CADASTRADO.`);
  executarEnvioMatriz({ ID_REGISTRO: appState.idMatrizEmEdicao || 'mat_' + Date.now(), EQUIPAMENTO: inp, MODELO: '', FABRICANTE: '', ANVISA: '', STATUS: 'ATIVO' });
};

window.salvarModalVinculo = function() {
  const eq = document.getElementById('modalSelectEquip').value.toUpperCase(); const mo = document.getElementById('modalInputModelo').value.trim().toUpperCase(); const fa = document.getElementById('modalInputFab').value.trim().toUpperCase(); const an = document.getElementById('modalInputAnvisa').value.trim().toUpperCase();
  if(!eq || !mo || !fa) return alert('PREENCHA OS OBRIGATÓRIOS!');
  executarEnvioMatriz({ ID_REGISTRO: appState.idMatrizEmEdicao || 'mat_' + Date.now(), EQUIPAMENTO: eq, MODELO: mo, FABRICANTE: fa, ANVISA: an, STATUS: 'ATIVO' });
};

window.alternarStatusMatriz = function(id) {
  const it = appState.matrizAtivos.find(x => String(x.ID_REGISTRO || x.id_registro) === String(id)); if(!it) return;
  const nSt = (it.STATUS || it.status || 'ATIVO').toUpperCase() === 'ATIVO' ? 'INATIVO' : 'ATIVO'; if(!confirm(`ALTERAR STATUS PARA ${nSt}?`)) return;
  appState.idMatrizEmEdicao = id; executarEnvioMatriz({ ID_REGISTRO: id, EQUIPAMENTO: (it.EQUIPAMENTO || it.equipamento).toUpperCase(), MODELO: (it.MODELO || it.modelo || '').toUpperCase(), FABRICANTE: (it.FABRICANTE || it.fabricante || '').toUpperCase(), ANVISA: (it.ANVISA || it.anvisa || '').toUpperCase(), STATUS: nSt }, 'editarCadastro');
};

function executarEnvioMatriz(pacote, acaoForcada = null) {
  const acao = acaoForcada || (appState.idMatrizEmEdicao ? 'editarCadastro' : 'salvarCadastro');
  const urlFinal = `${WEB_APP_URL}?acao=${acao}&tipo=MATRIZ_ATIVOS&dados=${encodeURIComponent(JSON.stringify(pacote))}&prefix=fecharModalProcesso`;
  const scriptAntigo = document.getElementById('jsonp_matriz_script'); if(scriptAntigo) scriptAntigo.remove();
  const scriptElement = document.createElement('script'); scriptElement.id = 'jsonp_matriz_script'; scriptElement.src = urlFinal; document.body.appendChild(scriptElement);
}

window.desenharTabelaMatrizAtivos = function() {
  const tbody = document.getElementById('tbodyMatrizAtivosParam'); if(!tbody) return; tbody.innerHTML = '';
  if(!appState.matrizAtivos || appState.matrizAtivos.length === 0) { tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:15px; color:#64748b;">NENHUM ITEM LOCALIZADO.</td></tr>`; return; }
  const filtrados = appState.matrizAtivos.filter(i => {
    if (appState.buscaTextoMatrizParam === '') return true;
    return (i.EQUIPAMENTO || i.equipamento || '').toUpperCase().includes(appState.buscaTextoMatrizParam) || (i.MODELO || i.modelo || '').toUpperCase().includes(appState.buscaTextoMatrizParam) || (i.FABRICANTE || i.fabricante || '').toUpperCase().includes(appState.buscaTextoMatrizParam);
  });
  filtrados.sort((a,b) => (a.EQUIPAMENTO || a.equipamento || '').localeCompare(b.EQUIPAMENTO || b.equipamento || ''));
  filtrados.forEach(item => {
    const id = item.ID_REGISTRO || item.id_registro; const eq = (item.EQUIPAMENTO || item.equipamento || '').toUpperCase(); const mo = (item.MODELO || item.modelo || '-').toUpperCase(); const fa = (item.FABRICANTE || item.fabricante || '-').toUpperCase(); const an = (item.ANVISA || item.anvisa || '-').toUpperCase(); const st = (item.STATUS || item.status || 'ATIVO').toUpperCase();
    const bg = st === 'ATIVO' ? '#dcfce7' : '#fee2e2'; const tx = st === 'ATIVO' ? '#16a34a' : '#dc2626';
    tbody.innerHTML += `<tr><td><b>${eq}</b></td><td>${mo}</td><td>${fa}</td><td><span style="font-family:monospace;">${an}</span></td><td><span style="padding:4px 8px; background:${bg}; color:${tx}; border-radius:6px; font-size:11px; font-weight:bold;">${st}</span></td><td style="text-align:center;"><button class="btn-primary" style="padding:4px 8px; font-size:11px;" onclick="prepararEdicaoMatriz('${id}', '${mo === '-'}')">📝 ALTERAR</button><button class="${st === 'ATIVO' ? 'btn-danger' : 'btn-success'}" style="padding:4px 8px; font-size:11px; margin-left:4px;" onclick="alternarStatusMatriz('${id}')">${st === 'ATIVO' ? '🚫 INATIVAR' : '⚡ ATIVAR'}</button></td></tr>`;
  });
};
window.prepararEdicaoMatriz = function(id, isApenasDescricao) { if(isApenasDescricao === true || isApenasDescricao === 'true') abrirModalDescricao(id); else abrirModalModeloVinculo(id); };

function atualizarTabelaUsuariosLocal() {
  const tbody = document.getElementById('listaUsuariosTbody'); if (!tbody) return; tbody.innerHTML = '';
  if (!appState.usuarios || appState.usuarios.length === 0) return;
  var filtrados = appState.usuarios.filter(u => { return (appState.filtroStatusUsuario === 'TODOS' || (u.status || 'ATIVO').toUpperCase() === appState.filtroStatusUsuario) && (appState.buscaTextoUsuario === '' || (u.nome || '').toUpperCase().includes(appState.buscaTextoUsuario) || (u.login || '').toUpperCase().includes(appState.buscaTextoUsuario)); });
  filtrados.forEach((u) => {
    const isAtivo = (u.status || 'ATIVO').toUpperCase() === 'ATIVO'; const bg = isAtivo ? '#dcfce7' : '#fee2e2'; const tx = isAtivo ? '#16a34a' : '#dc2626';
    tbody.innerHTML += `<tr><td><b>${u.nome.toUpperCase()}</b></td><td>${u.login.toUpperCase()}</td><td>${u.cpf || '-'}</td><td>${u.admissao || '-'}</td><td>${u.perfil.toUpperCase()}</td><td><span style="padding:4px 8px; background:${bg}; color:${tx}; border-radius:6px; font-size:11px; font-weight:bold;">${(u.status || 'ATIVO').toUpperCase()}</span></td><td style="text-align:center;"><button class="btn-primary" onclick="prepararEdicaoUsuarioPeloId('${u.id}')">📝</button></td></tr>`;
  });
}
function prepararEdicaoUsuarioPeloId(id) {
  const u = appState.usuarios.find(user => String(user.id) === String(id)); if (!u) return alert('NÃO ENCONTRADO.'); appState.idUsuarioEmEdicao = u.id;
  document.getElementById('formUserNome').value = u.nome || ''; document.getElementById('formUserLogin').value = u.login || ''; document.getElementById('formUserSenha').value = u.senha || ''; document.getElementById('formUserPerfil').value = u.perfil || 'Técnico'; document.getElementById('formUserCpf').value = u.cpf || ''; document.getElementById('formUserTelefone').value = u.telephone || ''; document.getElementById('formUserStatus').value = u.status || 'ATIVO'; document.getElementById('btnCancelarEdicaoUsuario').classList.remove('hidden');
}
function limparFormularioUsuario() { appState.idUsuarioEmEdicao = null; abrirSubMóduloGestao('colaboradores'); }
window.processarRetornoGoogleSheets = function() { alert('COLABORADOR CADASTRADO!'); limparFormularioUsuario(); sincronizarDadosPlanilha(); };
function enviarUsuarioPlanilha() {
  const nome = document.getElementById('formUserNome').value.trim().toUpperCase(); const login = document.getElementById('formUserLogin').value.trim().toUpperCase(); const senha = document.getElementById('formUserSenha').value; if (!nome || !login || !senha) return alert('CAMPOS OBRIGATÓRIOS!');
  const d = { id: appState.idUsuarioEmEdicao || 'usr_' + Date.now(), nome: nome, login: login, senha: senha, perfil: document.getElementById('formUserPerfil').value, status: document.getElementById('formUserStatus').value, cpf: document.getElementById('formUserCpf').value, telephone: document.getElementById('formUserTelefone').value, rg: '', cnh: '', cep: '', logradouro: '', numero: '', bairro: '', cidade: 'SÃO PAULO', uf: 'SP', admissao: '', motivoDesligamento: '' };
  const acao = appState.idUsuarioEmEdicao ? 'editarCadastro' : 'salvarCadastro';
  const urlFinal = `${WEB_APP_URL}?acao=${acao}&tipo=USUARIO&dados=${encodeURIComponent(JSON.stringify(d))}&prefix=processarRetornoGoogleSheets`;
  const scriptAntigo = document.getElementById('jsonp_execution_script'); if(scriptAntigo) scriptAntigo.remove();
  const scriptElement = document.createElement('script'); scriptElement.id = 'jsonp_execution_script'; scriptElement.src = urlFinal; document.body.appendChild(scriptElement);
}
</script>
