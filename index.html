<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORIZON - Gestão Inteligente</title>
<style>
:root {
  --cor-primaria: #2563eb;
  --cor-secundaria: #334155;
  --cor-sucesso: #16a34a;
  --cor-perigo: #dc2626;
  --borda: #cbd5e1;
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
body { background: #f4f7fb; color: #1e293b; display: flex; min-height: 100vh; }

.input-padrao, .select-padrao, .textarea-padrao {
  width: 100%; padding: 10px; border: 1px solid var(--borda); border-radius: 8px; background: white; font-size: 13px;
}
.btn-primary { background: var(--cor-primaria); color: white; }
.btn-danger { background: var(--cor-perigo); color: white; }
.btn-success { background: var(--cor-sucesso); color: white; }
.btn-secondary { background: var(--cor-secundaria); color: white; }

.card-padrao { background: #fff; border-radius: 16px; padding: 22px; box-shadow: 0 6px 18px rgba(0,0,0,.06); border: 1px solid #e2e8f0; margin-bottom: 25px; }
.sidebar { width: 240px; background: linear-gradient(180deg, #0f172a, #111827); color: #fff; position: fixed; top: 0; left: 0; bottom: 0; padding: 24px 16px; display: flex; flex-direction: column; }
.menu-items { flex-grow: 1; }
.logo { font-size: 34px; font-weight: bold; color: #60a5fa; cursor: pointer; margin-bottom: 8px; }
.sidebar small { color: #94a3b8; display: block; margin-bottom: 28px; }
.sidebar button { width: 100%; border: none; background: linear-gradient(180deg, #1e293b, #111827); color: #fff; padding: 12px 14px; border-radius: 10px; text-align: left; margin-bottom: 6px; cursor: pointer; font-weight: 600; font-size: 13px; transition: all .2s ease; }
.sidebar button:hover { background: #2563eb; transform: translateX(4px); }
.sidebar button.btn-logout { background: #1e293b; border: 1px solid rgba(220, 38, 38, 0.2); margin-top: auto; }
.sidebar button.btn-logout:hover { background: #dc2626; border-color: #dc2626; }

.main { margin-left: 240px; width: calc(100% - 240px); display: flex; flex-direction: column; min-height: 100vh; }
.topbar { background: #fff; padding: 22px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.topbar h1 { color: #1565C0; font-size: 34px; }
.topbar p { color: #64748b; margin-top: 4px; }
.content { padding: 25px; flex-grow: 1; }
.dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 18px; margin-top: 20px; }
button { border: none; padding: 10px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all .25s ease; }
button:hover { transform: translateY(-1px); filter: brightness(1.05); }
.hidden { display: none !important; }

.tabela-container { width: 100%; overflow-x: auto; margin-top: 15px; }
.tabela-sistema { width: 100%; border-collapse: collapse; min-width: 1100px; }
.tabela-sistema th { background: #f1f5f9; padding: 12px; text-align: left; font-size: 13px; color: #475569; border-bottom: 2px solid #e2e8f0; }
.tabela-sistema td { padding: 12px; border-bottom: 1px solid #e2e8f0; font-size: 13px; background: white; white-space: nowrap; }

.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
.form-grid label { font-size: 12px; font-weight: 600; margin-bottom: 4px; color: #475569; }
.form-grupo { display: flex; flex-direction: column; margin-bottom: 8px; }

/* Estilos para abas internas do painel Gestão */
.tabs-gestao { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--borda); padding-bottom: 5px; }
.tab-item { padding: 8px 16px; cursor: pointer; font-weight: 600; font-size: 13px; color: #64748b; border-bottom: 2px solid transparent; }
.tab-item.active { color: var(--cor-primaria); border-color: var(--cor-primaria); }
</style>
</head>
<body>

<div id="loginScreen" style="position:fixed; inset:0; background:linear-gradient(135deg,#0f172a,#1e3a8a); display:flex; align-items:center; justify-content:center; z-index:99999;">
  <div style="width:100%; max-width:420px; background:white; padding:40px; border-radius:20px; box-shadow:0 20px 50px rgba(0,0,0,.25); text-align:center;">
    <div style="font-size:42px; font-weight:bold; color:#2563eb; margin-bottom:8px;">⚡ ORIZON</div>
    <p style="color:#64748b; margin-bottom:28px;">Smart Operations Platform</p>
    <input id="loginUser" type="text" placeholder="Usuário" style="width:100%; padding:14px; margin-bottom:12px; border:1px solid #cbd5e1; border-radius:10px;" autocomplete="off">
    <input id="loginPass" type="password" placeholder="Senha" style="width:100%; padding:14px; margin-bottom:18px; border:1px solid #cbd5e1; border-radius:10px;">
    <button id="btnEntrar" class="btn-primary" style="width:100%; padding:14px; font-weight:bold; font-size:15px;">Entrar no sistema</button>
    <p style="margin-top:18px; font-size:12px; color:#94a3b8;">by DMA Solutions • Operational Management</p>
  </div>
</div>

<div id="wrapperSistema" class="hidden" style="width:100%; display:flex;">
  <div class="sidebar">
    <div class="logo" id="logoInicio">⚡ ORIZON</div>
    <small>Painel de Operações</small>
    <div class="menu-items">
      <button id="btnMenuRotas">📍 Rotas Diárias</button>
      <button id="btnMenuClientes">🏥 Clientes / Unidades</button>
      <button id="btnMenuChamados">🛠 Chamados de Maint</button>
      <button id="btnMenuLocacao">🤝 Locação de Equipamentos</button>
      <button id="btnMenuPatrimonio">📦 Patrimônio (Inventário)</button>
      <button id="btnMenuDashboards">📊 Dashboards</button>
      <button id="btnMenuGestao">⚙️ Gestão</button>
    </div>
    <button id="btnSidebarLogout" class="btn-logout">🚪 Sair do Sistema</button>
  </div>

  <div class="main">
    <div class="topbar">
      <h1>ORIZON</h1>
      <p id="subtituloTopbar">Gestão inteligente de rotas e operations</p>
    </div>
    <div class="content" id="conteudoPrincipal"></div>
  </div>
</div>

<datalist id="datalistClientesGlobal"></datalist>

<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyHIvNs0aEU9ZbNzg6mYd5g1y5bl1dbMgnJywmp9VXxLLcC9c_qIrUHiyTNapa1zpyksA/exec';

const appState = {
  clientes: JSON.parse(localStorage.getItem('orizonClientes')) || [],
  patrimonio: [],
  movimentacoes: [],
  tecnicos: ['Diogo', 'Fagner Lima', 'Administrador'],
  veiculos: [],
  rotas: [],
  usuarios: [], 
  usuarioLogado: null,
  idClienteEmEdicao: null,
  idUsuarioEmEdicao: null
};

sincronizarDadosPlanilha();
verificarSessaoAtiva();

document.getElementById('btnEntrar').addEventListener('click', fazerLogin);
document.getElementById('btnSidebarLogout').addEventListener('click', efetuarLogout);
document.getElementById('logoInicio').addEventListener('click', voltarInicio);
document.getElementById('btnMenuRotas').addEventListener('click', () => abrirTela('rotas'));
document.getElementById('btnMenuClientes').addEventListener('click', () => abrirTela('clientes'));
document.getElementById('btnMenuChamados').addEventListener('click', () => abrirTela('chamados'));
document.getElementById('btnMenuLocacao').addEventListener('click', () => abrirTela('locacao'));
document.getElementById('btnMenuPatrimonio').addEventListener('click', () => abrirTela('patrimonio'));
document.getElementById('btnMenuDashboards').addEventListener('click', () => abrirTela('dashboards'));
document.getElementById('btnMenuGestao').addEventListener('click', () => abrirTela('gestao'));

function fazerLogin() {
  const userIn = document.getElementById('loginUser').value.trim().toLowerCase();
  const passIn = document.getElementById('loginPass').value;

  if ((userIn === 'admin' && passIn === '@181989Di') || (userIn === 'visitante' && passIn === '123')) {
    liberarPainel({ nome: userIn === 'admin' ? 'Administrador' : 'Visitante', perfil: userIn.toUpperCase() });
    return;
  }
  
  if (appState.usuarios && appState.usuarios.length > 0) {
    const conta = appState.usuarios.find(u => String(u.login).toLowerCase() === userIn && String(u.senha) === passIn);
    if (conta) { 
      liberarPainel(conta); 
      return;
    }
  }
  alert('Usuário ou senha incorretos ou base ainda carregando!');
}

function liberarPainel(usuario) {
  appState.usuarioLogado = usuario;
  sessionStorage.setItem('orizonUsuarioAtivo', JSON.stringify(usuario));
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('wrapperSistema').classList.remove('hidden');
  document.getElementById('subtituloTopbar').innerText = `Logado como: ${usuario.nome} (${usuario.perfil || 'USUÁRIO'})`;
  voltarInicio();
}

function efetuarLogout() {
  if (!confirm('Deseja realmente sair?')) return;
  appState.usuarioLogado = null;
  sessionStorage.removeItem('orizonUsuarioAtivo');
  document.getElementById('wrapperSistema').classList.add('hidden');
  document.getElementById('loginScreen').style.display = 'flex';
}

function verificarSessaoAtiva() {
  const sessaoSalva = sessionStorage.getItem('orizonUsuarioAtivo');
  if (sessaoSalva) {
    appState.usuarioLogado = JSON.parse(sessaoSalva);
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('wrapperSistema').classList.remove('hidden');
    document.getElementById('subtituloTopbar').innerText = `Logado como: ${appState.usuarioLogado.nome}`;
    voltarInicio();
  }
}

function sincronizarDadosPlanilha() {
  fetch(`${WEB_APP_URL}?acao=listarCadastros`)
    .then(res => res.json())
    .then(res => {
      if (res.sucesso) {
        appState.clientes = res.clientes || [];
        appState.patrimonio = res.patrimonio || [];
        appState.movimentacoes = res.movimentacoes || [];
        appState.usuarios = res.usuarios || [];
        appState.veiculos = res.veiculos || []; 
        localStorage.setItem('orizonClientes', JSON.stringify(appState.clientes));
        
        const dl = document.getElementById('datalistClientesGlobal');
        if(dl) {
          dl.innerHTML = '';
          appState.clientes.filter(c => c.status === 'ATIVO').forEach(c => {
            let opt = document.createElement('option'); opt.value = c.nome; dl.appendChild(opt);
          });
        }

        if (document.getElementById('listaClientesTbody')) atualizarTabelaClientesLocal();
        if (document.getElementById('listaPatrimonioTbody')) atualizarTabelaPatrimonioLocal();
        if (document.getElementById('movTagInput')) atualizarDatalistTags();
        if (document.getElementById('listaUsuariosTbody')) atualizarTabelaUsuariosLocal();
      }
    })
    .catch(err => console.error("Erro na sincronização automática:", err));
}

function abrirTela(menu) {
  const principal = document.getElementById('conteudoPrincipal');
  if (menu === 'inicio') {
    principal.innerHTML = `
      <h2>Bem-vindo ao ORIZON</h2>
      <div class="dashboard-grid">
        <div class="card-padrao"><h3>📍 Controle de Rotas</h3><p>Planejamento e acompanhamento diário.</p></div>
        <div class="card-padrao"><h3>🏥 Clientes</h3><p>Cadastro integrado de unidades.</p></div>
        <div class="card-padrao"><h3>🤝 Locação</h3><p>Rastreamento quantitativo de ativos em clientes.</p></div>
        <div class="card-padrao"><h3>📦 Patrimônio</h3><p>Inventário centralizado de equipamentos.</p></div>
      </div>`;
  } else if (menu === 'clientes') {
    renderizarTelaClientes(principal);
  } else if (menu === 'patrimonio') {
    renderizarTelaPatrimonio(principal);
  } else if (menu === 'locacao') {
    renderizarTelaLocacao(principal);
  } else if (menu === 'rotas') {
    renderizarTelaRotas(principal);
  } else if (menu === 'gestao') {
    renderizarTelaGestao(principal);
  } else {
    principal.innerHTML = `<h2>🚧 Módulo ${menu.toUpperCase()}</h2><p style="color:#64748b; margin-top:10px;">Tela em desenvolvimento.</p>`;
  }
}

function voltarInicio() { abrirTela('inicio'); }

// =========================================================================
// INTERFACE: CADASTRO DE CLIENTES
// =========================================================================
function renderizarTelaClientes(container) {
  container.innerHTML = `
    <div>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2>🏥 Cadastro e Listagem de Clientes</h2>
        <button id="btnSyncClientesPlanilha" class="btn-secondary" style="font-size:12px;">🔄 Sincronizar Planilha</button>
      </div>
      <div class="card-padrao">
        <h3 id="tituloFormCliente" style="margin-bottom:15px; color:var(--cor-primaria);">Ficha de Cadastro</h3>
        <div class="form-grid">
          <div class="form-grupo"><label>Tipo de Pessoa</label><select id="formTipoPessoa" class="select-padrao"><option value="JURIDICA">Pessoa Jurídica (CNPJ)</option><option value="FISICA">Pessoa Física (CPF)</option></select></div>
          <div class="form-grupo"><label id="labelDocumento">CNPJ</label><input type="text" id="formCnpj" class="input-padrao" placeholder="00.000.000/0001-00"></div>
          <div class="form-grupo"><label>Cliente / Unidade *</label><input type="text" id="formCliente" class="input-padrao"></div>
          <div class="form-grupo"><label>Contrato</label><input type="text" id="formContrato" class="input-padrao"></div>
          <div class="form-grupo"><label>CEP</label><input type="text" id="formCep" class="input-padrao"></div>
          <div class="form-grupo"><label>Logradouro</label><input type="text" id="formLogradouro" class="input-padrao"></div>
          <div class="form-grupo"><label>Número</label><input type="text" id="formNumero" class="input-padrao"></div>
          <div class="form-grupo"><label>Complemento</label><input type="text" id="formComplemento" class="input-padrao"></div>
          <div class="form-grupo"><label>Bairro</label><input type="text" id="formBairro" class="input-padrao"></div>
          <div class="form-grupo"><label>Cidade</label><input type="text" id="formCidade" class="input-padrao" value="SÃO PAULO"></div>
          <div class="form-grupo"><label>UF</label><input type="text" id="formUf" class="input-padrao" value="SP"></div>
          <div class="form-grupo"><label>Região</label><input type="text" id="formRegiao" class="input-padrao"></div>
          <div class="form-grupo"><label>Responsável</label><input type="text" id="formResponsavel" class="input-padrao"></div>
          <div class="form-grupo"><label>Telefone</label><input type="text" id="formTelefone" class="input-padrao"></div>
          <div class="form-grupo"><label>E-mail</label><input type="email" id="formEmail" class="input-padrao"></div>
          <div class="form-grupo"><label>Status</label><select id="formStatus" class="select-padrao"><option value="ATIVO">ATIVO</option><option value="INATIVO">INATIVO</option></select></div>
        </div>
        <div style="margin-top:12px;"><div class="form-grupo"><label>Observações</label><input type="text" id="formObservation" class="input-padrao"></div></div>
        <div style="display:flex; justify-content: flex-end; gap:10px; margin-top:15px;"><button id="btnCancelarEdicao" class="btn-secondary hidden">Cancelar</button><button id="btnSalvarClientePlanilha" class="btn-success">💾 Salvar Cliente</button></div>
      </div>
      <div class="card-padrao"><h3>Clientes na Base</h3><div class="tabela-container"><table class="tabela-sistema"><thead><tr><th>CLIENTE</th><th>CNPJ/CPF</th><th>CONTRATO</th><th>LOGRADOURO</th><th>BAIRRO</th><th>CIDADE</th><th>RESPONSÁVEL</th><th>STATUS</th><th style="text-align:center;">AÇÕES</th></tr></thead><tbody id="listaClientesTbody"></tbody></table></div></div>
    </div>`;

  document.getElementById('btnSyncClientesPlanilha').addEventListener('click', sincronizarDadosPlanilha);
  document.getElementById('btnSalvarClientePlanilha').addEventListener('click', enviarClientePlanilha);
  document.getElementById('btnCancelarEdicao').addEventListener('click', limparFormularioCliente);
  document.getElementById('formCep').addEventListener('blur', buscarCepAutomatico);
  document.getElementById('formCnpj').addEventListener('blur', verificarDocumentoEReceita);
  document.getElementById('formCnpj').addEventListener('input', aplicarMascaraDocumento);
  document.getElementById('formCep').addEventListener('input', aplicarMascaraCep);
  document.getElementById('formTelefone').addEventListener('input', aplicarMascaraTelefone);
  atualizarTabelaClientesLocal();
}

function verificarDocumentoEReceita() {
  const doc = this.value.trim(); if (!doc) return;
  const dup = appState.clientes.find(c => c.cnpj === doc && c.id !== appState.idClienteEmEdicao);
  if (dup) { alert(`Documento já cadastrado para o cliente: ${dup.nome}`); this.value = ''; return; }
  const clean = doc.replace(/\D/g, '');
  if (document.getElementById('formTipoPessoa').value === 'JURIDICA' && clean.length === 14) {
    fetch(`https://brasilapi.com.br/api/cnpj/v1/${clean}`)
      .then(res => res.json())
      .then(dados => {
        document.getElementById('formCliente').value = dados.razao_social || '';
        document.getElementById('formCep').value = dados.cep || '';
        document.getElementById('formLogradouro').value = dados.logradouro || '';
        document.getElementById('formNumero').value = dados.numero || '';
        document.getElementById('formBairro').value = dados.bairro || '';
        document.getElementById('formCidade').value = dados.municipio || 'SÃO PAULO';
        document.getElementById('formUf').value = dados.uf || 'SP';
      }).catch(() => {});
  }
}

function aplicarMascaraDocumento() {
  let v = this.value.replace(/\D/g, '');
  if (document.getElementById('formTipoPessoa').value === 'JURIDICA') {
    v = v.substring(0, 14); v = v.replace(/^(\d{2})(\d)/, "$1.$2").replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3").replace(/\.(\d{3})(\d)/, ".$1/$2").replace(/(\d{4})(\d)/, "$1-$2");
  } else {
    v = v.substring(0, 11); if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4"); else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, "$1.$2.$3"); else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, "$1.$2");
  }
  this.value = v;
}
function aplicarMascaraCep() { let v = this.value.replace(/\D/g, '').substring(0, 8); this.value = v.replace(/^(\d{5})(\d)/, "$1-$2"); }
function aplicarMascaraTelefone() { let v = this.value.replace(/\D/g, '').substring(0, 11); v = v.replace(/^(\d{2})(\d)/, "($1) $2"); if (v.length > 9) v = v.replace(/(\d{5})(\d)/, "$1-$2"); else v = v.replace(/(\d{4})(\d)/, "$1-$2"); this.value = v; }
function buscarCepAutomatico() { const cep = this.value.replace(/\D/g, ''); if (cep.length !== 8) return; fetch(`https://viacep.com.br/ws/${cep}/json/`).then(res => res.json()).then(d => { if (!d.erro) { document.getElementById('formLogradouro').value = d.logradouro; document.getElementById('formBairro').value = d.bairro; } }); }

function atualizarTabelaClientesLocal() {
  const tbody = document.getElementById('listaClientesTbody'); if (!tbody) return; tbody.innerHTML = '';
  appState.clientes.forEach((c, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td><b>${c.nome}</b></td><td>${c.cnpj || '-'}</td><td>${c.contrato || '-'}</td><td>${c.endereco}</td><td>${c.bairro}</td><td>${c.cidade}</td><td>${c.responsavel}</td><td>${c.status}</td><td><button class="btn-primary" onclick="prepararEdicaoCliente(${i})">📝</button></td>`;
    tbody.appendChild(tr);
  });
}
function prepararEdicaoCliente(i) {
  const c = appState.clientes[i]; appState.idClienteEmEdicao = c.id;
  document.getElementById('formCliente').value = c.nome; document.getElementById('formCnpj').value = c.cnpj; document.getElementById('formContrato').value = c.contrato; document.getElementById('formCep').value = c.cep; document.getElementById('formLogradouro').value = c.logradouro; document.getElementById('formNumero').value = c.numero; document.getElementById('formComplemento').value = c.complemento; document.getElementById('formBairro').value = c.bairro; document.getElementById('formCidade').value = c.cidade; document.getElementById('formUf').value = c.uf; document.getElementById('formRegiao').value = c.regiao; document.getElementById('formResponsavel').value = c.responsavel; document.getElementById('formTelefone').value = c.telefone; document.getElementById('formEmail').value = c.email; document.getElementById('formStatus').value = c.status; document.getElementById('formObservacao').value = c.observacao; document.getElementById('btnCancelarEdicao').classList.remove('hidden');
}
function limparFormularioCliente() { appState.idClienteEmEdicao = null; abrirTela('clientes'); }
function enviarClientePlanilha() {
  const nome = document.getElementById('formCliente').value.trim(); if(!nome) return alert('Nome Obrigatório');
  const d = { id: appState.idClienteEmEdicao || 'cli_'+Date.now(), nome: nome, cnpj: document.getElementById('formCnpj').value, contrato: document.getElementById('formContrato').value, cep: document.getElementById('formCep').value, logradouro: document.getElementById('formLogradouro').value, numero: document.getElementById('formNumero').value, complemento: document.getElementById('formComplemento').value, bairro: document.getElementById('formBairro').value, cidade: document.getElementById('formCidade').value, uf: document.getElementById('formUf').value, regiao: document.getElementById('formRegiao').value, responsavel: document.getElementById('formResponsavel').value, telefone: document.getElementById('formTelefone').value, email: document.getElementById('formEmail').value, status: document.getElementById('formStatus').value, observacao: document.getElementById('formObservacao').value };
  const acao = appState.idClienteEmEdicao ? 'editarCadastro' : 'salvarCadastro';
  fetch(`${WEB_APP_URL}?acao=${acao}&tipo=CLIENTE&dados=${encodeURIComponent(JSON.stringify(d))}`, { method: 'POST', mode: 'no-cors' }).then(() => { alert('Salvo!'); limparFormularioCliente(); setTimeout(sincronizarDadosPlanilha, 1000); });
}

// =========================================================================
// INTERFACE: INVENTÁRIO / PATRIMÔNIO CENTRAL
// =========================================================================
function renderizarTelaPatrimonio(container) {
  container.innerHTML = `
    <div>
      <h2>📦 Estoque e Inventário Central</h2>
      <div class="card-padrao" style="margin-top:15px;">
        <div class="tabela-container">
          <table class="tabela-sistema">
            <thead><tr><th>TAG</th><th>EQUIPAMENTO</th><th>Nº SÉRIE</th><th>PATRIMÔNIO</th><th>MODELO</th><th>FABRICANTE</th><th>STATUS OPERACIONAL</th><th>LOCALIZAÇÃO</th></tr></thead>
            <tbody id="listaPatrimonioTbody"></tbody>
          </table>
        </div>
      </div>
    </div>`;
  atualizarTabelaPatrimonioLocal();
}

function atualizarTabelaPatrimonioLocal() {
  const tbody = document.getElementById('listaPatrimonioTbody'); if (!tbody) return; tbody.innerHTML = '';
  if(appState.patrimonio.length === 0) { tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;">Nenhum item carregado.</td></tr>`; return; }
  
  appState.patrimonio.forEach(p => {
    const tr = document.createElement('tr');
    const bColor = p.status === 'DISPONÍVEL EM ESTOQUE' ? '#dcfce7; color:#16a34a;' : '#dbeafe; color:#2563eb;';

function atualizarDatalistTags() {
  const datalist = document.getElementById('listaTagsAutocomplete');
  if(!datalist) return;
  datalist.innerHTML = '';
  
  const tipo = document.getElementById('movTipo').value;
  const ativosFiltrados = appState.patrimonio.filter(p => {
    return tipo === 'ENVIO' ? p.status === 'DISPONÍVEL EM ESTOQUE' : p.status === 'LOCADO';
  });

  ativosFiltrados.forEach(p => {
    const option = document.createElement('option');
    option.value = p.tag;
    option.text = `${p.equipamento} | Série: ${p.serie} ${p.localizacao ? '('+p.localizacao+')' : ''}`;
    datalist.appendChild(option);
  });
}

function filtrarEquipamentosDoCliente() {
  const cliente = this.value;
  const tbody = document.getElementById('tbodyItensLocadosCliente');
  if(!cliente) { tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:15px;">Selecione uma unidade no campo acima para ver o saldo físico.</td></tr>`; return; }

  const locados = appState.patrimonio.filter(p => p.status === 'LOCADO' && p.localizacao === cliente);
  tbody.innerHTML = '';

  if(locados.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#dc2626; font-weight:bold; padding:15px;">⚠️ Nenhum equipamento alocado nesta unidade no momento.</td></tr>`;
    return;
  }

  locados.forEach(p => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td><b>${p.tag}</b></td><td>${p.equipamento}</td><td>${p.serie}</td><td>${p.patrimonio || '-'}</td><td>${p.modelo}</td><td>${p.fabricante}</td>`;
    tbody.appendChild(tr);
  });
}

function processarMovimentacaoLocacao() {
  const tipo = document.getElementById('movTipo').value;
  const tag = document.getElementById('movTagInput').value.toUpperCase().trim();
  const cliente = document.getElementById('movCliente').value;
  const obs = document.getElementById('movObs').value;

  if(!tag || !cliente) return alert('Por favor, informe a TAG e selecione a Unidade do Cliente!');

  const itemPat = appState.patrimonio.find(p => p.tag.toUpperCase() === tag);
  if(!itemPat) return alert('A TAG digitada não foi encontrada no Inventário Central! Verifique o código.');

  if(tipo === 'ENVIO' && itemPat.status !== 'DISPONÍVEL EM ESTOQUE') {
    return alert(`Atenção: Este equipamento consta atualmente como ${itemPat.status} em: ${itemPat.localizacao}. Não é possível enviá-lo.`);
  }

  const pacoteMov = {
    tag: tag,
    equipamento: itemPat.equipamento,
    origem: tipo === 'ENVIO' ? 'Sede Central' : cliente,
    destino: tipo === 'ENVIO' ? cliente : 'Sede Central',
    tipo: tipo,
    responsavel: appState.usuarioLogado ? appState.usuarioLogado.nome : 'Sistema Orizon',
    observacao: obs
  };

  const btn = document.getElementById('btnGravarMovimentacao');
  btn.disabled = true; btn.innerText = '⏳ Processando...';

  fetch(`${WEB_APP_URL}?acao=registrarMovimentacao&dados=${encodeURIComponent(JSON.stringify(pacoteMov))}`, { method: 'POST', mode: 'no-cors' })
  .then(() => {
    alert(`Sucesso! Equipamento ${tag} movimentado.`);
    sincronizarDadosPlanilha();
    setTimeout(() => { abrirTela('locacao'); }, 1200);
  })
  .catch(err => { console.error(err); btn.disabled = false; btn.innerText = '💾 Confirmar Movimentação'; });
}

          <div><label>Data</label><input type="date" id="dataRota" class="input-padrao"></div>

function salvarRotaPlanilhaReal() {
  const nr = document.getElementById('numeroRota').value;
  const dt = document.getElementById('dataRota').value;
  const t1 = document.getElementById('tecnico1Rota').value;
  const t2 = document.getElementById('tecnico2Rota').value;
  const ve = document.getElementById('veiculoRota').value;

  if (!dt || t1.includes('Selecionar') || ve.includes('Selecionar') || !t1 || !ve) return alert('Preencha os campos obrigatórios!');

  const blocos = document.querySelectorAll('.bloco-cliente-rota');
  let clientesMontados = [];

  blocos.forEach(b => {
    const nome = b.querySelector('.select-cliente-nome').value;
    const end = b.querySelector('.endereco-texto').innerText;
    let chamados = [];
    b.querySelectorAll('.tabela-os-cliente tbody tr').forEach(r => {
      const inputs = r.querySelectorAll('input');
      if(inputs[0].value || inputs[1].value) chamados.push({ os: inputs[0].value, activity: inputs[1].value, tipo: 'Preventiva', prioridade: '🟡 Média' });
    });
    if(nome) clientesMontados.push({ cliente: nome, endereco: end, observacao: '', chamados: chamados });
  });

  const pacoteRota = { numeroRota: nr, data: dt, tecnico1: t1, tecnico2: t2 === 'Selecionar técnico' ? '' : t2, veiculo: ve, clientes: clientesMontados };
  const btn = document.getElementById('btnGravarRotaFinal'); btn.disabled = true; btn.innerText = 'Gravando...';

  fetch(`${WEB_APP_URL}?acao=salvarRota&dados=${encodeURIComponent(JSON.stringify(pacoteRota))}`, { method: 'POST', mode: 'no-cors' })
  .then(() => { alert('Rota salva com sucesso!'); abrirTela('rotas'); })
  .catch(() => { alert('Erro ao salvar.'); btn.disabled = false; btn.innerText = '💾 Salvar Rota'; });
}

    document.getElementById('btnCancelarEdicaoUsuario').addEventListener('click', limparFormularioUsuario);
    document.getElementById('btnSalvarUsuarioPlanilha').addEventListener('click', enviarUsuarioPlanilha);

    atualizarTabelaUsuariosLocal();
  } else {
    document.getElementById('tabConfiguracoes').classList.add('active');
    subContainer.innerHTML = `
      <div class="card-padrao">
        <h3>🛠️ Parâmetros do Sistema</h3>
        <p style="color:#64748b; font-size:13px; margin-top:8px;">Configurações avançadas de frota, veículos e controle de auditoria de dados.</p>
      </div>`;
  }
}

function aplicarMascaraCepUsuario() { let v = this.value.replace(/\D/g, '').substring(0, 8); this.value = v.replace(/^(\d{5})(\d)/, "$1-$2"); }
function aplicarMascaraTelefoneUsuario() { let v = this.value.replace(/\D/g, '').substring(0, 11); v = v.replace(/^(\d{2})(\d)/, "($1) $2"); if (v.length > 9) v = v.replace(/(\d{5})(\d)/, "$1-$2"); else v = v.replace(/(\d{4})(\d)/, "$1-$2"); this.value = v; }
function aplicarMascaraCpfUsuario() { let v = this.value.replace(/\D/g, '').substring(0, 11); if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4"); else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, "$1.$2.$3"); else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, "$1.$2"); this.value = v; }

function buscarCepUsuarioAutomatico() { 
  const cep = this.value.replace(/\D/g, ''); 
  if (cep.length !== 8) return; 
  fetch(`https://viacep.com.br/ws/${cep}/json/`)
    .then(res => res.json())
    .then(d => { 
      if (!d.erro) { 
        document.getElementById('formUserLogradouro').value = d.logradouro || ''; 
        document.getElementById('formUserBairro').value = d.bairro || ''; 
        document.getElementById('formUserCidade').value = d.localidade || 'SÃO PAULO'; 
        document.getElementById('formUserUf').value = d.uf || 'SP'; 
      } 
    }); 
}

function formatarDataBr(dataUs) {
  if(!dataUs) return '-';
  if(dataUs.includes('/')) return dataUs.split(' ')[0]; 
  const partes = dataUs.split('-');
  if(partes.length !== 3) return dataUs;
  return `${partes[2]}/${partes[1]}/${partes[0]}`;
}

function atualizarTabelaUsuariosLocal() {
  const tbody = document.getElementById('listaUsuariosTbody');
  if (!tbody) return;
  tbody.innerHTML = '';
  
  if (!appState.usuarios || appState.usuarios.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#64748b; padding: 15px;">Nenhum usuário localizado.</td></tr>`;
    return;
  }
  
  appState.usuarios.forEach((u, idx) => {
    const tr = document.createElement('tr');
    const isAtivo = (u.status || 'ATIVO') === 'ATIVO';
    const badgeBg = isAtivo ? '#dcfce7' : '#fee2e2';
    const badgeColor = isAtivo ? '#16a34a' : '#dc2626';
    
    tr.innerHTML = `
      <td><b>${u.nome || ''}</b></td>
      <td>${u.login || '-'}</td>
      <td>${u.cpf || '-'}</td>
      <td>${u.admissao ? formatarDataBr(u.admissao) : '-'}</td>
      <td>${u.perfil || 'Técnico'}</td>
      <td><span style="padding:4px 8px; background:${badgeBg}; color:${badgeColor}; border-radius:6px; font-size:11px; font-weight:bold;">${u.status || 'ATIVO'}</span></td>
      <td style="text-align:center;"><button class="btn-primary" style="padding: 5px 10px;" onclick="prepararEdicaoUsuario(${idx})">📝</button></td>`;
    tbody.appendChild(tr);
  });
}

function幕prepararEdicaoUsuario(idx) {
  const u = appState.usuarios[idx];
  appState.idUsuarioEmEdicao = u.id;
  
  document.getElementById('formUserNome').value = u.nome || '';
  document.getElementById('formUserLogin').value = u.login || '';
  document.getElementById('formUserSenha').value = u.senha || '';
  document.getElementById('formUserPerfil').value = u.perfil || 'Técnico';
  document.getElementById('formUserCpf').value = u.cpf || '';
  document.getElementById('formUserRg').value = u.rg || '';
  document.getElementById('formUserCnh').value = u.cnh || '';
  document.getElementById('formUserTelefone').value = u.telefone || '';
  document.getElementById('formUserCep').value = u.cep || '';
  document.getElementById('formUserLogradouro').value = u.logradouro || '';
  document.getElementById('formUserNumero').value = u.numero || '';
  document.getElementById('formUserBairro').value = u.bairro || '';
  document.getElementById('formUserCidade').value = u.cidade || 'SÃO PAULO';
  document.getElementById('formUserUf').value = u.uf || 'SP';
  document.getElementById('formUserAdmissao').value = u.admissao || '';
  
  const statusAtual = u.status || 'ATIVO';
  document.getElementById('formUserStatus').value = statusAtual;
  
  const inputMotivo = document.getElementById('formUserMotivo');
  if (statusAtual === 'INATIVO') {
    inputMotivo.disabled = false; inputMotivo.style.background = 'white';
  } else {
    inputMotivo.disabled = true; inputMotivo.style.background = '#f1f5f9';
  }
  document.getElementById('formUserMotivo').value = u.motivoDesligamento || '';
  
  document.getElementById('btnCancelarEdicaoUsuario').classList.remove('hidden');
  document.getElementById('tituloFormUsuario').innerText = 'Editar Colaborador';
  document.getElementById('tituloFormUsuario').style.color = 'var(--cor-sucesso)';
}

function limparFormularioUsuario() {
  appState.idUsuarioEmEdicao = null;
  document.getElementById('formUserNome').value = '';
  document.getElementById('formUserLogin').value = '';
  document.getElementById('formUserSenha').value = '';
  document.getElementById('formUserPerfil').value = 'Técnico';
  document.getElementById('formUserCpf').value = '';
  document.getElementById('formUserRg').value = '';
  document.getElementById('formUserCnh').value = '';
  document.getElementById('formUserTelefone').value = '';
  document.getElementById('formUserCep').value = '';
  document.getElementById('formUserLogradouro').value = '';
  document.getElementById('formUserNumero').value = '';
  document.getElementById('formUserBairro').value = '';
  document.getElementById('formUserCidade').value = 'SÃO PAULO';
  document.getElementById('formUserUf').value = 'SP';
  document.getElementById('formUserAdmissao').value = '';
  document.getElementById('formUserStatus').value = 'ATIVO';
  
  const inputMotivo = document.getElementById('formUserMotivo');
  inputMotivo.disabled = true; inputMotivo.value = ''; inputMotivo.style.background = '#f1f5f9';
  
  document.getElementById('btnCancelarEdicaoUsuario').classList.add('hidden');
  document.getElementById('tituloFormUsuario').innerText = 'Ficha do Colaborador';
  document.getElementById('tituloFormUsuario').style.color = 'var(--cor-primaria)';
}

function enviarUsuarioPlanilha() {
  const nome = document.getElementById('formUserNome').value.trim();
  const login = document.getElementById('formUserLogin').value.trim();
  const senha = document.getElementById('formUserSenha').value;
  const perfil = document.getElementById('formUserPerfil').value;
  const status = document.getElementById('formUserStatus').value;
  const motivo = document.getElementById('formUserMotivo').value.trim();
  
  if (!nome || !login || !senha) return alert('Por favor, preencha os campos obrigatórios (*)!');
  if (status === 'INATIVO' && !motivo) return alert('Informe o motivo do desligamento!');
  
  const d = {
    id: appState.idUsuarioEmEdicao || 'usr_' + Date.now(),
    nome: nome, login: login, senha: senha, perfil: perfil,
    status: status,
    cpf: document.getElementById('formUserCpf').value,
    rg: document.getElementById('formUserRg').value,
    cnh: document.getElementById('formUserCnh').value,
    telefone: document.getElementById('formUserTelefone').value,
    cep: document.getElementById('formUserCep').value,
    logradouro: document.getElementById('formUserLogradouro').value,
    numero: document.getElementById('formUserNumero').value,
    bairro: document.getElementById('formUserBairro').value,
    cidade: document.getElementById('formUserCidade').value,
    uf: document.getElementById('formUserUf').value,
    admissao: document.getElementById('formUserAdmissao').value,
    motivoDesligamento: motivo
  };
  
  const acao = appState.idUsuarioEmEdicao ? 'editarCadastro' : 'salvarCadastro';
  const btn = document.getElementById('btnSalvarUsuarioPlanilha');
  btn.disabled = true; btn.innerText = '⏳ Gravando...';
  
  fetch(`${WEB_APP_URL}?acao=${acao}&tipo=USUARIO&dados=${encodeURIComponent(JSON.stringify(d))}`, { method: 'POST', mode: 'no-cors' })
  .then(() => { 
    alert('Salvo com sucesso!'); 
    limparFormularioUsuario(); 
    setTimeout(sincronizarDadosPlanilha, 1000); 
  })
  .catch(err => {
    console.error(err);
    btn.disabled = false; btn.innerText = '💾 Salvar Colaborador';
  });
}
</script>
