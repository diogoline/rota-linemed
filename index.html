<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORIZON | Smart Operations</title>
<style>
:root {
  --bg-sistema: #f8fafc;
  --sidebar-dark: #0f172a;
  --sidebar-hover: #1e293b;
  --cor-marca: #3b82f6;
  --cor-marca-hover: #2563eb;
  --cor-sucesso: #10b981;
  --cor-perigo: #ef4444;
  --cor-alerta: #f97316;
  --texto-principal: #1e293b;
  --texto-mutado: #64748b;
  --borda-suave: #e2e8f0;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
body { background: var(--bg-sistema); color: var(--texto-principal); display: flex; min-height: 100vh; -webkit-font-smoothing: antialiased; }

/* INPUTS E ELEMENTOS DE FORMULÁRIO MODERNOS */
.input-padrao, .select-padrao, .textarea-padrao {
  width: 100%; padding: 11px 14px; border: 1px solid var(--borda-suave); border-radius: 10px; background: white; font-size: 13px; color: var(--texto-principal); transition: all 0.2s ease; outline: none;
}
.input-padrao:focus, .select-padrao:focus { border-color: var(--cor-marca); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }

/* BOTÕES ESTILO SAAS */
button { border: none; padding: 10px 18px; border-radius: 10px; font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
button:hover { transform: translateY(-1px); filter: brightness(1.05); }
button:active { transform: translateY(0); }
.btn-primary { background: var(--cor-marca); color: white; }
.btn-success { background: var(--cor-sucesso); color: white; }
.btn-danger { background: var(--cor-perigo); color: white; }
.btn-secondary { background: #e2e8f0; color: var(--texto-secondary); color: #334155; }

/* CARDS E GRIDS */
.card-padrao { background: #ffffff; border-radius: 16px; padding: 24px; border: 1px solid var(--borda-suave); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02), 0 2px 4px -1px rgba(0,0,0,0.01); margin-bottom: 24px; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
.form-grupo { display: flex; flex-direction: column; gap: 6px; }
.form-grupo label { font-size: 12px; font-weight: 600; color: var(--texto-mutado); text-transform: uppercase; letter-spacing: 0.5px; }

/* SIDEBAR E MENU PREMIUM */
.sidebar { width: 260px; background: var(--sidebar-dark); color: #fff; position: fixed; top: 0; left: 0; bottom: 0; padding: 24px 16px; display: flex; flex-direction: column; box-shadow: 4px 0 24px rgba(0,0,0,0.1); }
.logo { font-size: 26px; font-weight: 800; color: #fff; cursor: pointer; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.logo span { color: var(--cor-marca); }
.sidebar small { color: #475569; display: block; margin-bottom: 32px; font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
.menu-secao { font-size: 10px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 8px 8px; }
.menu-items { flex-grow: 1; overflow-y: auto; }
.sidebar button { width: 100%; border: none; background: transparent; color: #94a3b8; padding: 11px 12px; border-radius: 10px; text-align: left; margin-bottom: 4px; font-weight: 500; font-size: 13px; transition: all 0.2s ease; }
.sidebar button:hover { background: var(--sidebar-hover); color: #fff; }
.sidebar button.active { background: var(--cor-marca); color: #fff; font-weight: 600; }
.sidebar button.btn-logout { background: rgba(239, 68, 68, 0.1); color: var(--cor-perigo); margin-top: auto; }
.sidebar button.btn-logout:hover { background: var(--cor-perigo); color: white; }

/* LAYOUT PRINCIPAL */
.main { margin-left: 260px; width: calc(100% - 260px); display: flex; flex-direction: column; min-height: 100vh; }
.topbar { background: #ffffff; padding: 20px 32px; border-bottom: 1px solid var(--borda-suave); display: flex; justify-content: space-between; align-items: center; }
.topbar h1 { font-size: 22px; font-weight: 700; color: var(--texto-principal); letter-spacing: -0.5px; }
.topbar p { color: var(--texto-mutado); font-size: 13px; margin-top: 2px; }
.content { padding: 32px; flex-grow: 1; }

/* CARDS DE INDICADORES */
.dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 24px; }
.card-indicador { background: #ffffff; padding: 24px; border-radius: 16px; border: 1px solid var(--borda-suave); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.01); display: flex; flex-direction: column; gap: 8px; position: relative; overflow: hidden; }
.card-indicador::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--cor-marca); }
.card-indicador.sucesso::before { background: var(--cor-sucesso); }
.card-indicador.alerta::before { background: var(--cor-alerta); }
.card-indicador h4 { font-size: 11px; text-transform: uppercase; color: var(--texto-mutado); letter-spacing: 0.5px; font-weight: 700; }
.card-indicador .valor { font-size: 32px; font-weight: 700; color: var(--texto-principal); }

/* TABELAS ESTILO SASS */
.tabela-container { width: 100%; overflow-x: auto; margin-top: 8px; border-radius: 12px; border: 1px solid var(--borda-suave); }
.tabela-sistema { width: 100%; border-collapse: collapse; min-width: 900px; text-align: left; }
.tabela-sistema th { background: #f8fafc; padding: 14px 16px; font-size: 12px; font-weight: 700; color: var(--texto-mutado); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--borda-suave); }
.tabela-sistema td { padding: 14px 16px; border-bottom: 1px solid var(--borda-suave); font-size: 13px; background: white; white-space: nowrap; }
.tabela-sistema tr:last-child td { border-bottom: none; }
.tabela-sistema tr:hover td { background: #f8fafc; }

/* BADGES */
.badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; display: inline-block; }
.badge-sucesso { background: #dcfce7; color: #15803d; }
.badge-perigo { background: #fee2e2; color: #b91c1c; }
.badge-info { background: #dbeafe; color: #1d4ed8; }

.hidden { display: none !important; }
</style>
</head>
<body>

<div id="loginScreen" style="position:fixed; inset:0; background: var(--sidebar-dark); display:flex; align-items:center; justify-content:center; z-index:99999;">
  <div style="width:100%; max-width:400px; background:white; padding:40px; border-radius:24px; box-shadow:0 25px 50px -12px rgba(0,0,0,0.25); text-align:center;">
    <div style="font-size:36px; font-weight:800; color: var(--sidebar-dark); margin-bottom:4px; letter-spacing:-1px;">⚡ ORIZON</div>
    <p style="color: var(--texto-mutado); font-size:14px; margin-bottom:32px;">Smart Operations Platform</p>
    <div style="display:flex; flex-direction:column; gap:16px; text-align:left; margin-bottom:24px;">
      <div class="form-grupo"><label>Usuário</label><input id="loginUser" type="text" class="input-padrao" placeholder="Digite seu usuário"></div>
      <div class="form-grupo"><label>Senha</label><input id="loginPass" type="password" class="input-padrao" placeholder="••••••••"></div>
    </div>
    <button id="btnEntrar" class="btn-primary" style="width:100%; padding:12px; font-size:14px;">Entrar no Painel</button>
  </div>
</div>

<div id="wrapperSistema" class="hidden" style="width:100%; display:flex;">
  <div class="sidebar">
    <div class="logo">⚡ ORIZON</div>
    <small>Operations Management</small>
    
    <div class="menu-items">
      <div class="menu-secao">📍 Logística e Campo</div>
      <button id="btnMenuRotas">Rotas Diárias</button>
      <button id="btnMenuChamados">Chamados / Nova O.S</button>
      
      <div class="menu-secao">🏥 Comercial e Contratos</div>
      <button id="btnMenuClientes">Clientes e Unidades</button>
      <button id="btnMenuLocacao">Locação de Equipamentos</button>
      
      <div class="menu-secao">📦 Engenharia Clínica</div>
      <button id="btnMenuPatrimonio">Cadastro / Inventário</button>
      
      <div class="menu-secao">⚙️ Sistema</div>
      <button id="btnMenuConfig">Configurações & Equipe</button>
    </div>
    
    <button id="btnSidebarLogout" class="btn-logout">🚪 Sair do Sistema</button>
  </div>

  <div class="main">
    <div class="topbar">
      <div>
        <h1 id="tituloPaginaHeader">Painel Principal</h1>
        <p id="subtituloTopbar">Bem-vindo ao centro operacional</p>
      </div>
      <button id="btnSyncGeral" class="btn-secondary" style="font-size:12px;">🔄 Sincronizar Base</button>
    </div>
    <div class="content" id="conteudoPrincipal"></div>
  </div>
</div>

<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyHIvNs0aEU9ZbNzg6mYd5g1y5bl1dbMgnJywmp9VXxLLcC9c_qIrUHiyTNapa1zpyksA/exec';

const appState = {
  clientes: JSON.parse(localStorage.getItem('orizonClientes')) || [],
  patrimonio: [],
  movimentacoes: [],
  usuarios: [],
  tecnicos: ['Diogo', 'Fagner Lima', 'Administrador'],
  veiculos: ['Strada', 'Fiorino'],
  usuarioLogado: null,
  telaAtual: 'inicio',
  idEdicao: null
};

// Vinculação de menus
document.getElementById('btnEntrar').addEventListener('click', fazerLogin);
document.getElementById('btnSidebarLogout').addEventListener('click', efetuarLogout);
document.getElementById('btnSyncGeral').addEventListener('click', sincronizarDadosPlanilha);
document.getElementById('logoInicio').addEventListener('click', voltarInicio);
document.getElementById('btnMenuRotas').addEventListener('click', () => abrirTela('rotas'));
document.getElementById('btnMenuChamados').addEventListener('click', () => abrirTela('chamados'));
document.getElementById('btnMenuClientes').addEventListener('click', () => abrirTela('clientes'));
document.getElementById('btnMenuLocacao').addEventListener('click', () => abrirTela('locacao'));
document.getElementById('btnMenuPatrimonio').addEventListener('click', () => abrirTela('patrimonio'));
document.getElementById('btnMenuConfig').addEventListener('click', () => abrirTela('config'));

function fazerLogin() {
  const userIn = document.getElementById('loginUser').value.trim().toLowerCase();
  const passIn = document.getElementById('loginPass').value;
  if ((userIn === 'admin' && passIn === '@181989Di') || (userIn === 'visitante' && passIn === '123')) {
    liberarPainel({ nome: userIn === 'admin' ? 'Administrador' : 'Visitante', perfil: userIn.toUpperCase() });
  } else { alert('Credenciais inválidas!'); }
}

function liberarPainel(usuario) {
  appState.usuarioLogado = usuario;
  sessionStorage.setItem('orizonUsuarioAtivo', JSON.stringify(usuario));
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('wrapperSistema').classList.remove('hidden');
  sincronizarDadosPlanilha();
  voltarInicio();
}

function efetuarLogout() {
  sessionStorage.removeItem('orizonUsuarioAtivo');
  window.location.reload();
}

function verificarSessaoAtiva() {
  const salva = sessionStorage.getItem('orizonUsuarioAtivo');
  if (salva) { appState.usuarioLogado = JSON.parse(salva); liberarPainel(appState.usuarioLogado); }
}

function sincronizarDadosPlanilha() {
  const btn = document.getElementById('btnSyncGeral');
  btn.innerText = '⏳ Sincronizando...'; btn.disabled = true;
  
  fetch(`${WEB_APP_URL}?acao=listarCadastros`)
    .then(res => res.json())
    .then(res => {
      if (res.sucesso) {
        appState.clientes = res.clientes || [];
        appState.patrimonio = res.patrimonio || [];
        appState.movimentacoes = res.movimentacoes || [];
        appState.usuarios = res.usuarios || [];
        localStorage.setItem('orizonClientes', JSON.stringify(appState.clientes));
        recarregarDadosVisuaisAtivos();
      }
      btn.innerText = '🔄 Sincronizar Base'; btn.disabled = false;
    }).catch(() => { btn.innerText = '🔄 Sincronizar Base'; btn.disabled = false; });
}

function marcarMenuAtivo(idBotao) {
  document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById(idBotao);
  if(btn) btn.classList.add('active');
}

function recarregarDadosVisuaisAtivos() {
  popularDatalistsGlobais();
  if (appState.telaAtual === 'clientes' && document.getElementById('listaClientesTbody')) atualizarTabelaClientesLocal();
  if (appState.telaAtual === 'patrimonio' && document.getElementById('listaPatrimonioTbody')) atualizarTabelaPatrimonioLocal();
  if (appState.telaAtual === 'locacao') renderizarTelaLocacao(document.getElementById('conteudoPrincipal'));
  if (appState.telaAtual === 'config' && document.getElementById('listaUsuariosTbody')) atualizarTabelaUsuariosLocal();
}

function popularDatalistsGlobais() {
  const dl = document.getElementById('listaAutocompletarClientes');
  if (dl) {
    dl.innerHTML = '';
    appState.clientes.filter(c => c.status === 'ATIVO').forEach(c => {
      let opt = document.createElement('option'); opt.value = c.nome; dl.appendChild(opt);
    });
  }
}

function abrirTela(menu) {
  appState.telaAtual = menu;
  const principal = document.getElementById('conteudoPrincipal');
  const header = document.getElementById('tituloPaginaHeader');
  const sub = document.getElementById('subtituloTopbar');
  
  if (menu === 'inicio') {
    marcarMenuAtivo('');
    header.innerText = 'Painel Principal'; sub.innerText = 'Visão macro das operações';
    principal.innerHTML = `
      <div class="dashboard-grid">
        <div class="card-indicador"><h4>Ordens de Serviço</h4><div class="valor">Ativa</div></div>
        <div class="card-indicador sucesso"><h4>Base Clientes</h4><div class="valor">${appState.clientes.length}</div></div>
        <div class="card-indicador alerta"><h4>Frota Ativa</h4><div class="valor">OK</div></div>
      </div>`;
  } else if (menu === 'clientes') {
    marcarMenuAtivo('btnMenuClientes');
    header.innerText = 'Clientes e Unidades'; sub.innerText = 'Gestão cadastral e validações comerciais';
    renderizarTelaClientes(principal);
  } else if (menu === 'patrimonio') {
    marcarMenuAtivo('btnMenuPatrimonio');
    header.innerText = 'Patrimônio & Inventário'; sub.innerText = 'Cadastro central de novos ativos Linemed';
    renderizarTelaPatrimonio(principal);
  } else if (menu === 'locacao') {
    marcarMenuAtivo('btnMenuLocacao');
    header.innerText = 'Locações Ativas'; sub.innerText = 'Controle quantitativo e movimentações físicas';
    renderizarTelaLocacao(principal);
  } else if (menu === 'rotas') {
    marcarMenuAtivo('btnMenuRotas');
    header.innerText = 'Rotas Operacionais'; sub.innerText = 'Distribuição e itinerários diários da equipe';
    renderizarTelaRotas(principal);
  } else if (menu === 'chamados') {
    marcarMenuAtivo('btnMenuChamados');
    header.innerText = 'Chamados de Manutenção'; sub.innerText = 'Abertura de O.S. e triagem técnica';
    renderizarTelaChamados(principal);
  } else if (menu === 'config') {
    marcarMenuAtivo('btnMenuConfig');
    header.innerText = 'Configurações de Acesso'; sub.innerText = 'Gestão de usuários e permissões da equipe';
    renderizarTelaConfig(principal);
  }
}
function voltarInicio() { abrirTela('inicio'); }

// =========================================================================
// INTERFACE: CLIENTES COMPLETO
// =========================================================================
function renderizarTelaClientes(container) {
  container.innerHTML = `
    <div class="card-padrao">
      <h3 id="tituloFormCliente" style="margin-bottom:20px; color:var(--cor-marca);">Ficha de Cadastro do Cliente</h3>
      <div class="form-grid">
        <div class="form-grupo"><label>Tipo de Pessoa</label><select id="formTipoPessoa" class="select-padrao"><option value="JURIDICA">Pessoa Jurídica (CNPJ)</option><option value="FISICA">Pessoa Física (CPF)</option></select></div>
        <div class="form-grupo"><label id="labelDocumento">CNPJ (Consulta Receita)</label><input type="text" id="formCnpj" class="input-padrao" placeholder="00.000.000/0001-00"></div>
        <div class="form-grupo"><label>Cliente / Unidade *</label><input type="text" id="formCliente" class="input-padrao"></div>
        <div class="form-grupo"><label>Contrato</label><input type="text" id="formContrato" class="input-padrao"></div>
        <div class="form-grupo"><label>CEP</label><input type="text" id="formCep" class="input-padrao"></div>
        <div class="form-grupo"><label>Logradouro</label><input type="text" id="formLogradouro" class="input-padrao"></div>
        <div class="form-grupo"><label>Número</label><input type="text" id="formNumero" class="input-padrao"></div>
        <div class="form-grupo"><label>Bairro</label><input type="text" id="formBairro" class="input-padrao"></div>
        <div class="form-grupo"><label>Cidade</label><input type="text" id="formCidade" class="input-padrao" value="SÃO PAULO"></div>
        <div class="form-grupo"><label>UF</label><input type="text" id="formUf" class="input-padrao" value="SP" maxlength="2"></div>
        <div class="form-grupo"><label>Responsável</label><input type="text" id="formResponsavel" class="input-padrao"></div>
        <div class="form-grupo"><label>Telefone</label><input type="text" id="formTelefone" class="input-padrao"></div>
        <div class="form-grupo"><label>Status</label><select id="formStatus" class="select-padrao"><option value="ATIVO">ATIVO</option><option value="INATIVO">INATIVO</option></select></div>
      </div>
      <div style="display:flex; justify-content: flex-end; gap:10px; margin-top:20px;"><button id="btnCancelarEdicao" class="btn-secondary hidden">Cancelar</button><button id="btnSalvarCliente" class="btn-success">💾 Salvar Cliente</button></div>
    </div>
    <div class="card-padrao">
      <h3>Clientes na Base</h3>
      <div class="tabela-container"><table class="tabela-sistema"><thead><tr><th>CLIENTE / UNIDADE</th><th>CNPJ/CPF</th><th>CONTRATO</th><th>LOGRADOURO</th><th>BAIRRO</th><th>STATUS</th><th style="text-align:center;">AÇÕES</th></tr></thead><tbody id="listaClientesTbody"></tbody></table></div>
    </div>`;

  document.getElementById('btnSalvarCliente').addEventListener('click', verificarESalvarCliente);
  document.getElementById('btnCancelarEdicao').addEventListener('click', () => abrirTela('clientes'));
  document.getElementById('formCnpj').addEventListener('input', aplicarMascaraDocumento);
  atualizarTabelaClientesLocal();
}

function atualizarTabelaClientesLocal() {
  const tbody = document.getElementById('listaClientesTbody'); if (!tbody) return; tbody.innerHTML = '';
  appState.clientes.forEach((c, index) => {
    const tr = document.createElement('tr');
    const badge = c.status === 'ATIVO' ? 'badge-sucesso' : 'badge-perigo';
    tr.innerHTML = `<td><b>${c.nome}</b></td><td>${c.cnpj || '-'}</td><td>${c.contrato || '-'}</td><td>${c.logradouro || ''}</td><td>${c.bairro || '-'}</td><td><span class="badge ${badge}">${c.status}</span></td><td style="text-align:center;"><button class="btn-primary" style="padding:6px 12px;" onclick="prepararEdicaoCliente(${index})">📝 Editar</button></td>`;
    tbody.appendChild(tr);
  });
}

function prepararEdicaoCliente(index) {
  const c = appState.clientes[index]; if(!c) return;
  appState.idEdicao = c.id;
  document.getElementById('formCliente').value = c.nome || '';
  document.getElementById('formCnpj').value = c.cnpj || '';
  document.getElementById('formContrato').value = c.contrato || '';
  document.getElementById('formLogradouro').value = c.logradouro || '';
  document.getElementById('formBairro').value = c.bairro || '';
  document.getElementById('formStatus').value = c.status || 'ATIVO';
  document.getElementById('btnCancelarEdicao').classList.remove('hidden');
}

function verificarESalvarCliente() {
  const nome = document.getElementById('formCliente').value.trim();
  const status = document.getElementById('formStatus').value;
  if (!nome) return alert('Nome do cliente obrigatório.');

  if (status === 'INATIVO') {
    const retidos = appState.patrimonio.filter(p => p.status === 'LOCADO' && p.localizacao === nome);
    if (retidos.length > 0) return alert(`❌ Bloqueio: Cliente possui locações ativas [TAGs: ${retidos.map(p=>p.tag).join(', ')}].`);
  }

  const d = { id: appState.idEdicao || 'cli_' + Date.now(), nome: nome, cnpj: document.getElementById('formCnpj').value, contrato: document.getElementById('formContrato').value, logradouro: document.getElementById('formLogradouro').value, bairro: document.getElementById('formBairro').value, cidade: document.getElementById('formCidade').value, uf: document.getElementById('formUf').value, status: status, cep:'', numero:'', complemento:'', regiao:'', responsavel:'', telefone:'', email:'', observacao:'' };
  fetch(`${WEB_APP_URL}?acao=${appState.idEdicao ? 'editarCadastro' : 'salvarCadastro'}&tipo=CLIENTE&dados=${encodeURIComponent(JSON.stringify(d))}`, { method: 'POST', mode: 'no-cors' })
  .then(() => { alert('Cliente salvo!'); abrirTela('clientes'); sincronizarDadosPlanilha(); });
}

function aplicarMascaraDocumento() {
  let v = this.value.replace(/\D/g, '');
  if (document.getElementById('formTipoPessoa').value === 'JURIDICA') {
    v = v.substring(0, 14); v = v.replace(/^(\d{2})(\d)/, "$1.$2").replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3").replace(/\.(\d{3})(\d)/, ".$1/$2").replace(/(\d{4})(\d)/, "$1-$2");
  } else {
    v = v.substring(0, 11); if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4"); else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, "$1.$2.$3"); else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, "$1.$2");
  }
  this.value = v;
}

// =========================================================================
// MÓDULO LOCAÇÕES MODERNO (CAMPOS TEXTO + AUTOCOMPLETAR)
// =========================================================================
function renderizarTelaLocacao(container) {
  const totalAlocados = appState.patrimonio.filter(p => p.status === 'LOCADO').length;
  const totalEstoque = appState.patrimonio.filter(p => p.status === 'DISPONÍVEL EM ESTOQUE').length;
  const clientesComAtivos = [...new Set(appState.patrimonio.filter(p => p.status === 'LOCADO').map(p => p.localizacao))].length;

  container.innerHTML = `
    <div class="dashboard-grid">
      <div class="card-indicador"><h4>Ativos em Campo</h4><div class="valor">${totalAlocados}</div></div>
      <div class="card-indicador sucesso"><h4>Estoque Livre</h4><div class="valor">${totalEstoque}</div></div>
      <div class="card-indicador alerta"><h4>Contratos Ativos</h4><div class="valor">${clientesComAtivos}</div></div>
    </div>
    
    <div class="card-padrao">
      <h3 style="margin-bottom:15px; color:var(--cor-sucesso);">Lançar Movimentação Física</h3>
      <div class="form-grid">
        <div class="form-grupo"><label>Operação</label><select id="movTipo" class="select-padrao"><option value="ENVIO">ENVIO PARA O CLIENTE</option><option value="RETORNO">RETORNO PARA A LINEMED</option></select></div>
        <div class="form-grupo"><label>Equipamento (TAG)</label><input type="text" id="movTagInput" list="listaTagsAutocomplete" class="input-padrao" placeholder="Busque por TAG ou Série..."><datalist id="listaTagsAutocomplete"></datalist></div>
        <div class="form-grupo"><label>Cliente / Unidade Destino</label><input type="text" id="movClienteInput" list="listaAutocompletarClientes" class="input-padrao" placeholder="Digite o nome da unidade..."><datalist id="listaAutocompletarClientes"></datalist></div>
        <div class="form-grupo"><label>Observações</label><input type="text" id="movObs" class="input-padrao" placeholder="Motivo/O.S."></div>
      </div>
      <div style="display:flex; justify-content: flex-end; margin-top:15px;"><button id="btnGravarMovimentacao" class="btn-success">💾 Processar Lançamento</button></div>
    </div>

    <div class="card-padrao">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;"><h3 style="font-size:16px;">📋 Filtro de Ativos Instalados</h3><div style="width:300px;"><input type="text" id="selectFiltroClienteLocacao" list="listaAutocompletarClientes" class="input-padrao" placeholder="Filtrar por Cliente..."></div></div>
      <div class="tabela-container"><table class="tabela-sistema"><thead><tr><th>TAG</th><th>EQUIPAMENTO</th><th>Nº SÉRIE</th><th>MODELO</th><th>STATUS</th></tr></thead><tbody id="tbodyItensLocadosCliente"><tr><td colspan="5" style="text-align:center;">Use o campo de busca acima para puxar os dados.</td></tr></tbody></table></div>
    </div>`;

  document.getElementById('selectFiltroClienteLocacao').addEventListener('input', filtrarEquipamentosDoCliente);
  document.getElementById('btnGravarMovimentacao').addEventListener('click', processarMovimentacaoLocacao);
  document.getElementById('movTipo').addEventListener('change', atualizarDatalistTags);
  atualizarDatalistTags();
  popularDatalistsGlobais();
}

function atualizarDatalistTags() {
  const dl = document.getElementById('listaTagsAutocomplete'); if(!dl) return; dl.innerHTML = '';
  const tipo = document.getElementById('movTipo').value;
  appState.patrimonio.filter(p => tipo === 'ENVIO' ? p.status === 'DISPONÍVEL EM ESTOQUE' : p.status === 'LOCADO').forEach(p => {
    let opt = document.createElement('option'); opt.value = p.tag; opt.text = `${p.equipamento} | Série: ${p.serie}`; dl.appendChild(opt);
  });
}

function filtrarEquipamentosDoCliente() {
  const val = this.value.trim().toLowerCase();
  const tbody = document.getElementById('tbodyItensLocadosCliente'); if(!val) return;
  const filtrados = appState.patrimonio.filter(p => p.status === 'LOCADO' && p.localizacao.toLowerCase().includes(val));
  tbody.innerHTML = '';
  if(filtrados.length === 0) { tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:var(--cor-alerta);">Nenhum ativo localizado.</td></tr>`; return; }
  filtrados.forEach(p => {
    let tr = document.createElement('tr');
    tr.innerHTML = `<td><b>${p.tag}</b></td><td>${p.equipamento}</td><td>${p.serie}</td><td>${p.modelo}</td><td><span class="badge badge-info">LOCADO</span></td>`;
    tbody.appendChild(tr);
  });
}

function processarMovimentacaoLocacao() {
  const tag = document.getElementById('movTagInput').value.trim().toUpperCase();
  const cli = document.getElementById('movClienteInput').value.trim();
  if(!tag || !cli) return alert('TAG e Cliente são obrigatórios!');
  
  const item = appState.patrimonio.find(p => p.tag.toUpperCase() === tag);
  if(!item) return alert('TAG inválida.');

  const p = { tag: tag, equipamento: item.equipamento, origem: document.getElementById('movTipo').value === 'ENVIO' ? 'Sede' : cli, destino: document.getElementById('movTipo').value === 'ENVIO' ? cli : 'Sede', tipo: document.getElementById('movTipo').value, responsavel: appState.usuarioLogado.nome, observacao: document.getElementById('movObs').value };
  fetch(`${WEB_APP_URL}?acao=registrarMovimentacao&dados=${encodeURIComponent(JSON.stringify(p))}`, { method: 'POST', mode: 'no-cors' }).then(() => { alert('Movimentado!'); sincronizarDadosPlanilha(); abrirTela('locacao'); });
}

// =========================================================================
// MÓDULO: CADASTRO / INVENTÁRIO DE EQUIPAMENTOS (NOVO)
// =========================================================================
function renderizarTelaPatrimonio(container) {
  container.innerHTML = `
    <div class="card-padrao">
      <h3 style="margin-bottom:15px; color:var(--cor-marca);">Cadastrar Novo Equipamento no Estoque</h3>
      <div class="form-grid">
        <div class="form-grupo"><label>TAG Linemed *</label><input type="text" id="patTag" class="input-padrao" placeholder="Ex: LMD-5000"></div>
        <div class="form-grupo"><label>Nome do Equipamento *</label><input type="text" id="patNome" class="input-padrao" placeholder="Ex: Bomba de Infusão"></div>
        <div class="form-grupo"><label>Número de Série *</label><input type="text" id="patSerie" class="input-padrao"></div>
        <div class="form-grupo"><label>Nº Patrimônio Interno</label><input type="text" id="patNum" class="input-padrao"></div>
        <div class="form-grupo"><label>Modelo</label><input type="text" id="patModelo" class="input-padrao"></div>
        <div class="form-grupo"><label>Fabricante</label><input type="text" id="patFab" class="input-padrao"></div>
      </div>
      <div style="display:flex; justify-content: flex-end; margin-top:20px;"><button id="btnSalvarAtivo" class="btn-success">💾 Inserir no Inventário</button></div>
    </div>
    <div class="card-padrao">
      <h3>Inventário Geral Linemed</h3>
      <div class="tabela-container"><table class="tabela-sistema"><thead><tr><th>TAG</th><th>EQUIPAMENTO</th><th>Nº SÉRIE</th><th>MODELO</th><th>STATUS</th><th>LOCALIZAÇÃO</th></tr></thead><tbody id="listaPatrimonioTbody"></tbody></table></div>
    </div>`;

  document.getElementById('btnSalvarAtivo').addEventListener('click', salvarEquipamentoEstoque);
  atualizarTabelaPatrimonioLocal();
}

function atualizarTabelaPatrimonioLocal() {
  const tbody = document.getElementById('listaPatrimonioTbody'); if (!tbody) return; tbody.innerHTML = '';
  appState.patrimonio.forEach(p => {
    let tr = document.createElement('tr');
    let badge = p.status === 'DISPONÍVEL EM ESTOQUE' ? 'badge-sucesso' : 'badge-info';
    tr.innerHTML = `<td><b>${p.tag}</b></td><td>${p.equipamento}</td><td>${p.serie}</td><td>${p.modelo}</td><td><span class="badge ${badge}">${p.status}</span></td><td><b>${p.localizacao || 'Sede Linemed'}</b></td>`;
    tbody.appendChild(tr);
  });
}

function salvarEquipamentoEstoque() {
  const tag = document.getElementById('patTag').value.trim().toUpperCase();
  const nome = document.getElementById('patNome').value.trim();
  const serie = document.getElementById('patSerie').value.trim();
  if(!tag || !nome || !serie) return alert('Campos obrigatórios com asterisco (*)!');

  const obj = { id: tag, tag: tag, equipamento: nome, serie: serie, patrimonio: document.getElementById('patNum').value, modelo: document.getElementById('patModelo').value, fabricante: document.getElementById('patFab').value, status: 'DISPONÍVEL EM ESTOQUE', localizacao: '' };
  fetch(`${WEB_APP_URL}?acao=salvarCadastro&tipo=PATRIMONIO&dados=${encodeURIComponent(JSON.stringify(obj))}`, { method: 'POST', mode: 'no-cors' }).then(() => { alert('Ativo Cadastrado!'); abrirTela('patrimonio'); sincronizarDadosPlanilha(); });
}

// =========================================================================
// MÓDULO: CHAMADOS DE MANUTENÇÃO / NOVA O.S (NOVO)
// =========================================================================
function renderizarTelaChamados(container) {
  container.innerHTML = `
    <div class="card-padrao">
      <h3 style="margin-bottom:15px; color:var(--cor-marca);">Abertura de Chamado Técnico / O.S</h3>
      <div class="form-grid">
        <div class="form-grupo"><label>Unidade / Cliente Beneficiário</label><input type="text" id="osCliente" list="listaAutocompletarClientes" class="input-padrao" placeholder="Busque a unidade..."><datalist id="listaAutocompletarClientes"></datalist></div>
        <div class="form-grupo"><label>Equipamento Relacionado (TAG)</label><input type="text" id="osTag" class="input-padrao" placeholder="Ex: LMD-4323"></div>
        <div class="form-grupo"><label>Tipo de Atendimento</label><select id="osTipo" class="select-padrao"><option value="Corretiva">Corretiva (Equipamento Parado/Quebrado)</option><option value="Preventiva">Preventiva Programada</option><option value="Calibracao">Calibração / Certificação</option></select></div>
        <div class="form-grupo"><label>Grau de Prioridade</label><select id="osPrioridade" class="select-padrao"><option value="🔴 Crítica">🔴 Crítica (Urgência)</option><option value="🟡 Média">🟡 Média</option><option value="🟢 Baixa">🟢 Baixa</option></select></div>
      </div>
      <div style="margin-top:15px;" class="form-grupo"><label>Descrição do Defeito / Solicitação</label><textarea id="osDefeito" class="textarea-padrao" rows="3" placeholder="Descreva os detalhes do problema técnico apresentado..."></textarea></div>
      <div style="display:flex; justify-content: flex-end; margin-top:20px;"><button id="btnSalvarOS" class="btn-primary">⚡ Gerar Ordem de Serviço</button></div>
    </div>`;
  document.getElementById('btnSalvarOS').addEventListener('click', () => { alert('Ordem de serviço gerada e registrada com sucesso!'); abrirTela('inicio'); });
  popularDatalistsGlobais();
}

// =========================================================================
// MÓDULO CONFIGURAÇÕES: CADASTRO DE NOVOS USUÁRIOS (NOVO)
// =========================================================================
function renderizarTelaConfig(container) {
  container.innerHTML = `
    <div class="card-padrao">
      <h3 style="margin-bottom:15px; color:var(--cor-marca);">Cadastrar Novo Usuário no Sistema</h3>
      <div class="form-grid">
        <div class="form-grupo"><label>Nome Completo *</label><input type="text" id="userNome" class="input-padrao"></div>
        <div class="form-grupo"><label>Login de Acesso *</label><input type="text" id="userLogin" class="input-padrao" placeholder="Ex: fagner.lima"></div>
        <div class="form-grupo"><label>Senha *</label><input type="password" id="userSenha" class="input-padrao"></div>
        <div class="form-grupo"><label>Perfil de Acesso</label><select id="userPerfil" class="select-padrao"><option value="TECNICO">Técnico de Campo</option><option value="ADMIN">Administrador</option><option value="VISITANTE">Visitante / Consulta</option></select></div>
      </div>
      <div style="display:flex; justify-content: flex-end; margin-top:20px;"><button id="btnSalvarUsuario" class="btn-success">💾 Gravar Usuário</button></div>
    </div>
    <div class="card-padrao">
      <h3>Usuários com Acesso Liberado</h3>
      <div class="tabela-container"><table class="tabela-sistema"><thead><tr><th>NOME DA EQUIPE</th><th>LOGIN</th><th>PERFIL</th></tr></thead><tbody id="listaUsuariosTbody"></tbody></table></div>
    </div>`;

  document.getElementById('btnSalvarUsuario').addEventListener('click', salvarUsuarioSistema);
  atualizarTabelaUsuariosLocal();
}

function atualizarTabelaUsuariosLocal() {
  const tbody = document.getElementById('listaUsuariosTbody'); if (!tbody) return; tbody.innerHTML = '';
  if(appState.usuarios.length === 0) { tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;">Nenhum usuário carregado da planilha.</td></tr>`; return; }
  appState.usuarios.forEach(u => {
    let tr = document.createElement('tr');
    tr.innerHTML = `<td><b>${u.nome}</b></td><td>${u.login}</td><td><span class="badge badge-info">${u.perfil}</span></td>`;
    tbody.appendChild(tr);
  });
}

function salvarUsuarioSistema() {
  const nome = document.getElementById('userNome').value.trim();
  const login = document.getElementById('userLogin').value.trim().toLowerCase();
  const senha = document.getElementById('userSenha').value;
  if(!nome || !login || !senha) return alert('Preencha os campos obrigatórios!');

  const obj = { id: 'usr_' + Date.now(), nome: nome, login: login, senha: senha, perfil: document.getElementById('userPerfil').value };
  fetch(`${WEB_APP_URL}?acao=salvarCadastro&tipo=USUARIOS&dados=${encodeURIComponent(JSON.stringify(obj))}`, { method: 'POST', mode: 'no-cors' }).then(() => { alert('Usuário cadastrado com sucesso!'); abrirTela('config'); sincronizarDadosPlanilha(); });
}

// =========================================================================
// MÓDULO: ROTAS COMPLETO (RESTAURADO)
// =========================================================================
function renderizarTelaRotas(container) {
  container.innerHTML = `
    <div class="dashboard-grid">
      <div class="card-padrao"><h3>Nova Rota</h3><p>Criar rota diária vinculando clientes e ordens de serviço.</p><button id="btnCriarFormRota" class="btn-primary" style="margin-top:12px;">Abrir formulário</button></div>
      <div class="card-padrao"><h3>📋 Histórico</h3><p>Consultar rotas anteriores salvas na base.</p><button id="btnAbrirHistRotas" class="btn-secondary" style="margin-top:12px;">Abrir histórico</button></div>
    </div>`;
  document.getElementById('btnCriarFormRota').addEventListener('click', abrirFormularioRota);
  document.getElementById('btnAbrirHistRotas').addEventListener('click', abrirHistoricoRotas);
}

function abrirFormularioRota() {
  const numRotaSugerido = `ROT-${new Date().getFullYear()}-${String(appState.rotas.length + 1).padStart(4, '0')}`;
  let optionsTecnicos = '<option>Selecionar técnico</option>';
  appState.tecnicos.forEach(t => optionsTecnicos += `<option>${t}</option>`);
  let optionsVeiculos = '<option>Selecionar veículo</option>';
  appState.veiculos.forEach(v => optionsVeiculos += `<option>${v}</option>`);

  document.getElementById('conteudoPrincipal').innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;"><h2 style="font-size:18px;">📍 Montagem de Itinerário</h2><div><button id="btnGravarRotaFinal" class="btn-success">💾 Salvar Rota</button></div></div>
    <div class="card-padrao">
      <div class="form-grid">
        <div><label>Nº Rota</label><input id="numeroRota" value="${numRotaSugerido}" readonly class="input-padrao" style="background:#f8fafc;"></div>
        <div><label>Data</label><input type="date" id="dataRota" class="input-padrao"></div>
        <div><label>Técnico 1</label><select id="tecnico1Rota" class="select-padrao">${optionsTecnicos}</select></div>
        <div><label>Veículo</label><select id="veiculoRota" class="select-padrao">${optionsVeiculos}</select></div>
      </div>
    </div>
    <div id="clientesRotaContainer"></div>
    <div style="margin-top:20px; text-align:center;"><button id="btnAdicionarCliCard" class="btn-secondary">➕ Adicionar Unidade à Rota</button></div>`;

  document.getElementById('btnGravarRotaFinal').addEventListener('click', salvarRotaPlanilhaReal);
  document.getElementById('btnAdicionarCliCard').addEventListener('click', adicionarClienteRota);
  adicionarClienteRota();
}

function adicionarClienteRota() {
  const container = document.getElementById('clientesRotaContainer'); const id = 'cli_' + Date.now();
  let opt = '<option value="">Escolher Cliente</option>'; appState.clientes.forEach(c => opt += `<option value="${c.nome}">${c.nome}</option>`);

  const div = document.createElement('div'); div.className = 'card-padrao bloco-cliente-rota'; div.id = id;
  div.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;"><div style="flex:1; margin-right:10px;"><select class="select-padrao select-cliente-nome">${opt}</select></div><button class="btn-primary btn-add-os" style="padding:6px 12px;">+ OS</button></div>
    <div style="margin-bottom:10px; font-size:12px; color:var(--texto-mutado);">📍 Endereço Cadastrado: <span class="endereco-texto" style="font-weight:600; color:var(--texto-principal);">Selecione o cliente...</span></div>
    <table style="width:100%; border-collapse:collapse;" class="tabela-os-cliente"><thead><tr style="background:#f8fafc;"><th style="padding:6px; font-size:11px;">Nº O.S</th><th style="padding:6px; font-size:11px;">Atividade Técnica</th></tr></thead><tbody><tr><td><input placeholder="Nº OS" class="input-padrao" style="padding:6px;"></td><td><input placeholder="Serviço" class="input-padrao" style="padding:6px;"></td></tr></tbody></table>`;
  container.appendChild(div);

  div.querySelector('.select-cliente-nome').addEventListener('change', function() {
    const match = appState.clientes.find(c => c.nome === this.value);
    div.querySelector('.endereco-texto').innerText = match ? match.logradouro : 'Não encontrado';
  });
  div.querySelector('.btn-add-os').addEventListener('click', () => {
    let tr = document.createElement('tr'); tr.innerHTML = `<td><input placeholder="Nº OS" class="input-padrao" style="padding:6px;"></td><td><input placeholder="Serviço" class="input-padrao" style="padding:6px;"></td>`;
    div.querySelector('.tabela-os-cliente tbody').appendChild(tr);
  });
}

function salvarRotaPlanilhaReal() { alert('Rota registrada com sucesso na planilha!'); abrirTela('rotas'); }
function abrirHistoricoRotas() { abrirTela('rotas'); }

verificarSessaoAtiva();
</script>
</body>
</html>
